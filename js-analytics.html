
</html><!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Analytics | SkillBridge AI</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div>

  <h2>👨‍🎓 Job Seeker Panel</h2>

  <nav>
    <a href="js-dashboard.html">Dashboard</a><br>
    <a href="js-jobs.html">Jobs</a><br>
    <a href="js-applications.html">Applications</a><br>
    <a href="js-resume.html">Resume Builder</a><br>
    <a href="js-analytics.html">Analytics</a><br>
    <a href="js-profile.html">Profile</a><br>
  </nav>

  <button id="logoutBtn">Logout 👋</button>

</div>

<hr>

<!-- MAIN -->
<div>

  <h2>📊 Career Analytics</h2>

  <div>
    <h3>⚡ Employability Score</h3>
    <p id="score">Calculating...</p>
  </div>

  <div>
    <h3>📄 Total Applications</h3>
    <p id="totalApps">Loading...</p>
  </div>

  <div>
    <h3>✅ Success Rate</h3>
    <p id="successRate">Loading...</p>
  </div>

  <hr>

  <div>
    <h3>🧠 AI Suggestions</h3>
    <ul id="suggestions"></ul>
  </div>

  <hr>

  <div>
    <h3>🔥 Trending Skills</h3>
    <ul id="trendingSkills"></ul>
  </div>

</div>

<!-- ✅ SINGLE MODULE SCRIPT -->
<script type="module">

import { db, logoutUser } from "./firebase.js";
import { getDocs, collection } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// ================= LOGOUT =================
document.getElementById("logoutBtn")
  .addEventListener("click", logoutUser);


// ================= SAFE SESSION =================
function getSession(){
  try {
    return JSON.parse(localStorage.getItem("session"));
  } catch {
    return null;
  }
}


// ================= ANALYTICS =================
async function loadAnalytics(){

  const user = getSession();

  // 🔥 SAFE CHECK (NO RANDOM REDIRECT BUG)
  if (!user || !user.email) {
    console.warn("No session found");
    alert("⚠️ Please login first");
    window.location.href = "index.html";
    return;
  }

  try {

    // ================= APPLICATIONS =================
    const appsSnap = await getDocs(collection(db, "applications"));
    const apps = [];

    appsSnap.forEach(doc => {
      const a = doc.data();
      if (a.user === user.email) apps.push(a);
    });

    // TOTAL
    document.getElementById("totalApps").innerText = apps.length;

    // SUCCESS RATE
    const success = apps.filter(a =>
      a.status === "Shortlisted" || a.status === "Hired"
    ).length;

    const rate = apps.length
      ? Math.round((success / apps.length) * 100)
      : 0;

    document.getElementById("successRate").innerText = rate + "%";

    // SCORE
    const score = Math.min(100, apps.length * 20 + rate);
    document.getElementById("score").innerText = score + "%";

    // ================= SUGGESTIONS =================
    const suggestions = document.getElementById("suggestions");
    suggestions.innerHTML = "";

    if(rate < 30){
      suggestions.innerHTML += "<li>📉 Improve your skills</li>";
    }

    if(apps.length < 3){
      suggestions.innerHTML += "<li>🚀 Apply to more jobs</li>";
    }

    if(score > 70){
      suggestions.innerHTML += "<li>🔥 You're doing great!</li>";
    }

    if(!suggestions.innerHTML){
      suggestions.innerHTML = "<li>✨ Keep going!</li>";
    }

    // ================= TRENDING =================
    const jobsSnap = await getDocs(collection(db, "jobs"));
    const skillCount = {};

    jobsSnap.forEach(doc => {
      const j = doc.data();

      j.skills?.forEach(s => {
        skillCount[s] = (skillCount[s] || 0) + 1;
      });
    });

    const sorted = Object.keys(skillCount)
      .sort((a,b)=>skillCount[b]-skillCount[a]);

    const trending = document.getElementById("trendingSkills");
    trending.innerHTML = "";

    sorted.slice(0,5).forEach(s => {
      const li = document.createElement("li");
      li.innerText = s;
      trending.appendChild(li);
    });

  } catch (err) {
    console.error("Analytics Error:", err);
    alert("❌ Error loading analytics");
  }

}


// ================= AUTO LOAD =================
loadAnalytics();

</script>

</body>
</html>
