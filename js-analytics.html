<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Analytics | SkillBridge AI</title>

  <link rel="stylesheet" href="style.css?v=25">
</head>

<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>👨‍🎓 Job Seeker Panel</h2>

    <nav>
      <a href="js-dashboard.html">Dashboard</a>
      <a href="js-jobs.html">Jobs</a>
      <a href="js-applications.html">Applications</a>
      <a href="js-resume.html">Resume Builder</a>
      <a href="js-analytics.html">Analytics</a>
      <a href="js-profile.html">Profile</a>
    </nav>

    <button id="logoutBtn">Logout 👋</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <h2>📊 Career Analytics</h2>

    <div class="grid">

      <div class="card">
        <h3>⚡ Employability Score</h3>
        <p id="score">Loading...</p>
      </div>

      <div class="card">
        <h3>📄 Total Applications</h3>
        <p id="totalApps">Loading...</p>
      </div>

      <div class="card">
        <h3>✅ Success Rate</h3>
        <p id="success">Loading...</p>
      </div>

    </div>

    <!-- AI SUGGESTIONS -->
    <div class="card">
      <h3>🧠 AI Suggestions</h3>
      <p id="suggest1">Loading...</p>
      <p id="suggest2"></p>
    </div>

  </div>

</div>

<script type="module">
import { db, logoutUser } from "./firebase.js";
import {
  getDocs,
  collection
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

document.getElementById("logoutBtn")
  .addEventListener("click", logoutUser);

// SESSION
function getSession() {
  try {
    return JSON.parse(localStorage.getItem("session"));
  } catch {
    return null;
  }
}

// LOAD ANALYTICS
async function loadAnalytics() {

  const user = getSession();

  if (!user) {
    alert("Login required ❌");
    window.location.href = "index.html";
    return;
  }

  try {

    const snap = await getDocs(collection(db, "applications"));

    let apps = [];

    snap.forEach(doc => {
      const a = doc.data();
      if (a.user === user.email) apps.push(a);
    });

    // TOTAL
    document.getElementById("totalApps").innerText = apps.length;

    // SUCCESS
    const success = apps.filter(a =>
      a.status === "Hired" || a.status === "Shortlisted"
    ).length;

    const successRate = apps.length
      ? Math.round((success / apps.length) * 100)
      : 0;

    document.getElementById("success").innerText = successRate + "%";

    // SCORE
    const score = Math.min(100, apps.length * 20 + success * 15);
    document.getElementById("score").innerText = score + "%";

    // AI SUGGESTIONS
    const s1 = document.getElementById("suggest1");
    const s2 = document.getElementById("suggest2");

    if (apps.length === 0) {
      s1.innerText = "Apply to jobs to boost your profile 🚀";
      s2.innerText = "Complete your resume for better chances";
    } else if (successRate < 30) {
      s1.innerText = "Improve your skills 📚";
      s2.innerText = "Apply to more jobs 🎯";
    } else {
      s1.innerText = "Great progress! Keep applying 🔥";
      s2.innerText = "Focus on interviews now 🎤";
    }

  } catch (err) {
    console.error(err);
  }
}

loadAnalytics();
</script>

</body>
</html>
