<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Analytics | SkillBridge AI</title>
</head>

<body>

<!-- SIDEBAR -->
<div>

  <h2>👨‍🎓 Job Seeker Panel</h2>

  <nav>
    <a href="js-dashboard.html">Dashboard</a><br>
    <a href="js-jobs.html">Jobs</a><br>
    <a href="js-applications.html">Applications</a><br>
    <a href="js-resume.html">Resume Builder</a><br>
    <a href="js-analytics.html">Analytics</a><br>
    <a href="js-profile.html">Profile</a><br>
  </nav>

  <button onclick="logout()">Logout</button>

</div>

<hr>

<!-- MAIN CONTENT -->
<div>

  <h2>📊 Career Analytics</h2>

  <!-- STATS -->
  <div>
    <h3>⚡ Employability Score</h3>
    <p id="score">Calculating...</p>
  </div>

  <div>
    <h3>📄 Total Applications</h3>
    <p id="totalApps">Loading...</p>
  </div>

  <div>
    <h3>✅ Success Rate</h3>
    <p id="successRate">Loading...</p>
  </div>

  <hr>

  <!-- AI SUGGESTIONS -->
  <div>

    <h3>🧠 AI Suggestions</h3>

    <ul id="suggestions">
      <!-- Dynamic suggestions -->
    </ul>

  </div>

  <hr>

  <!-- TRENDING SKILLS -->
  <div>

    <h3>🔥 Trending Skills</h3>

    <ul id="trendingSkills">
      <!-- Firebase / logic based -->
    </ul>

  </div>

</div>

<!-- JS -->
<script src="script.js"></script>
<script type="module" src="firebase.js"></script>

<!-- LOAD ANALYTICS -->
<script>
async function loadAnalytics(){

  const { getDocs, collection } = await import("https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js");
  const { db } = await import("./firebase.js");

  let user = JSON.parse(localStorage.getItem("session"));

  // APPLICATIONS
  let appsSnap = await getDocs(collection(db, "applications"));
  let apps = [];

  appsSnap.forEach(doc=>{
    let a = doc.data();
    if(a.user === user.email) apps.push(a);
  });

  // TOTAL APPS
  document.getElementById("totalApps").innerText = apps.length;

  // SUCCESS RATE
  let success = apps.filter(a => a.status === "Shortlisted" || a.status === "Hired").length;
  let rate = apps.length ? Math.round((success / apps.length) * 100) : 0;

  document.getElementById("successRate").innerText = rate + "%";

  // EMPLOYABILITY SCORE
  let score = Math.min(100, apps.length * 20 + rate);
  document.getElementById("score").innerText = score + "%";

  // AI SUGGESTIONS
  let suggestions = document.getElementById("suggestions");

  suggestions.innerHTML = "";

  if(rate < 30){
    suggestions.innerHTML += "<li>Improve your skills to increase selection chances</li>";
  }

  if(apps.length < 3){
    suggestions.innerHTML += "<li>Apply to more jobs</li>";
  }

  if(score > 70){
    suggestions.innerHTML += "<li>You're doing great! Keep applying</li>";
  }

  // TRENDING SKILLS
  let jobsSnap = await getDocs(collection(db, "jobs"));
  let skillCount = {};

  jobsSnap.forEach(doc=>{
    let j = doc.data();
    j.skills?.forEach(s=>{
      skillCount[s] = (skillCount[s] || 0) + 1;
    });
  });

  let sorted = Object.keys(skillCount).sort((a,b)=>skillCount[b]-skillCount[a]);

  let trending = document.getElementById("trendingSkills");

  trending.innerHTML = "";

  sorted.slice(0,5).forEach(s=>{
    trending.innerHTML += `<li>${s}</li>`;
  });

}

// AUTO LOAD
window.onload = () => {
  loadAnalytics();
};
</script>

</body>
</html>
<link rel="stylesheet" href="style.css">
