<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Applications | SkillBridge AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div>

  <h2>👑 Admin Panel</h2>

  <nav>
    <a href="admin-dashboard.html">Dashboard</a><br>
    <a href="admin-users.html">Users</a><br>
    <a href="admin-jobs.html">Jobs</a><br>
    <a href="admin-applications.html">Applications</a><br>
  </nav>

  <!-- ✅ FIXED LOGOUT -->
  <button id="logoutBtn">Logout 👋</button>

</div>

<hr>

<!-- MAIN -->
<div>

  <h2>📄 All Applications</h2>

  <!-- SEARCH -->
  <input type="text" id="searchApp" placeholder="Search by email">

  <br><br>

  <!-- LIST -->
  <div id="apps"></div>

</div>

<!-- ✅ SINGLE MODULE SCRIPT -->
<script type="module">

import { db, logoutUser } from "./firebase.js";
import { getDocs, collection } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// 🔥 LOGOUT FIX
document.getElementById("logoutBtn")
  .addEventListener("click", logoutUser);


// ================= LOAD APPLICATIONS =================
async function loadApplications(){

  const container = document.getElementById("apps");
  container.innerHTML = "Loading...";

  try {
    const snap = await getDocs(collection(db, "applications"));

    container.innerHTML = "";

    snap.forEach(doc => {
      const app = doc.data();

      const div = document.createElement("div");

      div.style.border = "1px solid #ccc";
      div.style.padding = "10px";
      div.style.marginBottom = "10px";

      div.innerHTML = `
        <b>👤 ${app.name || "No Name"}</b><br>
        📧 ${app.email || "No Email"}<br>
        💼 ${app.jobTitle || "No Job"}<br>
        📌 Status: ${app.status || "Pending"}
      `;

      container.appendChild(div);
    });

  } catch (err) {
    console.error("Load Apps Error:", err);
    container.innerHTML = "Error loading applications ❌";
  }
}


// ================= SEARCH =================
document.getElementById("searchApp")
  .addEventListener("keyup", function(){

    let q = this.value.toLowerCase();
    let cards = document.querySelectorAll("#apps div");

    cards.forEach(c=>{
      c.style.display =
        c.innerText.toLowerCase().includes(q)
          ? "block"
          : "none";
    });

  });


// AUTO LOAD
loadApplications();

</script>

</body>
</html>
