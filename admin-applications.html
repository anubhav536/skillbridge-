<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Applications | SkillBridge AI</title><style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body{
  background: linear-gradient(135deg,#0f172a,#020617);
  color:#e2e8f0;
}

.container{
  padding:20px;
}

h1{
  font-size:28px;
  margin-bottom:20px;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

input{
  padding:10px;
  border-radius:8px;
  border:none;
  outline:none;
  width:250px;
}

select{
  padding:10px;
  border-radius:8px;
  border:none;
}

.table-container{
  overflow-x:auto;
  background:#020617;
  border-radius:12px;
  padding:10px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:12px;
  text-align:left;
}

th{
  background:#0f172a;
}

tr{
  border-bottom:1px solid #1e293b;
}

.status{
  padding:6px 10px;
  border-radius:6px;
  font-size:12px;
}

.approved{ background:#16a34a; }
.pending{ background:#f59e0b; }
.rejected{ background:#dc2626; }

.actions button{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-right:5px;
}

.view{ background:#3b82f6; color:white; }
.accept{ background:#22c55e; color:white; }
.reject{ background:#ef4444; color:white; }

</style></head><body><div class="container"><h1>📄 Applications Panel</h1><div class="top-bar">
  <input type="text" placeholder="Search by name or skill...">
  <select>
    <option>All</option>
    <option>Pending</option>
    <option>Approved</option>
    <option>Rejected</option>
  </select>
</div><div class="table-container">
<table>
<thead>
<tr>
  <th>Name</th>
  <th>Email</th>
  <th>Skill</th>
  <th>Experience</th>
  <th>Status</th>
  <th>Actions</th>
</tr>
</thead><tbody>
<tr>
  <td>Rahul Verma</td>
  <td>rahul@gmail.com</td>
  <td>Frontend Developer</td>
  <td>2 Years</td>
  <td><span class="status pending">Pending</span></td>
  <td class="actions">
    <button class="view">View</button>
    <button class="accept">Accept</button>
    <button class="reject">Reject</button>
  </td>
</tr><tr>
  <td>Anjali Sharma</td>
  <td>anjali@gmail.com</td>
  <td>UI/UX Designer</td>
  <td>1 Year</td>
  <td><span class="status approved">Approved</span></td>
  <td class="actions">
    <button class="view">View</button>
  </td>
</tr><tr>
  <td>Rohit Singh</td>
  <td>rohit@gmail.com</td>
  <td>Backend Developer</td>
  <td>3 Years</td>
  <td><span class="status rejected">Rejected</span></td>
  <td class="actions">
    <button class="view">View</button>
  </td>
</tr></tbody>
</table>
</div></div></body>
</html>
