<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Applications | SkillBridge AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
  background: linear-gradient(135deg,#0f172a,#020617);
  color:white;
}

.dashboard{display:flex;}

.sidebar{
  width:240px;
  height:100vh;
  background:#020617;
  padding:20px;
  position:fixed;
}

.sidebar nav a{
  display:block;
  padding:10px;
  border-radius:8px;
  margin-bottom:8px;
  color:white;
  text-decoration:none;
}

.sidebar nav a:hover,
.sidebar nav a.active{
  background:#3b82f6;
}

.main{
  margin-left:240px;
  padding:20px;
  width:100%;
}

.top{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.badge{
  background:#3b82f6;
  padding:5px 10px;
  border-radius:20px;
}

.table-container{
  overflow-x:auto;
  background:#020617;
  border-radius:12px;
  padding:10px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:12px;
}

th{background:#0f172a;}

tr{border-bottom:1px solid #1e293b;}

.status{
  padding:6px 10px;
  border-radius:6px;
  font-size:12px;
}

.pending{background:#f59e0b;}
.approved{background:#16a34a;}
.rejected{background:#dc2626;}

.actions button{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-right:5px;
}

.accept{background:#22c55e;color:white;}
.reject{background:#ef4444;color:white;}

</style>
</head>

<body>

<div class="dashboard">

<aside class="sidebar">
<h2>👑 Admin</h2>

<nav>
<a href="admin-dashboard.html">📊 Dashboard</a>
<a href="admin-users.html">👥 Users</a>
<a href="admin-jobs.html">💼 Jobs</a>
<a href="admin-applications.html" class="active">📄 Applications</a>
</nav>
</aside>

<main class="main">

<div class="top">
<h2>📄 Applications Panel</h2>
<span class="badge">Live</span>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Skill</th>
<th>Experience</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="appTable"></tbody>

</table>
</div>

</main>
</div>

<script type="module">
import { db } from "./firebase.js";
import {
  collection,
  getDocs,
  updateDoc,
  doc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const table = document.getElementById("appTable");

// LOAD APPLICATIONS
async function loadApps(){

  const snap = await getDocs(collection(db,"applications"));

  table.innerHTML = "";

  snap.forEach(d=>{
    const app = d.data();

    table.innerHTML += `
    <tr>
      <td>${app.name}</td>
      <td>${app.email}</td>
      <td>${app.skill}</td>
      <td>${app.experience}</td>
      <td><span class="status ${app.status}">${app.status}</span></td>
      <td class="actions">
        ${app.status==="pending" ? `
        <button class="accept" onclick="accept('${d.id}')">Accept</button>
        <button class="reject" onclick="reject('${d.id}')">Reject</button>
        ` : ""}
      </td>
    </tr>`;
  });

}

// ACCEPT
window.accept = async(id)=>{
  await updateDoc(doc(db,"applications",id),{
    status:"approved"
  });
  loadApps();
}

// REJECT
window.reject = async(id)=>{
  await updateDoc(doc(db,"applications",id),{
    status:"rejected"
  });
  loadApps();
}

loadApps();
</script>

</body>
</html>
