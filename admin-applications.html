<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Applications | SkillBridge AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div>

  <h2>👑 Admin Panel</h2>

  <nav>
    <a href="admin-dashboard.html">Dashboard</a><br>
    <a href="admin-users.html">Users</a><br>
    <a href="admin-jobs.html">Jobs</a><br>
    <a href="admin-applications.html">Applications</a><br>
  </nav>

  <button onclick="logout()">Logout</button>

</div>

<hr>

<!-- MAIN CONTENT -->
<div>

  <h2>📄 All Applications</h2>

  <!-- SEARCH -->
  <input type="text" id="searchApp" placeholder="Search by email">

  <br><br>

  <!-- APPLICATION LIST -->
  <div id="apps">
    <!-- Firebase data will load here -->
  </div>

</div>

<!-- JS -->
<script src="script.js"></script>
<script type="module" src="firebase.js"></script>

<!-- SIMPLE FILTER -->
<script>
function filterApps(){
  let q = document.getElementById("searchApp").value.toLowerCase();
  let cards = document.querySelectorAll("#apps div");

  cards.forEach(c=>{
    c.style.display = c.innerText.toLowerCase().includes(q) ? "block" : "none";
  });
}

document.getElementById("searchApp").addEventListener("keyup", filterApps);
</script>

</body>
</html>
