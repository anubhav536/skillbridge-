<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Applications | SkillBridge AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
  background: linear-gradient(135deg,#0f172a,#020617);
  color:white;
}

.dashboard{display:flex;}

.sidebar{
  width:240px;
  height:100vh;
  background:#020617;
  padding:20px;
  position:fixed;
}

.sidebar nav a{
  display:block;
  padding:10px;
  border-radius:8px;
  margin-bottom:8px;
  color:white;
  text-decoration:none;
}

.sidebar nav a:hover,
.sidebar nav a.active{
  background:#3b82f6;
}

.main{
  margin-left:240px;
  padding:20px;
  width:100%;
}

.top{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.badge{
  background:#3b82f6;
  padding:5px 10px;
  border-radius:20px;
}

.table-container{
  overflow-x:auto;
  background:#020617;
  border-radius:12px;
  padding:10px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:12px;
}

th{background:#0f172a;}

tr{border-bottom:1px solid #1e293b;}

.status{
  padding:6px 10px;
  border-radius:6px;
  font-size:12px;
}

.pending{background:#f59e0b;}
.approved{background:#16a34a;}
.rejected{background:#dc2626;}

.actions button{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-right:5px;
}

.accept{background:#22c55e;color:white;}
.reject{background:#ef4444;color:white;}

</style>
</head>

<body>

<div class="dashboard">

<aside class="sidebar">
<h2>👑 Admin</h2>

<nav>
<a href="admin-dashboard.html">📊 Dashboard</a>
<a href="admin-users.html">👥 Users</a>
<a href="admin-jobs.html">💼 Jobs</a>
<a href="admin-applications.html" class="active">📄 Applications</a>
</nav>
</aside>

<main class="main">

<div class="top">
<h2>📄 Applications Panel</h2>
<span class="badge">Live</span>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Skill</th>
<th>Experience</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="appTable"></tbody>

</table>
</div>

</main>
</div>

<script type="module">
// =====================================
// 🧠 ADMIN APPLICATION PANEL LOGIC
// SkillBridge AI
// =====================================

import {
  db
} from "./firebase.js";

import {
  collection,
  getDocs,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";


// =====================================
// 🎯 DOM
// =====================================

const table = document.getElementById("applicationsTable");


// =====================================
// 🧩 SAFE VALUE PICKER (ULTIMATE FIX)
// =====================================

function pick(...values) {
  for (let v of values) {
    if (v !== undefined && v !== null && v !== "") {
      return v;
    }
  }
  return "N/A";
}


// =====================================
// 📥 LOAD APPLICATIONS
// =====================================

export async function loadApplications() {

  try {

    table.innerHTML = `<tr><td colspan="6">Loading...</td></tr>`;

    const snap = await getDocs(collection(db, "applications"));

    if (snap.empty) {
      table.innerHTML = `<tr><td colspan="6">No applications found 🚫</td></tr>`;
      return;
    }

    table.innerHTML = "";

    snap.forEach(d => {

      const app = d.data();

      const name = pick(app.name, app.fullName);
      const email = pick(app.email, app.userEmail);
      const skills = pick(
        Array.isArray(app.skills) ? app.skills.join(", ") : app.skills,
        app.skill
      );
      const experience = pick(app.experience, app.exp);
      const status = pick(app.status, "pending");

      table.innerHTML += `
      <tr>
        <td>${name}</td>
        <td>${email}</td>
        <td>${skills}</td>
        <td>${experience}</td>
        <td>
          <span class="status ${status}">
            ${status}
          </span>
        </td>
        <td class="actions">
          ${(status === "pending") ? `
            <button class="accept" onclick="accept('${d.id}')">Accept</button>
            <button class="reject" onclick="reject('${d.id}')">Reject</button>
          ` : ""}
        </td>
      </tr>
      `;

    });

  } catch (e) {
    console.error(e);
    table.innerHTML = `<tr><td colspan="6">Error loading data ❌</td></tr>`;
  }
}


// =====================================
// ✅ ACCEPT
// =====================================

window.accept = async function (id) {

  try {

    await updateDoc(doc(db, "applications", id), {
      status: "accepted"
    });

    alert("Application accepted ✅");

    loadApplications();

  } catch (e) {
    console.error(e);
    alert("Error ❌");
  }
};


// =====================================
// ❌ REJECT
// =====================================

window.reject = async function (id) {

  try {

    await updateDoc(doc(db, "applications", id), {
      status: "rejected"
    });

    alert("Application rejected ❌");

    loadApplications();

  } catch (e) {
    console.error(e);
    alert("Error ❌");
  }
};


// =====================================
// 🚀 AUTO LOAD
// =====================================

loadApplications();
</script>

</body>
</html>
