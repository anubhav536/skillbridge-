</body>
</html><!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Applicants | SkillBridge AI</title>

<link rel="stylesheet" href="style.css?v=92">

</head>

<body class="rec-applicants-page">

<div class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <h2>🏢 Recruiter Panel</h2>

    <nav>
      <a href="rec-dashboard.html">Dashboard</a>
      <a href="rec-post-job.html">Post Job</a>
      <a href="rec-manage-jobs.html">Manage Jobs</a>
      <a href="rec-applicants.html" class="active">Applicants</a>
      <a href="rec-analytics.html">Analytics</a>
      <a href="rec-profile.html">Profile</a>
    </nav>

    <button id="logoutBtn">Logout 👋</button>

  </aside>



  <!-- MAIN -->
  <main class="main">

    <!-- TOP -->
    <div class="top-row">

      <div>
        <h1>👥 Applicants</h1>
        <p class="muted">
          Your talent radar is online 📡
        </p>
      </div>

      <input
        type="text"
        id="search"
        class="search-box"
        placeholder="Search applicants..."
      >

    </div>



    <!-- STATS -->
    <section class="grid mini-grid">

      <div class="card mini-card">
        <h3>Total</h3>
        <p id="totalCount">0</p>
      </div>

      <div class="card mini-card">
        <h3>Shortlisted</h3>
        <p id="shortCount">0</p>
      </div>

      <div class="card mini-card">
        <h3>Rejected</h3>
        <p id="rejectCount">0</p>
      </div>

    </section>



    <!-- APPLICANTS -->
    <section
      id="appList"
      class="app-grid"
    ></section>

  </main>

</div>



<script type="module">

import {
  db,
  logoutUser,
  getSession,
  updateApplicationStatus
} from "./firebase.js";

import {
  getDocs,
  collection
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";


/* =========================
   PAGE PROTECT
========================= */

const user = getSession();

if(!user){
  window.location.href =
    "rec-applicants.html";
}

if(user && user.role !== "recruiter"){
  window.location.href =
    "index.html";
}


/* =========================
   LOGOUT
========================= */

document.getElementById("logoutBtn")
.addEventListener("click", logoutUser);



/* =========================
   DATA
========================= */

let allApps = [];



/* =========================
   LOAD APPLICANTS
========================= */

async function loadApplicants(){

  const list =
    document.getElementById("appList");

  list.innerHTML =
    `<p class="loading-text">
      Loading applicants...
    </p>`;

  try{

    /* recruiter jobs */
    const jobsSnap =
      await getDocs(collection(db,"jobs"));

    let myJobIds = [];

    jobsSnap.forEach(item => {

      const job = item.data();

      if(job.recruiter === user.email){
        myJobIds.push(item.id);
      }

    });


    /* applications */
    const appsSnap =
      await getDocs(
        collection(db,"applications")
      );

    allApps = [];

    appsSnap.forEach(item => {

      const app = item.data();

      if(myJobIds.includes(app.jobId)){

        allApps.push({
          id: item.id,
          ...app
        });

      }

    });

    updateStats(allApps);
    renderApps(allApps);

  }catch(err){

    console.error(err);

    list.innerHTML =
      `<p class="loading-text">
        Failed to load ❌
      </p>`;

  }

}



/* =========================
   STATS
========================= */

function updateStats(apps){

  document.getElementById("totalCount")
  .innerText = apps.length;

  document.getElementById("shortCount")
  .innerText =
    apps.filter(a =>
      a.status === "Shortlisted"
    ).length;

  document.getElementById("rejectCount")
  .innerText =
    apps.filter(a =>
      a.status === "Rejected"
    ).length;

}



/* =========================
   RENDER
========================= */

function renderApps(apps){

  const list =
    document.getElementById("appList");

  if(apps.length === 0){

    list.innerHTML =
      `<p class="loading-text">
        No applicants found 😢
      </p>`;

    return;
  }

  list.innerHTML =
    apps.map(app => {

      const skills =
        Array.isArray(app.skills)
        ? app.skills.join(", ")
        : (app.skills || "N/A");

      const status =
        app.status || "Applied";

      return `

      <div class="card applicant-card">

        <div class="head-row">

          <div>
            <h3>
              ${app.name || app.user || "Applicant"}
            </h3>

            <p class="mail">
              ${app.email || app.user || ""}
            </p>
          </div>

          <span class="status-chip ${status.toLowerCase()}">
            ${status}
          </span>

        </div>

        <p>
          <b>Job:</b>
          ${app.jobTitle || "Applied Job"}
        </p>

        <p>
          <b>Skills:</b>
          ${skills}
        </p>

        <p>
          <b>Experience:</b>
          ${app.experience || 0} yrs
        </p>

        <div class="btn-row">

          <button
            class="green-btn actionBtn"
            data-id="${app.id}"
            data-status="Shortlisted"
          >
            Shortlist ✅
          </button>

          <button
            class="red-btn actionBtn"
            data-id="${app.id}"
            data-status="Rejected"
          >
            Reject ❌
          </button>

        </div>

      </div>

      `;

    }).join("");

  attachActionEvents();

}



/* =========================
   ACTION EVENTS
========================= */

function attachActionEvents(){

  document
  .querySelectorAll(".actionBtn")
  .forEach(btn => {

    btn.addEventListener(
      "click",
      async ()=>{

        const id =
          btn.dataset.id;

        const status =
          btn.dataset.status;

        btn.disabled = true;
        btn.innerText =
          "Updating...";

        try{

          await updateApplicationStatus(
            id,
            status
          );

          loadApplicants();

        }catch(err){

          console.error(err);

          btn.disabled = false;
          btn.innerText =
            "Retry";

          alert(
            "Update failed ❌"
          );

        }

      }
    );

  });

}



/* =========================
   SEARCH
========================= */

document.getElementById("search")
.addEventListener("input",(e)=>{

  const val =
    e.target.value
    .toLowerCase()
    .trim();

  if(!val){
    updateStats(allApps);
    renderApps(allApps);
    return;
  }

  const filtered =
    allApps.filter(app => {

      const name =
        (app.name ||
        app.user ||
        "").toLowerCase();

      const email =
        (app.email ||
        app.user ||
        "").toLowerCase();

      const skills =
        Array.isArray(app.skills)
        ? app.skills.join(" ")
            .toLowerCase()
        : (app.skills || "")
            .toLowerCase();

      const status =
        (app.status || "")
        .toLowerCase();

      const job =
        (app.jobTitle || "")
        .toLowerCase();

      return (
        name.includes(val) ||
        email.includes(val) ||
        skills.includes(val) ||
        status.includes(val) ||
        job.includes(val)
      );

    });

  updateStats(filtered);
  renderApps(filtered);

});


/* =========================
   INIT
========================= */

loadApplicants();

</script>

</body>
</html>
