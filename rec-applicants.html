</html>
<link rel="stylesheet" href="style.css"><!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Applicants | SkillBridge AI</title>

  <!-- ✅ CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div>

  <h2>🏢 Recruiter Panel</h2>

  <nav>
    <a href="rec-dashboard.html">Dashboard</a><br>
    <a href="rec-post-job.html">Post Job</a><br>
    <a href="rec-manage-jobs.html">Manage Jobs</a><br>
    <a href="rec-applicants.html">Applicants</a><br>
    <a href="rec-analytics.html">Analytics</a><br>
    <a href="rec-profile.html">Profile</a><br>
  </nav>

  <!-- ✅ FIXED LOGOUT -->
  <button id="logoutBtn">Logout 👋</button>

</div>

<hr>

<!-- MAIN -->
<div>

  <h2>👥 Applicants</h2>

  <input type="text" id="searchApplicant" placeholder="Search applicants...">

  <br><br>

  <div id="applicantsList">Loading...</div>

</div>

<!-- ✅ MODULE SCRIPT -->
<script type="module">

import { db, logoutUser } from "./firebase.js";
import { getDocs, collection, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// 🔥 LOGOUT
document.getElementById("logoutBtn")
  .addEventListener("click", logoutUser);


// ================= SESSION =================
function getSession(){
  try {
    return JSON.parse(localStorage.getItem("session"));
  } catch {
    return null;
  }
}


// ================= LOAD APPLICANTS =================
async function loadApplicants(){

  const user = getSession();

  if(!user || user.role !== "recruiter"){
    alert("⚠️ Unauthorized");
    window.location.href = "index.html";
    return;
  }

  const container = document.getElementById("applicantsList");

  try {

    const jobsSnap = await getDocs(collection(db, "jobs"));
    const appsSnap = await getDocs(collection(db, "applications"));

    const myJobs = [];

    // 🔥 only recruiter jobs
    jobsSnap.forEach(d=>{
      const j = d.data();
      if(j.recruiter === user.email){
        myJobs.push(d.id);
      }
    });

    container.innerHTML = "";

    let found = false;

    appsSnap.forEach(d => {

      const a = d.data();

      if(myJobs.includes(a.jobId)){

        found = true;

        const card = document.createElement("div");

        card.style.border = "1px solid #ccc";
        card.style.padding = "10px";
        card.style.marginBottom = "10px";

        card.innerHTML = `
          <b>👤 ${a.user}</b><br>
          💼 Job: ${a.jobId}<br>
          🧠 Skills: ${a.skills || "N/A"}<br>
          📊 Experience: ${a.experience || "0"} years<br>
          📌 Status: <b>${a.status}</b><br><br>
        `;

        // buttons
        const btns = ["Shortlisted", "Rejected", "Hired"];

        btns.forEach(status => {

          const btn = document.createElement("button");
          btn.innerText = status;

          btn.style.marginRight = "5px";

          btn.addEventListener("click", async () => {
            await updateDoc(doc(db, "applications", d.id), { status });
            alert("Updated 🚀");
            loadApplicants();
          });

          card.appendChild(btn);

        });

        container.appendChild(card);

      }

    });

    if(!found){
      container.innerHTML = "No applicants found";
    }

  } catch (err) {
    console.error("Applicants Error:", err);
    container.innerHTML = "Error loading applicants ❌";
  }

}


// ================= SEARCH =================
document.getElementById("searchApplicant")
  .addEventListener("keyup", function(){

    const q = this.value.toLowerCase();
    const apps = document.querySelectorAll("#applicantsList div");

    apps.forEach(a=>{
      a.style.display =
        a.innerText.toLowerCase().includes(q)
          ? "block"
          : "none";
    });

  });


// AUTO LOAD
loadApplicants();

</script>

</body>
</html>
