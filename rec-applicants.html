<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Applicants | SkillBridge AI</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <h2>🏢 Recruiter Panel</h2>

    <nav>
      <a href="rec-dashboard.html">Dashboard</a>
      <a href="rec-post-job.html">Post Job</a>
      <a href="rec-manage-jobs.html">Manage Jobs</a>
      <a href="rec-applicants.html">Applicants</a>
      <a href="rec-analytics.html">Analytics</a>
      <a href="rec-profile.html">Profile</a>
    </nav>

    <button id="logoutBtn">Logout 👋</button>

  </div>


  <!-- MAIN -->
  <div class="main">

    <h2>👥 Applicants</h2>

    <input 
      type="text" 
      id="search" 
      placeholder="Search applicants..."
      class="search-box"
    >

    <div id="appList"></div>

  </div>

</div>


<script type="module">

import { db, logoutUser, protectPage } from "./firebase.js";
import { 
  getDocs, 
  collection, 
  updateDoc, 
  doc 
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// protect
protectPage("recruiter");

// logout
document.getElementById("logoutBtn")
  .addEventListener("click", logoutUser);


// session
function getSession(){
  try {
    return JSON.parse(localStorage.getItem("session"));
  } catch {
    return null;
  }
}


let allApps = [];


// LOAD
async function loadApplicants(){

  const user = getSession();
  const list = document.getElementById("appList");

  list.innerHTML = "Loading...";

  try {

    // 1️⃣ get jobs of recruiter
    const jobsSnap = await getDocs(collection(db, "jobs"));

    let myJobIds = [];

    jobsSnap.forEach(d => {
      const j = d.data();
      if(j.recruiter === user.email){
        myJobIds.push(d.id);
      }
    });


    // 2️⃣ get applications
    const appsSnap = await getDocs(collection(db, "applications"));

    allApps = [];

    appsSnap.forEach(d => {
      const a = d.data();

      if(myJobIds.includes(a.jobId)){
        allApps.push({
          id: d.id,
          ...a
        });
      }
    });

    renderApps(allApps);

  } catch (err){
    console.log(err);
    list.innerHTML = "Error loading applicants ❌";
  }

}


// RENDER
function renderApps(apps){

  const list = document.getElementById("appList");

  if(apps.length === 0){
    list.innerHTML = "No applicants found 😢";
    return;
  }

  list.innerHTML = apps.map(a => `
    <div class="card app-card">

      <h3>${a.user}</h3>

      <p><b>Skills:</b> ${a.skills}</p>
      <p><b>Experience:</b> ${a.experience} yrs</p>
      <p><b>Status:</b> ${a.status}</p>

      <div class="btn-group">
        <button onclick="updateStatus('${a.id}', 'Shortlisted')">
          Shortlist ✅
        </button>

        <button onclick="updateStatus('${a.id}', 'Rejected')">
          Reject ❌
        </button>
      </div>

    </div>
  `).join("");

}


// UPDATE STATUS
window.updateStatus = async function(id, status){

  try {
    await updateDoc(doc(db, "applications", id), {
      status
    });

    alert("Updated 🚀");
    loadApplicants();

  } catch {
    alert("Failed ❌");
  }

}


// SEARCH
document.getElementById("search")
  .addEventListener("input", (e) => {

    const val = e.target.value.toLowerCase();

    const filtered = allApps.filter(a =>
      a.user.toLowerCase().includes(val)
    );

    renderApps(filtered);

  });


// INIT
loadApplicants();

</script>

</body>
</html>
