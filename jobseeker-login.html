<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Seeker Signup | SkillBridge AI</title>

  <link rel="stylesheet" href="style.css">
</head>

<body class="js-signup-body">

<!-- NAVBAR -->
<nav class="js-signup-navbar">

  <h2 class="js-signup-logo">🚀 SkillBridge AI</h2>

  <div class="js-signup-navlinks">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
  </div>

</nav>

<!-- SIGNUP -->
<section class="js-signup-section">

  <div class="js-signup-box">

    <h2>👨‍🎓 Job Seeker Signup</h2>

    <p class="js-signup-subtitle">
      Create your account to start applying for jobs
    </p>

    <!-- NAME -->
    <label>Full Name</label>
    <input
      type="text"
      id="name"
      placeholder="Enter Name"
      class="js-signup-input"
    >

    <!-- EMAIL -->
    <label>Email</label>
    <input
      type="email"
      id="email"
      placeholder="Enter Email"
      class="js-signup-input"
    >

    <!-- PASSWORD -->
    <label>Password</label>
    <input
      type="password"
      id="password"
      placeholder="Enter Password"
      class="js-signup-input"
    >

    <!-- BUTTON -->
    <button id="signupBtn" class="js-signup-btn">
      Signup 🚀
    </button>

    <!-- LOGIN -->
    <p class="js-signup-bottom">
      Already have an account?
      <a href="jobseeker-login.html">Login</a>
    </p>

  </div>

</section>

<!-- FOOTER -->
<footer class="js-signup-footer">
  <p>© 2026 SkillBridge AI</p>
</footer>

<!-- SCRIPT -->
<script type="module">

import {
  signupUser,
  checkSessionUI
} from "./firebase.js";

checkSessionUI();

document.getElementById("signupBtn")
.addEventListener("click", () => {

  signupUser(
    "seeker",
    document.getElementById("signupBtn")
  );

});

</script>

</body>
</html>
