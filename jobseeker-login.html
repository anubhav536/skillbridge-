<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Job Seeker Login | SkillBridge AI</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:#1e293b;
  padding:30px;
  border-radius:16px;
  width:320px;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

a{
  color:#60a5fa;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h2>👨‍🎓 Job Seeker Login</h2>

<input type="email" id="email" placeholder="Enter Email">
<input type="password" id="password" placeholder="Enter Password">

<button id="loginBtn">Login 🚀</button>

<p><a href="#" id="forgotPassword">Forgot Password?</a></p>

<p>Don't have account? <a href="jobseeker-signup.html">Signup</a></p>

</div>

<script type="module">
import { loginUser, resetPassword } from "./firebase.js";

// LOGIN
document.getElementById("loginBtn")
.addEventListener("click", async () => {

  console.log("Login clicked");

  await loginUser(); // redirect inside function
});


// FORGOT PASSWORD
document.getElementById("forgotPassword")
.addEventListener("click", (e) => {

  e.preventDefault();

  const email = document.getElementById("email").value.trim();

  if(!email){
    alert("Enter email first");
    return;
  }

  resetPassword(email);
});
</script>

</body>
</html>
