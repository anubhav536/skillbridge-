<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Seeker Login | SkillBridge AI</title>

  <link rel="stylesheet" href="style.css?v=7">
</head>

<body>

<!-- NAVBAR -->
<nav>
  <h2>🚀 SkillBridge AI</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="#">About</a>
  </div>
</nav>

<!-- LOGIN SECTION -->
<section class="auth-container">

  <div class="card login-card">

    <h2>👨‍🎓 Job Seeker Login</h2>
    <p class="subtitle">
      Login to access your dashboard and explore jobs
    </p>

    <!-- EMAIL -->
    <label>Email</label>
    <input type="email" id="email" placeholder="Enter Email">

    <!-- PASSWORD -->
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter Password">

    <!-- BUTTON -->
    <button id="loginBtn">Login 🚀</button>

    <!-- SIGNUP -->
    <p class="bottom-text">
      Don’t have an account?
      <a href="jobseeker-signup.html">Signup</a>
    </p>

  </div>

</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 SkillBridge AI</p>
</footer>

<!-- SCRIPT -->
<script type="module">
  import { loginUser } from "./firebase.js";

  document.getElementById("loginBtn")
    .addEventListener("click", () => loginUser(document.getElementById("loginBtn")));
</script>

</body>
</html>
