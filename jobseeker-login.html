<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Seeker Login | SkillBridge AI</title>

  <link rel="stylesheet" href="style.css">
</head>

<body class="js-login-body">

<!-- NAVBAR -->
<nav class="js-login-navbar">

  <h2 class="js-login-logo">🚀 SkillBridge AI</h2>

  <div class="js-login-navlinks">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
  </div>

</nav>

<!-- LOGIN SECTION -->
<section class="js-login-section">

  <div class="js-login-box">

    <h2>👨‍🎓 Job Seeker Login</h2>

    <p class="js-login-subtitle">
      Login to access your dashboard and explore jobs
    </p>

    <!-- EMAIL -->
    <label>Email</label>
    <input
      type="email"
      id="email"
      placeholder="Enter Email"
      class="js-login-input"
    >

    <!-- PASSWORD -->
    <label>Password</label>
    <input
      type="password"
      id="password"
      placeholder="Enter Password"
      class="js-login-input"
    >

    <!-- FORGOT -->
    <p class="js-login-forgot-wrap">
      <a href="#" id="forgotPassword" class="js-login-forgot">
        Forgot Password?
      </a>
    </p>

    <!-- BUTTON -->
    <button id="loginBtn" class="js-login-btn">
      Login 🚀
    </button>

    <!-- SIGNUP -->
    <p class="js-login-bottom">
      Don’t have an account?
      <a href="jobseeker-signup.html">Signup</a>
    </p>

  </div>

</section>

<!-- FOOTER -->
<footer class="js-login-footer">
  <p>© 2026 SkillBridge AI</p>
</footer>

<!-- SCRIPT -->
<script type="module">

import {
  loginUser,
  resetPassword,
  checkSessionUI
} from "./firebase.js";

checkSessionUI();

// LOGIN
document.getElementById("loginBtn")
.addEventListener("click", () => {

  loginUser(
    document.getElementById("loginBtn")
  );

});

// RESET PASSWORD
document.getElementById("forgotPassword")
.addEventListener("click", (e) => {

  e.preventDefault();

  const email =
    document.getElementById("email")
    .value
    .trim();

  if (!email) {
    alert("Input Email First 📩");
    return;
  }

  resetPassword(email);

});

</script>

</body>
</html>
