<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Seeker Login | SkillBridge AI</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav>
  <h2>🚀 SkillBridge AI</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
  </div>
</nav>

<!-- LOGIN -->
<section class="auth-container">

  <h2>👨‍🎓 Job Seeker Login</h2>
  <p>Login to access your dashboard and explore jobs</p>

  <div class="card">

    <label>Email:</label>
    <input type="email" id="email" placeholder="Enter Email">

    <label>Password:</label>
    <input type="password" id="password" placeholder="Enter Password">

    <button id="loginBtn">Login 🚀</button>

  </div>

  <p style="margin-top:15px;">
    Don’t have an account?
    <a href="jobseeker-signup.html">Signup</a>
  </p>

</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 SkillBridge AI</p>
</footer>

<!-- ✅ FIREBASE LOAD -->
<script type="module" src="firebase.js"></script>

<!-- ✅ BUTTON EVENT -->
<script>
  document.getElementById("loginBtn")
    .addEventListener("click", () => {
      window.loginUser(); // 🔥 THIS IS KEY
    });
</script>

</body>
</html>
