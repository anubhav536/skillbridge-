<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard | SkillBridge AI</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

/* BODY */
body{
  background: linear-gradient(135deg,#0f172a,#020617);
  color:white;
}

/* LAYOUT */
.dashboard{display:flex;}

/* SIDEBAR */
.sidebar{
  width:240px;
  height:100vh;
  background:#020617;
  padding:20px;
  position:fixed;
  left:0;
  top:0;
  transition:0.3s;
}

.sidebar nav a{
  display:block;
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
  color:white;
  text-decoration:none;
}

.sidebar nav a.active,
.sidebar nav a:hover{
  background:#3b82f6;
}

/* MAIN */
.main{
  margin-left:240px;
  padding:20px;
  width:100%;
}

/* CARD */
.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:20px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  padding:10px;
  border-bottom:1px solid #334155;
  text-align:left;
}

/* TOP BAR */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.badge{
  background:#3b82f6;
  padding:5px 10px;
  border-radius:20px;
}

/* MENU */
.menu-btn{
  display:none;
  font-size:22px;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
  .sidebar{left:-100%;}
  .sidebar.active{left:0;}
  .main{margin-left:0;}
  .menu-btn{display:block;}
}

</style>
</head>

<body>

<div class="dashboard">

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">

<h2>👑 Admin</h2>

<nav>
<a href="admin-dashboard.html">📊 Dashboard</a>
<a href="admin-users.html">👥 Users</a>
<a href="admin-jobs.html">💼 Jobs</a>
<a href="admin-applications.html">📄 Apps</a>
<a href="admin-flags.html">🚨 Flags</a>
<a href="admin-analytics.html">📈 Analytics</a>
<a href="admin-ai-control.html">🤖 AI</a>
<a href="admin-leaderboard.html" class="active">🏆 Rank</a>
<a href="admin-settings.html">⚙ Settings</a>
<a href="admin-logs.html">📜 Logs</a>
<a href="admin-notifications.html">📩 Notify</a>
<a href="admin-moderation.html">🛠 Mod</a>
</nav>

<a href="index.html" style="display:inline-block;margin-top:15px;background:#3b82f6;padding:8px 14px;border-radius:8px;text-decoration:none;color:white;">Logout 👋</a>

</aside>

<!-- MAIN -->
<main class="main">

<div class="top">
  <span class="menu-btn" onclick="toggleMenu()">☰</span>
  <h2>🏆 Leaderboard</h2>
  <span class="badge">Live</span>
</div>

<!-- JOB SEEKERS -->
<div class="card">
  <h2>🔥 Top Job Seekers</h2>
  <table id="jobseekersTable">
    <tr>
      <th>Rank</th>
      <th>Name</th>
      <th>Score</th>
    </tr>
  </table>
</div>

<!-- RECRUITERS -->
<div class="card">
  <h2>🏢 Top Recruiters</h2>
  <table id="recruitersTable">
    <tr>
      <th>Rank</th>
      <th>Company</th>
      <th>Hires</th>
    </tr>
  </table>
</div>

<!-- ACTIVE USERS -->
<div class="card">
  <h2>⚡ Most Active Users</h2>
  <table id="activeTable">
    <tr>
      <th>User</th>
      <th>Activity</th>
    </tr>
  </table>
</div>

</main>
</div>

<!-- 🔥 FIREBASE SCRIPT -->
<script type="module">
import { db } from "./firebase.js";
import {
  getDocs,
  collection
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

async function loadLeaderboard(){

  const snap = await getDocs(collection(db,"leaderboard"));

  let jobseekers = [];
  let recruiters = [];
  let activeUsers = [];

  snap.forEach(doc=>{
    const data = doc.data();

    if(data.role === "jobseeker"){
      jobseekers.push(data);
    }
    else if(data.role === "recruiter"){
      recruiters.push(data);
    }
    else if(data.role === "active"){
      activeUsers.push(data);
    }
  });

  // 🔥 SORT BY SCORE
  jobseekers.sort((a,b)=>b.score - a.score);
  recruiters.sort((a,b)=>b.score - a.score);

  // 🎯 RENDER JOB SEEKERS
  const jsTable = document.getElementById("jobseekersTable");
  jobseekers.forEach((u,i)=>{
    jsTable.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${u.name}</td>
        <td>${u.score}</td>
      </tr>
    `;
  });

  // 🎯 RENDER RECRUITERS
  const rTable = document.getElementById("recruitersTable");
  recruiters.forEach((u,i)=>{
    rTable.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${u.name}</td>
        <td>${u.score}</td>
      </tr>
    `;
  });

  // 🎯 ACTIVE USERS
  const aTable = document.getElementById("activeTable");
  activeUsers.forEach(u=>{
    aTable.innerHTML += `
      <tr>
        <td>${u.name}</td>
        <td>${u.score} actions</td>
      </tr>
    `;
  });

}

loadLeaderboard();
</script>

<!-- MENU SCRIPT -->
<script>
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
}

document.querySelectorAll(".sidebar a").forEach(link=>{
  link.addEventListener("click",()=>{
    if(window.innerWidth < 768){
      document.getElementById("sidebar").classList.remove("active");
    }
  });
});
</script>

</body>
</html>
