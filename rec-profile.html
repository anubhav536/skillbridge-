<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recruiter Profile | SkillBridge AI</title>

<link rel="stylesheet" href="style.css?v=96">

</head>

<body class="rec-profile-page">

<div class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <h2>🏢 Recruiter Panel</h2>

    <nav>
      <a href="rec-dashboard.html">Dashboard</a>
      <a href="rec-post-job.html">Post Job</a>
      <a href="rec-manage-jobs.html">Manage Jobs</a>
      <a href="rec-applicants.html">Applicants</a>
      <a href="rec-analytics.html">Analytics</a>
      <a href="rec-profile.html" class="active">Profile</a>
    </nav>

    <button id="logoutBtn">Logout 👋</button>

  </aside>



  <!-- MAIN -->
  <main class="main">

    <div class="profile-head">

      <div>
        <h1>👤 Recruiter Profile</h1>
        <p class="muted">
          Keep your hiring identity sharp ✨
        </p>
      </div>

      <div class="status-pill">
        Recruiter Verified
      </div>

    </div>



    <!-- PROFILE CARD -->
    <section class="card profile-view">

      <div class="avatar-box">
        🏢
      </div>

      <div class="profile-info">

        <h2 id="name">Loading...</h2>

        <p id="email">Loading...</p>

        <p>
          <strong>Company:</strong>
          <span id="company">Loading...</span>
        </p>

        <p>
          <strong>Role:</strong> Recruiter
        </p>

      </div>

    </section>



    <!-- EDIT CARD -->
    <section class="card edit-card">

      <h3>✏️ Update Company</h3>

      <input
        type="text"
        id="companyInput"
        placeholder="Enter company name"
      >

      <button
        id="updateBtn"
        class="save-btn"
      >
        Update Profile 💾
      </button>

    </section>

  </main>

</div>



<script type="module">

import {
  db,
  logoutUser,
  getSession,
  protectPage
} from "./firebase.js";

import {
  doc,
  updateDoc,
  getDocs,
  collection
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";


/* PAGE PROTECT */
protectPage("recruiter");


/* LOGOUT */
document.getElementById("logoutBtn")
.addEventListener("click", logoutUser);



/* LOAD PROFILE */
function loadProfile(){

  const user = getSession();

  if(!user){
    window.location.href =
      "rec-profile.html";
    return;
  }

  document.getElementById("name")
  .innerText =
    user.name || "Recruiter";

  document.getElementById("email")
  .innerText =
    user.email || "--";

  document.getElementById("company")
  .innerText =
    user.company || "Not added";

  document.getElementById("companyInput")
  .value =
    user.company || "";

}

loadProfile();



/* UPDATE PROFILE */
document.getElementById("updateBtn")
.addEventListener("click", async ()=>{

  const btn =
    document.getElementById("updateBtn");

  const user =
    getSession();

  if(!user){
    window.location.href =
      "recruiter-login.html";
    return;
  }

  const company =
    document.getElementById("companyInput")
    .value
    .trim();

  if(!company){
    alert("Enter company name ❌");
    return;
  }

  btn.disabled = true;
  btn.innerText = "Saving...";

  try{

    const snap =
      await getDocs(
        collection(db,"users")
      );

    let userId = null;

    snap.forEach(item => {

      const data =
        item.data();

      if(data.email === user.email){
        userId = item.id;
      }

    });

    if(!userId){

      alert("User not found ❌");

      btn.disabled = false;
      btn.innerText =
        "Update Profile 💾";

      return;
    }

    await updateDoc(
      doc(db,"users",userId),
      {
        company: company
      }
    );

    const updatedUser = {
      ...user,
      company: company
    };

    localStorage.setItem(
      "session",
      JSON.stringify(updatedUser)
    );

    loadProfile();

    alert("Profile updated ✅");

  }catch(err){

    console.error(err);

    alert("Update failed ❌");

  }

  btn.disabled = false;
  btn.innerText =
    "Update Profile 💾";

});

</script>

</body>
</html>
