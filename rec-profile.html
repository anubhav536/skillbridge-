<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Recruiter Profile | SkillBridge AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div>

  <h2>🏢 Recruiter Panel</h2>

  <nav>
    <a href="rec-dashboard.html">Dashboard</a><br>
    <a href="rec-post-job.html">Post Job</a><br>
    <a href="rec-manage-jobs.html">Manage Jobs</a><br>
    <a href="rec-applicants.html">Applicants</a><br>
    <a href="rec-analytics.html">Analytics</a><br>
    <a href="rec-profile.html">Profile</a><br>
  </nav>

  <!-- ✅ FIXED LOGOUT -->
  <button id="logoutBtn">Logout 👋</button>

</div>

<hr>

<!-- MAIN -->
<div>

  <h2>👤 Recruiter Profile</h2>

  <div>
    <p><b>Name:</b> <span id="rname">Loading...</span></p>
    <p><b>Email:</b> <span id="remail">Loading...</span></p>
    <p><b>Company:</b> <span id="rcompany">Loading...</span></p>
  </div>

  <hr>

  <div>

    <h3>Edit Profile</h3>

    <form id="profileForm">

      <label>Company Name:</label><br>
      <input type="text" id="company" placeholder="Enter company name"><br><br>

      <button type="submit" id="saveBtn">Update Profile 💾</button>

    </form>

  </div>

</div>

<!-- ✅ MODULE SCRIPT -->
<script type="module">
  import { db, logoutUser } from "./firebase.js";
  import { getDoc, setDoc, doc } 
    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  // 🔥 LOGOUT FIX
  document.getElementById("logoutBtn")
    .addEventListener("click", logoutUser);


  function getSession(){
    try {
      return JSON.parse(localStorage.getItem("session"));
    } catch {
      return null;
    }
  }


  async function loadRecProfile(){

    const user = getSession();

    // ✅ SECURITY CHECK
    if (!user || user.role !== "recruiter") {
      alert("⚠️ Unauthorized access");
      window.location.href = "index.html";
      return;
    }

    document.getElementById("rname").innerText = user.name;
    document.getElementById("remail").innerText = user.email;

    try {

      const snap = await getDoc(doc(db, "recProfiles", user.email));

      if (snap.exists()) {
        const data = snap.data();
        document.getElementById("rcompany").innerText = data.company || "Not added";
      } else {
        document.getElementById("rcompany").innerText = "Not added";
      }

    } catch (err) {
      console.error("Load Profile Error:", err);
    }
  }


  // ================= UPDATE =================
  const form = document.getElementById("profileForm");
  const btn = document.getElementById("saveBtn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const user = getSession();
    const company = document.getElementById("company").value.trim();

    if (!company) {
      alert("Enter company name ❌");
      return;
    }

    try {

      btn.innerText = "Saving...";
      btn.disabled = true;

      await setDoc(doc(db, "recProfiles", user.email), {
        company
      }, { merge: true }); // 🔥 IMPORTANT (no overwrite)

      alert("Profile Updated ✅");

      loadRecProfile();

    } catch (err) {
      console.error("Update Error:", err);
      alert("Update failed ❌");
    }

    btn.innerText = "Update Profile 💾";
    btn.disabled = false;
  });


  // AUTO LOAD
  loadRecProfile();

</script>

</body>
</html>
