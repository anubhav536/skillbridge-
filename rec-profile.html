<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Recruiter Profile | SkillBridge AI</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <h2>🏢 Recruiter Panel</h2>

    <nav>
      <a href="rec-dashboard.html">Dashboard</a>
      <a href="rec-post-job.html">Post Job</a>
      <a href="rec-manage-jobs.html">Manage Jobs</a>
      <a href="rec-applicants.html">Applicants</a>
      <a href="rec-analytics.html">Analytics</a>
      <a href="rec-profile.html">Profile</a>
    </nav>

    <button id="logoutBtn">Logout 👋</button>

  </div>


  <!-- MAIN -->
  <div class="main">

    <h2>👤 Recruiter Profile</h2>

    <!-- PROFILE CARD -->
    <div class="card">

      <p><b>Name:</b> <span id="name"></span></p>
      <p><b>Email:</b> <span id="email"></span></p>
      <p><b>Company:</b> <span id="company"></span></p>

    </div>


    <!-- EDIT -->
    <div class="card">

      <h3>✏️ Edit Profile</h3>

      <input 
        type="text" 
        id="companyInput" 
        placeholder="Enter company name"
      >

      <button id="updateBtn">
        Update Profile 💾
      </button>

    </div>

  </div>

</div>


<script type="module">

import { db, logoutUser, protectPage } from "./firebase.js";
import { doc, updateDoc, getDocs, collection } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

protectPage("recruiter");

document.getElementById("logoutBtn")
  .addEventListener("click", logoutUser);


// session
function getSession(){
  try {
    return JSON.parse(localStorage.getItem("session"));
  } catch {
    return null;
  }
}


// LOAD PROFILE
function loadProfile(){

  const user = getSession();

  document.getElementById("name").innerText = user.name;
  document.getElementById("email").innerText = user.email;
  document.getElementById("company").innerText = user.company || "Not added";

}

loadProfile();


// UPDATE PROFILE
document.getElementById("updateBtn")
  .addEventListener("click", async () => {

    const user = getSession();
    const company = document.getElementById("companyInput").value.trim();

    if(!company){
      alert("Enter company name ❌");
      return;
    }

    try {

      // 🔍 find user doc
      const snap = await getDocs(collection(db, "users"));

      let userId = null;

      snap.forEach(docSnap => {
        const d = docSnap.data();
        if(d.email === user.email){
          userId = docSnap.id;
        }
      });

      if(!userId){
        alert("User not found ❌");
        return;
      }

      // 🔥 update firestore
      await updateDoc(doc(db, "users", userId), {
        company
      });

      // 🔥 update session
      user.company = company;
      localStorage.setItem("session", JSON.stringify(user));

      alert("Profile updated ✅");

      loadProfile();

    } catch (err){
      console.log(err);
      alert("Update failed ❌");
    }

  });

</script>

</body>
</html>
