<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Users | SkillBridge AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div>

  <h2>👑 Admin Panel</h2>

  <nav>
    <a href="admin-dashboard.html">Dashboard</a><br>
    <a href="admin-users.html">Users</a><br>
    <a href="admin-jobs.html">Jobs</a><br>
    <a href="admin-applications.html">Applications</a><br>
  </nav>

  <!-- ✅ FIXED LOGOUT -->
  <button id="logoutBtn">Logout 👋</button>

</div>

<hr>

<!-- MAIN -->
<div>

  <h2>👥 All Users</h2>

  <input type="text" id="searchUser" placeholder="Search users...">

  <br><br>

  <div id="usersList"></div>

</div>

<!-- ✅ SINGLE MODULE SCRIPT -->
<script type="module">

import { db, logoutUser } from "./firebase.js";
import { getDocs, collection } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";


// 🔥 LOGOUT FIX
document.getElementById("logoutBtn")
  .addEventListener("click", logoutUser);


// ================= LOAD USERS =================
async function loadAllUsers(){

  const container = document.getElementById("usersList");
  container.innerHTML = "Loading...";

  try {
    const snapshot = await getDocs(collection(db, "users"));

    container.innerHTML = "";

    snapshot.forEach(doc => {

      const u = doc.data();

      const card = document.createElement("div");

      card.style.border = "1px solid #ccc";
      card.style.padding = "10px";
      card.style.marginBottom = "10px";

      card.innerHTML = `
        <b>👤 ${u.name || "No Name"}</b><br>
        📧 ${u.email || "No Email"}<br>
        🎭 Role: ${u.role || "N/A"}
      `;

      container.appendChild(card);
    });

    if(!container.innerHTML){
      container.innerHTML = "No users found";
    }

  } catch (err) {
    console.error("Load Users Error:", err);
    container.innerHTML = "Error loading users ❌";
  }
}


// ================= SEARCH =================
document.getElementById("searchUser")
  .addEventListener("keyup", function(){

    const q = this.value.toLowerCase();
    const users = document.querySelectorAll("#usersList div");

    users.forEach(u=>{
      u.style.display =
        u.innerText.toLowerCase().includes(q)
          ? "block"
          : "none";
    });

  });


// AUTO LOAD
loadAllUsers();

</script>

</body>
</html>
