<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Users | SkillBridge AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  
  <div class="admin-layout">
    
    <!-- SIDEBAR -->
    <aside class="sidebar">
      
      <h2>👑 Admin Panel</h2>
      
      <nav>
        <a href="admin-dashboard.html">Dashboard</a>
        <a href="admin-users.html" class="active">Users</a>
        <a href="admin-jobs.html">Jobs</a>
        <a href="admin-applications.html">Applications</a>
      </nav>
      
      <button id="logoutBtn">Logout 👋</button>
      
    </aside>
    
    <!-- MAIN -->
    <main class="main-content">
      
      <div class="page-top">
        <h1>👥 All Users</h1>
        <input type="text" id="searchUser" placeholder="Search users...">
      </div>
      
      <div id="usersList" class="grid-box"></div>
      
    </main>
    
  </div>
  
  <script type="module">
    import { db, logoutUser } from "./firebase.js";
    import {
      getDocs,
      collection
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
    
    document.getElementById("logoutBtn")
      .addEventListener("click", logoutUser);
    
    
    // LOAD USERS
    async function loadAllUsers() {
      
      const container = document.getElementById("usersList");
      container.innerHTML = `<p class="loading">Loading users...</p>`;
      
      try {
        
        const snapshot = await getDocs(collection(db, "users"));
        
        container.innerHTML = "";
        
        if (snapshot.empty) {
          container.innerHTML = `<p class="loading">No users found 🚫</p>`;
          return;
        }
        
        snapshot.forEach(doc => {
          
          const u = doc.data();
          
          const card = document.createElement("div");
          card.className = "user-card";
          
          card.innerHTML = `
        <h3>👤 ${u.name || "No Name"}</h3>
        <p>📧 ${u.email || "No Email"}</p>
        <span class="role-badge">${u.role || "N/A"}</span>
      `;
          
          container.appendChild(card);
          
        });
        
      } catch (err) {
        
        console.error(err);
        container.innerHTML = `<p class="loading">Error loading users ❌</p>`;
        
      }
      
    }
    
    
    // SEARCH
    document.getElementById("searchUser")
      .addEventListener("keyup", function() {
        
        const q = this.value.toLowerCase();
        
        const users = document.querySelectorAll(".user-card");
        
        users.forEach(card => {
          
          card.style.display =
            card.innerText.toLowerCase().includes(q) ?
            "block" :
            "none";
          
        });
        
      });
    
    
    loadAllUsers();
  </script>
  
</body>

</html>
