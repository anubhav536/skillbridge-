<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | SkillBridge AI</title>

  <link rel="stylesheet" href="style.css?v=50">
</head>

<body class="profile-page">

<div class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <h2>👨‍🎓 Job Seeker Panel</h2>

    <nav>
      <a href="js-dashboard.html">Dashboard</a>
      <a href="js-jobs.html">Jobs</a>
      <a href="js-applications.html">Applications</a>
      <a href="js-resume.html">Resume Builder</a>
      <a href="js-analytics.html">Analytics</a>
      <a href="js-profile.html" class="active">Profile</a>
    </nav>

    <button id="logoutBtn">Logout 👋</button>

  </aside>



  <!-- MAIN -->
  <main class="main">

    <!-- TOP -->
    <div class="profile-top">

      <div>
        <h1>👤 My Profile</h1>
        <p>Polish your identity. Recruiters notice details.</p>
      </div>

      <div class="level-badge">
        🚀 Career Ready
      </div>

    </div>



    <!-- GRID -->
    <div class="profile-grid">

      <!-- LEFT CARD -->
      <section class="profile-card">

        <div class="avatar-circle" id="avatarText">
          U
        </div>

        <h2 id="name">Loading...</h2>

        <p id="email">Loading...</p>

        <div class="mini-info">
          <div>
            <span>Skills</span>
            <strong id="skillCount">0</strong>
          </div>

          <div>
            <span>Exp</span>
            <strong id="expCount">0y</strong>
          </div>
        </div>

        <div class="profile-lines">
          <p id="skillsText">Skills: Not added</p>
          <p id="expText">Experience: Not added</p>
        </div>

      </section>



      <!-- RIGHT CARD -->
      <section class="edit-card">

        <h3>✏️ Edit Profile</h3>

        <form id="profileForm">

          <label>Skills</label>
          <input
            type="text"
            id="skills"
            placeholder="HTML, CSS, JavaScript"
          >

          <label>Experience (Years)</label>
          <input
            type="number"
            id="exp"
            min="0"
            placeholder="0"
          >

          <button type="submit" id="saveBtn">
            Update Profile 🚀
          </button>

        </form>

      </section>

    </div>

  </main>

</div>



<script type="module">

import {
  logoutUser,
  updateUserProfile,
  protectPage
} from "./firebase.js";

protectPage("seeker");

document.getElementById("logoutBtn")
.addEventListener("click", logoutUser);


/* =========================
   SESSION
========================= */

function getSession(){
  try{
    return JSON.parse(localStorage.getItem("session"));
  }catch{
    return null;
  }
}


/* =========================
   CHECK PROFILE COMPLETE
========================= */

function isProfileComplete(user){
  return (
    user.skills &&
    user.skills.trim().length > 0 &&
    user.exp !== undefined &&
    user.exp !== null &&
    user.exp !== ""
  );
}


/* =========================
   LOAD PROFILE
========================= */

function loadProfile(){

  const user = getSession();

  if(!user){
    window.location.href = "jobseeker-login.html";
    return;
  }

  const name = user.name || "User";
  const email = user.email || "No Email";
  const skills = user.skills || "";
  const exp = user.exp || "0";

  document.getElementById("name").innerText = name;
  document.getElementById("email").innerText = email;

  document.getElementById("avatarText")
  .innerText = name.charAt(0).toUpperCase();

  document.getElementById("skillsText")
  .innerText = "Skills: " + (skills || "Not added");

  document.getElementById("expText")
  .innerText = "Experience: " + exp + " year(s)";

  const skillCount = skills
    ? skills.split(",").filter(Boolean).length
    : 0;

  document.getElementById("skillCount").innerText = skillCount;
  document.getElementById("expCount").innerText = exp + "y";

  document.getElementById("skills").value = skills;
  document.getElementById("exp").value = exp;


  // 🔥 AUTO WARNING IF INCOMPLETE
  if(!isProfileComplete(user)){
    alert("⚠️ Please complete your profile before applying for jobs");
  }

}


/* =========================
   UPDATE PROFILE (MANDATORY)
========================= */

document.getElementById("profileForm")
.addEventListener("submit", async (e)=>{

  e.preventDefault();

  const btn = document.getElementById("saveBtn");

  btn.disabled = true;
  btn.innerText = "Saving...";

  const skills = document.getElementById("skills").value.trim();
  const exp = document.getElementById("exp").value.trim();


  // ❗ HARD VALIDATION
  if(!skills || !exp){

    alert("⚠️ Skills and Experience are mandatory!");

    btn.disabled = false;
    btn.innerText = "Update Profile 🚀";
    return;
  }

  try{

    await updateUserProfile({
      skills,
      exp: Number(exp)
    });

    loadProfile();

    alert("Profile Updated ✅");

  }catch(err){

    console.error(err);
    alert("Failed ❌");

  }

  btn.disabled = false;
  btn.innerText = "Update Profile 🚀";

});


loadProfile();

</script>
</body>
</html>
