<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile | SkillBridge AI</title>

  <!-- ✅ CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div>

  <h2>👨‍🎓 Job Seeker Panel</h2>

  <nav>
    <a href="js-dashboard.html">Dashboard</a><br>
    <a href="js-jobs.html">Jobs</a><br>
    <a href="js-applications.html">Applications</a><br>
    <a href="js-resume.html">Resume Builder</a><br>
    <a href="js-analytics.html">Analytics</a><br>
    <a href="js-profile.html">Profile</a><br>
  </nav>

  <!-- ✅ FIXED LOGOUT -->
  <button id="logoutBtn">Logout 👋</button>

</div>

<hr>

<!-- MAIN -->
<div>

  <h2>👤 My Profile</h2>

  <!-- VIEW -->
  <div>
    <p><b>Name:</b> <span id="pname">Loading...</span></p>
    <p><b>Email:</b> <span id="pemail">Loading...</span></p>
    <p><b>Skills:</b> <span id="pskills">Not added</span></p>
    <p><b>Experience:</b> <span id="pexp">Not added</span></p>
  </div>

  <hr>

  <!-- EDIT -->
  <div>

    <h3>Edit Profile</h3>

    <form id="profileForm">

      <label>Skills:</label><br>
      <input type="text" id="skills" placeholder="e.g. HTML, CSS, JS"><br><br>

      <label>Experience:</label><br>
      <input type="number" id="experience" placeholder="0"><br><br>

      <button type="submit">Update Profile 💾</button>

    </form>

  </div>

</div>

<!-- ✅ SINGLE MODULE SCRIPT -->
<script type="module">

import { db, logoutUser } from "./firebase.js";
import { getDoc, setDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// 🔥 LOGOUT FIX
document.getElementById("logoutBtn")
  .addEventListener("click", logoutUser);


// ================= SAFE SESSION =================
function getSession(){
  try {
    return JSON.parse(localStorage.getItem("session"));
  } catch {
    return null;
  }
}


// ================= LOAD PROFILE =================
async function loadProfile(){

  const user = getSession();

  if(!user || !user.email){
    alert("⚠️ Please login first");
    window.location.href = "index.html";
    return;
  }

  document.getElementById("pname").innerText = user.name || "User";
  document.getElementById("pemail").innerText = user.email;

  try {

    // 🔥 using email as id (same as your system)
    const snap = await getDoc(doc(db, "profiles", user.email));

    if(snap.exists()){
      const data = snap.data();

      document.getElementById("pskills").innerText =
        data.skills || "Not added";

      document.getElementById("pexp").innerText =
        data.experience || "Not added";
    }

  } catch (err) {
    console.error("Profile load error:", err);
  }

}


// ================= UPDATE PROFILE =================
document.getElementById("profileForm")
  .addEventListener("submit", async (e) => {

    e.preventDefault();

    const user = getSession();

    const skills = document.getElementById("skills").value.trim();
    const exp = document.getElementById("experience").value.trim();

    if(!skills){
      alert("⚠️ Add at least skills");
      return;
    }

    try {

      await setDoc(doc(db, "profiles", user.email), {
        skills,
        experience: exp || "0"
      });

      alert("Profile Updated ✅");

      loadProfile();

    } catch (err) {
      console.error("Update error:", err);
      alert("Update failed ❌");
    }

  });


// AUTO LOAD
loadProfile();

</script>

</body>
</html>
