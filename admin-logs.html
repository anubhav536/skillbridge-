<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Logs | SkillBridge AI</title>

<style>

/* SAME CSS (unchanged) */
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
  background: linear-gradient(135deg,#0f172a,#020617);
  color:white;
}

.dashboard{display:flex;}

.sidebar{
  width:240px;height:100vh;background:#020617;padding:20px;
  position:fixed;left:0;top:0;transition:0.3s;z-index:1000;
}

.sidebar nav a{
  display:block;padding:10px;border-radius:8px;margin-bottom:8px;
  color:white;text-decoration:none;
}

.sidebar nav a:hover,.sidebar nav a.active{background:#3b82f6;}

.main{margin-left:240px;padding:20px;width:100%;}

.card{background:#1e293b;padding:20px;border-radius:12px;margin-bottom:20px;}

table{width:100%;border-collapse:collapse;}

th,td{padding:12px;border-bottom:1px solid #334155;text-align:left;}
th{color:#94a3b8;}

input,select{
  width:100%;padding:10px;margin:10px 0;border-radius:8px;
  border:none;background:#0f172a;color:white;
}

.btn{
  padding:10px 15px;background:#3b82f6;border:none;
  border-radius:8px;color:white;cursor:pointer;
}

.topbar{
  display:flex;justify-content:space-between;
  align-items:center;margin-bottom:20px;
}

.menu-btn{display:none;font-size:22px;cursor:pointer;}

@media(max-width:768px){
  .sidebar{left:-100%;}
  .sidebar.active{left:0;}
  .main{margin-left:0;}
  .menu-btn{display:block;}
}

</style>
</head>

<body>

<div class="dashboard">

<aside class="sidebar" id="sidebar">
<h2>👑 Admin</h2>

<nav>
<a href="admin-dashboard.html">📊 Dashboard</a>
<a href="admin-users.html">👥 Users</a>
<a href="admin-jobs.html">💼 Jobs</a>
<a href="admin-applications.html">📄 Apps</a>
<a href="admin-flags.html">🚨 Flags</a>
<a href="admin-analytics.html">📈 Analytics</a>
<a href="admin-ai-control.html">🤖 AI</a>
<a href="admin-leaderboard.html">🏆 Rank</a>
<a href="admin-settings.html">⚙ Settings</a>
<a href="admin-logs.html" class="active">📜 Logs</a>
<a href="admin-notifications.html">📩 Notify</a>
<a href="admin-moderation.html">🛠 Mod</a>
</nav>

<a href="index.html" class="btn">Logout 👋</a>
</aside>

<main class="main">

<div class="topbar">
  <span class="menu-btn" onclick="toggleMenu()">☰</span>
  <h2>📜 Activity Logs</h2>
</div>

<div class="card">

<h3 style="margin-bottom:10px;">🧾 System Activity</h3>

<table id="logsTable">
<tr>
<th>Time</th>
<th>User</th>
<th>Action</th>
<th>Status</th>
</tr>
</table>

</div>

<div class="card">

<h3>🔍 Filters</h3>

<input type="text" id="filterUser" placeholder="Enter email">
<select id="filterAction">
<option value="">All</option>
<option>Login</option>
<option>Job Post</option>
<option>Delete</option>
</select>

<button class="btn" onclick="applyFilters()">Apply Filters</button>

</div>

</main>
</div>

<script type="module">

import { db } from "./firebase.js";
import {
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

let allLogs = [];

// 🔥 LOAD LOGS
async function loadLogs(){
  const table = document.getElementById("logsTable");

  const snapshot = await getDocs(collection(db,"logs"));

  allLogs = [];

  snapshot.forEach(doc=>{
    const data = doc.data();
    allLogs.push(data);
  });

  renderLogs(allLogs);
}

// 🧠 RENDER
function renderLogs(logs){
  const table = document.getElementById("logsTable");

  table.innerHTML = `
  <tr>
    <th>Time</th>
    <th>User</th>
    <th>Action</th>
    <th>Status</th>
  </tr>`;

  logs.forEach(l=>{
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${l.time || "-"}</td>
      <td>${l.user || "-"}</td>
      <td>${l.action || "-"}</td>
      <td>${l.status || "-"}</td>
    `;

    table.appendChild(row);
  });
}

// 🔍 FILTER
window.applyFilters = function(){

  const user = document.getElementById("filterUser").value.toLowerCase();
  const action = document.getElementById("filterAction").value;

  const filtered = allLogs.filter(log=>{
    return (
      (!user || (log.user && log.user.toLowerCase().includes(user))) &&
      (!action || log.action?.includes(action))
    );
  });

  renderLogs(filtered);
}

// LOAD ON START
loadLogs();

</script>

<script>
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
}

document.querySelectorAll(".sidebar a").forEach(link=>{
  link.addEventListener("click",()=>{
    if(window.innerWidth < 768){
      document.getElementById("sidebar").classList.remove("active");
    }
  });
});
</script>

</body>
</html>
