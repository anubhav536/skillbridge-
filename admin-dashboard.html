<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard | SkillBridge AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div>

  <h2>👑 Admin Panel</h2>

  <nav>
    <a href="admin-dashboard.html">Dashboard</a><br>
    <a href="admin-users.html">Users</a><br>
    <a href="admin-jobs.html">Jobs</a><br>
    <a href="admin-applications.html">Applications</a><br>
  </nav>

  <button onclick="logout()">Logout</button>

</div>

<hr>

<!-- MAIN CONTENT -->
<div>

  <h2>📊 Dashboard Overview</h2>

  <!-- STATS -->
  <div>
    <h3>📌 Total Users</h3>
    <p id="totalUsers">Loading...</p>
  </div>

  <div>
    <h3>💼 Total Jobs</h3>
    <p id="totalJobs">Loading...</p>
  </div>

  <div>
    <h3>📄 Total Applications</h3>
    <p id="totalApps">Loading...</p>
  </div>

</div>

<!-- JS -->
<script src="script.js"></script>
<script type="module" src="firebase.js"></script>

<!-- LOAD DATA -->
<script>
async function loadAdminDashboard(){

  const { getDocs, collection } = await import("https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js");
  const { db } = await import("./firebase.js");

  // USERS
  let usersSnap = await getDocs(collection(db, "users"));
  document.getElementById("totalUsers").innerText = usersSnap.size;

  // JOBS
  let jobsSnap = await getDocs(collection(db, "jobs"));
  document.getElementById("totalJobs").innerText = jobsSnap.size;

  // APPLICATIONS
  let appsSnap = await getDocs(collection(db, "applications"));
  document.getElementById("totalApps").innerText = appsSnap.size;
}

// AUTO LOAD
window.onload = () => {
  loadAdminDashboard();
};
</script>

</body>
</html>
