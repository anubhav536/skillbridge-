<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Moderation | Skillbridge</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <h1>🛠 Moderation Panel</h1>

  <div class="card">
    <h2>🚫 Reported Users</h2>

    <table>
      <tr>
        <th>User</th>
        <th>Reason</th>
        <th>Action</th>
      </tr>

      <tr>
        <td>user123@gmail.com</td>
        <td>Spam Activity</td>
        <td>
          <button>Ban</button>
          <button>Ignore</button>
        </td>
      </tr>
    </table>
  </div>

  <div class="card">
    <h2>📛 Reported Jobs</h2>

    <table>
      <tr>
        <th>Company</th>
        <th>Issue</th>
        <th>Action</th>
      </tr>

      <tr>
        <td>Fake Corp</td>
        <td>Fraud Job Posting</td>
        <td>
          <button>Delete</button>
          <button>Review</button>
        </td>
      </tr>
    </table>
  </div>

  <div class="card">
    <h2>🔒 User Control</h2>

    <input type="text" placeholder="Enter user email">

    <br><br>
    <button>Ban User</button>
    <button>Unban User</button>
  </div>

</div>

</body>
</html>
