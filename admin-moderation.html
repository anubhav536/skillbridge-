<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Moderation | SkillBridge AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
  background: linear-gradient(135deg,#0f172a,#020617);
  color:white;
}

.dashboard{display:flex}

.sidebar{
  width:240px;
  height:100vh;
  background:#020617;
  padding:20px;
  position:fixed;
  left:0;
  top:0;
}

.sidebar nav a{
  display:block;
  padding:10px;
  border-radius:8px;
  margin-bottom:8px;
  color:white;
  text-decoration:none;
}

.sidebar nav a:hover,
.sidebar nav a.active{
  background:#3b82f6;
}

.main{
  margin-left:240px;
  padding:20px;
  width:100%;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:20px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th, td{
  padding:10px;
  border-bottom:1px solid #334155;
}

.btn{
  padding:6px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-right:5px;
}

.ban{background:#ef4444;color:white;}
.ignore{background:#475569;color:white;}
.delete{background:#dc2626;color:white;}
.review{background:#3b82f6;color:white;}
.safe{background:#10b981;color:white;}

input{
  padding:8px;
  width:100%;
  border-radius:6px;
  border:none;
  margin-top:10px;
}

.top{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.menu-btn{display:none}

@media(max-width:768px){
  .sidebar{left:-100%}
  .sidebar.active{left:0}
  .main{margin-left:0}
  .menu-btn{display:block}
}
</style>
</head>

<body>

<div class="dashboard">

<aside class="sidebar" id="sidebar">
<h2>👑 Admin</h2>

<nav>
<a href="admin-dashboard.html">📊 Dashboard</a>
<a href="admin-users.html">👥 Users</a>
<a href="admin-jobs.html">💼 Jobs</a>
<a href="admin-applications.html">📄 Apps</a>
<a href="admin-flags.html">🚨 Flags</a>
<a href="admin-analytics.html">📈 Analytics</a>
<a href="admin-ai-control.html">🤖 AI</a>
<a href="admin-leaderboard.html">🏆 Rank</a>
<a href="admin-settings.html">⚙ Settings</a>
<a href="admin-logs.html">📜 Logs</a>
<a href="admin-notifications.html">📩 Notify</a>
<a href="admin-moderation.html" class="active">🛠 Mod</a>
</nav>

<a href="index.html" class="btn safe">Logout 👋</a>
</aside>

<main class="main">

<div class="top">
  <span class="menu-btn" onclick="toggleMenu()">☰</span>
  <h2>🛠 Moderation Panel</h2>
</div>

<!-- USERS -->
<div class="card">
<h3>🚫 Reported Users</h3>
<table id="userTable">
<tr><th>User</th><th>Reason</th><th>Action</th></tr>
</table>
</div>

<!-- JOBS -->
<div class="card">
<h3>📛 Reported Jobs</h3>
<table id="jobTable">
<tr><th>Company</th><th>Issue</th><th>Action</th></tr>
</table>
</div>

<!-- CONTROL -->
<div class="card">
<h3>🔒 User Control</h3>
<input type="text" id="emailInput" placeholder="Enter user email">
<br><br>
<button class="btn ban" onclick="manualBan()">Ban User</button>
<button class="btn safe" onclick="manualUnban()">Unban User</button>
</div>

</main>
</div>

<script type="module">
import { db } from "./firebase.js";
import {
  collection,
  getDocs,
  updateDoc,
  deleteDoc,
  doc,
  addDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* LOAD DATA */
async function loadModeration(){

  const userTable = document.getElementById("userTable");
  const jobTable = document.getElementById("jobTable");

  const snap = await getDocs(collection(db,"moderation"));

  snap.forEach(d=>{
    const data = d.data();

    if(data.type === "user"){
      userTable.innerHTML += `
      <tr>
        <td>${data.targetId}</td>
        <td>${data.reason}</td>
        <td>
          <button class="btn ban" onclick="ban('${d.id}')">Ban</button>
          <button class="btn ignore" onclick="ignore('${d.id}')">Ignore</button>
        </td>
      </tr>`;
    }

    if(data.type === "job"){
      jobTable.innerHTML += `
      <tr>
        <td>${data.targetId}</td>
        <td>${data.reason}</td>
        <td>
          <button class="btn delete" onclick="removeJob('${d.id}')">Delete</button>
          <button class="btn review" onclick="review('${d.id}')">Review</button>
        </td>
      </tr>`;
    }
  });
}

/* ACTIONS */
window.ban = async(id)=>{
  await updateDoc(doc(db,"moderation",id),{action:"banned"});
  await addDoc(collection(db,"logs"),{
    action:"User Banned",
    createdAt:Date.now()
  });
  location.reload();
}

window.ignore = async(id)=>{
  await deleteDoc(doc(db,"moderation",id));
  location.reload();
}

window.removeJob = async(id)=>{
  await deleteDoc(doc(db,"moderation",id));
  location.reload();
}

window.review = async(id)=>{
  alert("Marked for review");
}

/* MANUAL */
window.manualBan = async()=>{
  const email = document.getElementById("emailInput").value;

  await addDoc(collection(db,"moderation"),{
    type:"user",
    targetId:email,
    action:"banned",
    createdAt:Date.now()
  });

  alert("User banned");
}

window.manualUnban = async()=>{
  alert("Unban logic add later");
}

/* UI */
window.toggleMenu = function(){
  document.getElementById("sidebar").classList.toggle("active");
}

loadModeration();
</script>

</body>
</html>
