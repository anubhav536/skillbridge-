<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jobs | SkillBridge AI</title>

  <link rel="stylesheet" href="style.css?v=12">
</head>

<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>👨‍🎓 Job Seeker Panel</h2>

    <nav>
      <a href="js-dashboard.html">Dashboard</a>
      <a href="js-jobs.html">Jobs</a>
      <a href="js-applications.html">Applications</a>
      <a href="js-resume.html">Resume Builder</a>
      <a href="js-analytics.html">Analytics</a>
      <a href="js-profile.html">Profile</a>
    </nav>

    <button id="logoutBtn">Logout 👋</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <h2>💼 Available Jobs</h2>

    <input type="text" id="search" placeholder="Search jobs..." />

    <div id="jobsContainer" class="grid"></div>

  </div>

</div>

<script type="module">
import { db, logoutUser } from "./firebase.js";
import {
  getDocs,
  collection,
  addDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

document.getElementById("logoutBtn")
  .addEventListener("click", logoutUser);

// SESSION
function getSession() {
  try {
    return JSON.parse(localStorage.getItem("session"));
  } catch {
    return null;
  }
}

// LOAD JOBS
async function loadJobs() {

  const container = document.getElementById("jobsContainer");
  container.innerHTML = "Loading...";

  try {
    const snap = await getDocs(collection(db, "jobs"));

    if (snap.empty) {
      container.innerHTML = "<p>No jobs available ❌</p>";
      return;
    }

    container.innerHTML = "";

    snap.forEach(doc => {
      const job = doc.data();

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <h3>${job.title}</h3>
        <p><b>Skills:</b> ${job.skills.join(", ")}</p>
        <p><b>Posted by:</b> ${job.recruiter}</p>
        <button onclick="applyJob('${doc.id}')">Apply 🚀</button>
      `;

      container.appendChild(div);
    });

  } catch (err) {
    console.error(err);
    container.innerHTML = "Error loading jobs ❌";
  }
}

// APPLY JOB
window.applyJob = async function(jobId) {

  const user = getSession();

  if (!user) {
    alert("Login required ❌");
    return;
  }

  await addDoc(collection(db, "applications"), {
    jobId,
    user: user.email,
    status: "Applied",
    createdAt: new Date().toISOString()
  });

  alert("Applied successfully 🚀");
};

// LOAD
loadJobs();
</script>

</body>
</html>
