<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jobs | SkillBridge AI</title>

  <link rel="stylesheet" href="style.css?v=12">
</head>

<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>👨‍🎓 Job Seeker Panel</h2>

    <nav>
      <a href="js-dashboard.html">Dashboard</a>
      <a href="js-jobs.html">Jobs</a>
      <a href="js-applications.html">Applications</a>
      <a href="js-resume.html">Resume Builder</a>
      <a href="js-analytics.html">Analytics</a>
      <a href="js-profile.html">Profile</a>
    </nav>

    <button id="logoutBtn">Logout 👋</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <h2>💼 Available Jobs</h2>

    <input type="text" id="search" placeholder="Search jobs..." />

    <div id="jobsContainer" class="grid"></div>

  </div>

</div>
<script type="module">

import { db, getSession, applyJob,logoutUser } from "./firebase.js";
import { getDocs, collection } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

let allJobs = [];

window.addEventListener("DOMContentLoaded", async () => {
  
  document.getElementById("logoutBtn")
    .addEventListener("click", logoutUser);
  
  // baaki code...

  const searchBox = document.getElementById("search"); // ✅ FIXED
  const container = document.getElementById("jobsContainer");

  if (!searchBox || !container) {
    console.log("HTML id mismatch ❌");
    return;
  }

  // LOAD JOBS
  const snap = await getDocs(collection(db, "jobs"));

  snap.forEach(doc => {
  allJobs.push({
    id: doc.id,   // 🔥 THIS IS IMPORTANT
    ...doc.data()
  });
});

  renderJobs(allJobs);

  // SEARCH
  searchBox.addEventListener("input", (e) => {

    const value = e.target.value.toLowerCase();

    if (value === "") {
      renderJobs(allJobs);
      return;
    }

    const filtered = allJobs.filter(job => {

      const title = job.title?.toLowerCase() || "";
      const skills = job.skills?.join(" ").toLowerCase() || "";

      return title.includes(value) || skills.includes(value);

    });

    renderJobs(filtered);

  });

});


// RENDER FUNCTION
function renderJobs(jobs){

  const container = document.getElementById("jobsContainer");
  container.innerHTML = "";

  if(jobs.length === 0){
    container.innerHTML = "<p>No jobs found 😢</p>";
    return;
  }

  jobs.forEach((job, index) => {

    container.innerHTML += `
      <div class="card">
        <h3>${job.title}</h3>
        <p>Skills: ${job.skills.join(", ")}</p>
        <p>Posted by: ${job.recruiter}</p>
        <button class="applyBtn" data-index="${index}">
          Apply 🚀
        </button>
      </div>
    `;

  });

  // 🔥 ADD EVENT LISTENER AFTER RENDER
  document.querySelectorAll(".applyBtn").forEach(btn => {

   btn.addEventListener("click", async () => {
  
  const index = btn.dataset.index;
  const job = jobs[index];
  const user = getSession();
  
  if (!user) {
    alert("Login required ❌");
    return;
  }
  
  // ✅ duplicate check (correct place)
  const alreadyApplied = JSON.parse(localStorage.getItem("appliedJobs")) || [];
  
  if (alreadyApplied.includes(job.id)) {
    alert("Already applied ⚠️");
    return;
  }
  
  try {
    
    await applyJob({
      jobId: job.id,
      jobTitle: job.title,
      recruiter: job.recruiter,
      seeker: user.email,
      skills: job.skills
    });
    
    // ✅ save locally
    alreadyApplied.push(job.id);
    localStorage.setItem("appliedJobs", JSON.stringify(alreadyApplied));
    
    btn.innerText = "Applied ✅";
    btn.disabled = true;
    
    alert("Applied successfully 🚀");
    
  } catch (err) {
    console.log(err);
    alert("Failed ❌");
  }
  
});   

  });

}

</script>
</body>
</html>
