</html>
<link rel="stylesheet" href="style.css"><!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jobs | SkillBridge AI</title>

  <!-- ✅ CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div>

  <h2>👨‍🎓 Job Seeker Panel</h2>

  <nav>
    <a href="js-dashboard.html">Dashboard</a><br>
    <a href="js-jobs.html">Jobs</a><br>
    <a href="js-applications.html">Applications</a><br>
    <a href="js-resume.html">Resume Builder</a><br>
    <a href="js-analytics.html">Analytics</a><br>
    <a href="js-profile.html">Profile</a><br>
  </nav>

  <!-- ✅ FIXED LOGOUT -->
  <button id="logoutBtn">Logout 👋</button>

</div>

<hr>

<!-- MAIN -->
<div>

  <h2>💼 Available Jobs</h2>

  <input type="text" id="searchJob" placeholder="Search jobs...">

  <br><br>

  <div id="jobList">Loading...</div>

</div>

<!-- ✅ SINGLE MODULE SCRIPT -->
<script type="module">

import { db, logoutUser } from "./firebase.js";
import { getDocs, collection } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// 🔥 LOGOUT FIX
document.getElementById("logoutBtn")
  .addEventListener("click", logoutUser);


// ================= SAFE SESSION =================
function getSession(){
  try {
    return JSON.parse(localStorage.getItem("session"));
  } catch {
    return null;
  }
}


// ================= LOAD JOBS =================
async function loadJobsPage(){

  const user = getSession();

  if(!user || !user.email){
    alert("⚠️ Please login first");
    window.location.href = "index.html";
    return;
  }

  const container = document.getElementById("jobList");

  try {

    const snapshot = await getDocs(collection(db, "jobs"));

    container.innerHTML = "";

    if(snapshot.empty){
      container.innerHTML = "No jobs available";
      return;
    }

    snapshot.forEach(doc => {

      const j = doc.data();

      const card = document.createElement("div");

      card.style.border = "1px solid #ccc";
      card.style.padding = "10px";
      card.style.marginBottom = "10px";

      card.innerHTML = `
        <b>${j.title || "No Title"}</b><br>
        🧠 Skills: ${j.skills?.join(", ") || "N/A"}<br>
        💰 Salary: ${j.salary || "N/A"}<br><br>
      `;

      const btn = document.createElement("button");
      btn.innerText = "Apply 🚀";

      btn.addEventListener("click", () => {
        window.location.href = `js-apply.html?id=${doc.id}`;
      });

      card.appendChild(btn);
      container.appendChild(card);

    });

  } catch (err) {
    console.error("Jobs Load Error:", err);
    container.innerHTML = "Error loading jobs ❌";
  }

}


// ================= SEARCH =================
document.getElementById("searchJob")
  .addEventListener("keyup", function(){

    const q = this.value.toLowerCase();
    const jobs = document.querySelectorAll("#jobList div");

    jobs.forEach(j=>{
      j.style.display =
        j.innerText.toLowerCase().includes(q)
          ? "block"
          : "none";
    });

  });


// AUTO LOAD
loadJobsPage();

</script>

</body>
</html>
