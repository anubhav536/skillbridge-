<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Notifications | SkillBridge AI</title>

<style>

/* SAME CSS (unchanged) */
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
  background: linear-gradient(135deg,#0f172a,#020617);
  color:white;
}

.dashboard{display:flex;}

.sidebar{
  width:240px;
  height:100vh;
  background:#020617;
  padding:20px;
  position:fixed;
  left:0;
  top:0;
}

.sidebar nav a{
  display:block;
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
  color:white;
  text-decoration:none;
}

.sidebar nav a:hover,
.sidebar nav a.active{
  background:#3b82f6;
}

.main{
  margin-left:240px;
  padding:20px;
  width:100%;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:20px;
}

input, textarea, select{
  width:100%;
  padding:10px;
  margin-top:8px;
  margin-bottom:15px;
  border-radius:8px;
  border:none;
}

.btn{
  padding:10px 15px;
  background:#3b82f6;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

table{width:100%;border-collapse:collapse;}
th,td{padding:10px;border-bottom:1px solid #334155;}

.menu-btn{display:none;}

@media(max-width:768px){
  .sidebar{left:-100%;transition:0.3s;}
  .sidebar.active{left:0;}
  .main{margin-left:0;}
  .menu-btn{display:block;}
}

</style>
</head>

<body>

<div class="dashboard">

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">

<h2>👑 Admin</h2>

<nav>
<a href="admin-dashboard.html">📊 Dashboard</a>
<a href="admin-users.html">👥 Users</a>
<a href="admin-jobs.html">💼 Jobs</a>
<a href="admin-applications.html">📄 Apps</a>
<a href="admin-flags.html">🚨 Flags</a>
<a href="admin-analytics.html">📈 Analytics</a>
<a href="admin-ai-control.html">🤖 AI</a>
<a href="admin-leaderboard.html">🏆 Rank</a>
<a href="admin-settings.html">⚙ Settings</a>
<a href="admin-logs.html">📜 Logs</a>
<a href="admin-notifications.html" class="active">📩 Notify</a>
<a href="admin-moderation.html">🛠 Mod</a>
</nav>

<a href="index.html" class="btn">Logout 👋</a>

</aside>

<!-- MAIN -->
<main class="main">

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
  <span class="menu-btn" onclick="toggleMenu()">☰</span>
  <h2>📩 Notifications</h2>
</div>

<!-- SEND -->
<div class="card">

<h3>📢 Send Announcement</h3>

<label>Title</label>
<input type="text" id="title">

<label>Message</label>
<textarea id="message" rows="4"></textarea>

<label>Audience</label>
<select id="audience">
<option value="all">All Users</option>
<option value="jobseekers">Job Seekers</option>
<option value="recruiters">Recruiters</option>
</select>

<button class="btn" id="sendBtn">🚀 Send Notification</button>

</div>

<!-- HISTORY -->
<div class="card">

<h3>📜 Recent Notifications</h3>

<table>
<thead>
<tr>
<th>Title</th>
<th>Audience</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

</div>

</main>
</div>

<!-- FIREBASE SCRIPT -->
<script type="module">

import { db } from "./firebase.js";
import {
  collection,
  addDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// SEND NOTIFICATION
document.getElementById("sendBtn").addEventListener("click", async ()=>{

  const title = document.getElementById("title").value;
  const message = document.getElementById("message").value;
  const audience = document.getElementById("audience").value;

  if(!title || !message){
    alert("Fill all fields ⚠️");
    return;
  }

  await addDoc(collection(db,"notifications"),{
    title,
    message,
    audience,
    status:"sent",
    createdAt: Date.now()
  });

  alert("Notification sent 🚀");

  loadNotifications();
});

// LOAD DATA
async function loadNotifications(){

  const snap = await getDocs(collection(db,"notifications"));
  const table = document.getElementById("tableBody");
  table.innerHTML = "";

  snap.forEach(doc=>{
    const n = doc.data();

    table.innerHTML += `
      <tr>
        <td>${n.title}</td>
        <td>${n.audience}</td>
        <td>✅ ${n.status}</td>
      </tr>
    `;
  });
}

loadNotifications();

</script>

<script>
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
}

document.querySelectorAll(".sidebar a").forEach(link=>{
  link.addEventListener("click",()=>{
    if(window.innerWidth < 768){
      document.getElementById("sidebar").classList.remove("active");
    }
  });
});
</script>

</body>
</html>
