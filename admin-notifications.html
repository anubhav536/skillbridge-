<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Notifications | Skillbridge</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <h1>📩 Notifications Center</h1>

  <div class="card">
    <h2>📢 Send Announcement</h2>

    <label>Title</label>
    <input type="text" placeholder="Enter notification title">

    <label>Message</label>
    <textarea rows="4" placeholder="Write your message..."></textarea>

    <label>Target Audience</label>
    <select>
      <option>All Users</option>
      <option>Job Seekers</option>
      <option>Recruiters</option>
    </select>

    <br><br>
    <button>🚀 Send Notification</button>
  </div>

  <div class="card">
    <h2>📜 Recent Notifications</h2>

    <table>
      <tr>
        <th>Title</th>
        <th>Audience</th>
        <th>Status</th>
      </tr>

      <tr>
        <td>New Jobs Available</td>
        <td>All Users</td>
        <td>✅ Sent</td>
      </tr>

      <tr>
        <td>Profile Update Reminder</td>
        <td>Job Seekers</td>
        <td>🕒 Scheduled</td>
      </tr>

    </table>
  </div>

</div>

</body>
</html>
