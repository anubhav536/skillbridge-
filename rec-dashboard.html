<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Recruiter Dashboard | SkillBridge AI</title>

  <link rel="stylesheet" href="style.css?v=50">
</head>

<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <h2>🏢 Recruiter Panel</h2>

    <nav>
      <a href="r-dashboard.html">Dashboard</a>
      <a href="r-post-job.html">Post Job</a>
      <a href="r-manage-jobs.html">Manage Jobs</a>
      <a href="r-applicants.html">Applicants</a>
      <a href="r-analytics.html">Analytics</a>
      <a href="r-profile.html">Profile</a>
    </nav>

    <button id="logoutBtn">Logout 👋</button>

  </div>


  <!-- MAIN -->
  <div class="main">

    <h2>📊 Dashboard Overview</h2>

    <p id="welcome">Welcome...</p>

    <div class="grid">

      <div class="card">
        <h3>📦 Jobs Posted</h3>
        <p id="jobs">0</p>
      </div>

      <div class="card">
        <h3>👥 Total Applicants</h3>
        <p id="apps">0</p>
      </div>

      <div class="card">
        <h3>📈 Hiring Rate</h3>
        <p id="rate">0%</p>
      </div>

    </div>

  </div>

</div>


<script type="module">

import { db, logoutUser } from "./firebase.js";
import {
  getDocs,
  collection
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// LOGOUT
document.getElementById("logoutBtn")
  .addEventListener("click", logoutUser);

// SESSION
function getSession(){
  try {
    return JSON.parse(localStorage.getItem("session"));
  } catch {
    return null;
  }
}

// LOAD DASHBOARD
async function loadDashboard(){

  const user = getSession();

  if(!user){
    alert("Login required ❌");
    window.location.href = "index.html";
    return;
  }

  document.getElementById("welcome").innerText =
    "Welcome " + (user.name || "Recruiter");

  try {

    // JOBS
    const jobsSnap = await getDocs(collection(db, "jobs"));
    let myJobs = [];

    jobsSnap.forEach(doc=>{
      const j = doc.data();
      if(j.owner === user.email) myJobs.push(j);
    });

    document.getElementById("jobs").innerText = myJobs.length;


    // APPLICATIONS
    const appsSnap = await getDocs(collection(db, "applications"));
    let totalApps = 0;
    let hired = 0;

    appsSnap.forEach(doc=>{
      const a = doc.data();

      if(myJobs.some(j => j.id === a.jobId)){
        totalApps++;

        if(a.status === "Hired") hired++;
      }
    });

    document.getElementById("apps").innerText = totalApps;

    const rate = totalApps
      ? Math.round((hired / totalApps) * 100)
      : 0;

    document.getElementById("rate").innerText = rate + "%";

  } catch(err){
    console.error(err);
  }

}

loadDashboard();

</script>

</body>
</html>
