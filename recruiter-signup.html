<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recruiter Signup | SkillBridge AI</title>
<link rel="stylesheet" href="style.css?v=97">

<style>
/* PAGE SPECIAL CUSTOM STYLE */

.rec-signup-page{
  background:
  radial-gradient(circle at top right,#2563eb22 0%,transparent 28%),
  radial-gradient(circle at bottom left,#7c3aed22 0%,transparent 30%),
  #0f172a;
}

.signup-card{
  width:100%;
  max-width:520px;
  padding:34px;
  border-radius:24px;
  position:relative;
  overflow:hidden;
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.07);
}

.signup-card::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,transparent,rgba(255,255,255,.02));
  pointer-events:none;
}

.signup-badge{
  display:inline-block;
  padding:8px 14px;
  border-radius:999px;
  background:#1d4ed8;
  color:#fff;
  font-size:13px;
  font-weight:700;
  margin-bottom:16px;
}

.signup-card h2{
  font-size:34px;
  margin-bottom:8px;
}

.signup-card .subtitle{
  margin-bottom:22px;
  color:#cbd5e1;
  line-height:1.6;
}

.signup-form{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.input-group{
  display:flex;
  flex-direction:column;
}

.input-group label{
  margin-bottom:7px;
  font-size:14px;
  font-weight:700;
  color:#e2e8f0;
}

.input-group input{
  height:52px;
  border-radius:14px;
  transition:.25s;
}

.input-group input:focus{
  border-color:#3b82f6;
  box-shadow:0 0 0 4px rgba(59,130,246,.15);
}

.signup-btn{
  width:100%;
  margin-top:10px;
  padding:15px;
  border-radius:14px;
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  color:#fff;
  font-size:16px;
  font-weight:800;
}

.signup-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 24px rgba(37,99,235,.25);
}

.trust-row{
  margin-top:18px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.trust-box{
  background:#0b1220;
  border:1px solid #1e293b;
  border-radius:14px;
  padding:12px;
  text-align:center;
}

.trust-box h4{
  font-size:18px;
  color:#60a5fa;
}

.trust-box p{
  font-size:12px;
  color:#94a3b8;
  margin-top:4px;
}

.bottom-text{
  margin-top:18px;
}

.bottom-text a{
  font-weight:700;
}

@media(max-width:600px){

  .signup-card{
    padding:22px;
    border-radius:20px;
  }

  .signup-card h2{
    font-size:28px;
  }

  .trust-row{
    grid-template-columns:1fr;
  }

}
</style>
</head>

<body class="rec-signup-page">

<!-- NAVBAR -->
<nav class="navbar">

  <h2>🚀 SkillBridge AI</h2>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
  </div>

</nav>

<!-- SIGNUP -->
<section class="auth-container">

  <div class="card signup-card">

    <div class="signup-badge">
      🏢 Recruiter Onboarding
    </div>

    <h2>Recruiter Signup</h2>

    <p class="subtitle">
      Create your hiring HQ and start posting jobs instantly 🎯
    </p>

    <div class="signup-form">

      <div class="input-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter Full Name">
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter Work Email">
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Create Password">
      </div>

      <button id="signupBtn" class="signup-btn">
        Signup 🚀
      </button>

    </div>

    <!-- STATS -->
    <div class="trust-row">

      <div class="trust-box">
        <h4>10K+</h4>
        <p>Applicants</p>
      </div>

      <div class="trust-box">
        <h4>500+</h4>
        <p>Recruiters</p>
      </div>

      <div class="trust-box">
        <h4>24/7</h4>
        <p>AI Support</p>
      </div>

    </div>

    <p class="bottom-text">
      Already have an account?
      <a href="recruiter-login.html">Login</a>
    </p>

  </div>

</section>

<!-- FOOTER -->
<footer class="footer">
  <p>© 2026 SkillBridge AI</p>
</footer>
<script type="module">

import {
  signupUser,
  checkSessionUI
} from "./firebase.js";


// 🚀 SIGNUP BUTTON
document.getElementById("signupBtn")
.addEventListener("click", async () => {

  const btn = document.getElementById("signupBtn");

  const user = await signupUser(
    "recruiter",
    btn
  );

  if(user){

    // ✅ ROLE SET
    localStorage.setItem("role", "recruiter");

    // 🚀 Direct dashboard entry
    window.location.href = "recruiter-dashboard.html";

  } else {
    alert("Signup Failed ❌");
  }

});

</script>

</body>
</html>
