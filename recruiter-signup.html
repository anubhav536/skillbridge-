<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recruiter Signup | SkillBridge AI</title>

  <link rel="stylesheet" href="style.css?v=10">
</head>

<body>

<!-- NAVBAR -->
<nav>
  <h2>🚀 SkillBridge AI</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
  </div>
</nav>

<!-- SIGNUP -->
<section class="auth-container">

  <div class="card login-card">

    <h2>🏢 Recruiter Signup</h2>
    <p class="subtitle">
      Create your account to post jobs and hire talent
    </p>

    <!-- NAME -->
    <label>Full Name</label>
    <input type="text" id="name" placeholder="Enter Name">

    <!-- EMAIL -->
    <label>Email</label>
    <input type="email" id="email" placeholder="Enter Email">

    <!-- PASSWORD -->
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter Password">

    <!-- BUTTON -->
    <button id="signupBtn">Signup 🚀</button>

    <!-- LOGIN -->
    <p class="bottom-text">
      Already have an account?
      <a href="recruiter-login.html">Login</a>
    </p>

  </div>

</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 SkillBridge AI</p>
</footer>

<!-- SCRIPT -->
<script type="module">
  import { signupUser } from "./firebase.js";

  document.getElementById("signupBtn")
    .addEventListener("click", () => signupUser("recruiter", document.getElementById("signupBtn")));
</script>

</body>
</html>
