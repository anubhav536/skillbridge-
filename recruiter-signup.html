<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recruiter Signup | SkillBridge AI</title>

<link rel="stylesheet" href="style.css?v=97">
</head>

<body class="rec-signup-page">

<!-- NAVBAR -->
<nav class="navbar">

  <h2>🚀 SkillBridge AI</h2>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
  </div>

</nav>



<!-- SIGNUP -->
<section class="auth-container">

  <div class="card signup-card">

    <div class="signup-badge">
      🏢 Recruiter Onboarding
    </div>

    <h2>Recruiter Signup</h2>

    <p class="subtitle">
      Create your hiring HQ and start posting jobs instantly 🎯
    </p>


    <!-- NAME -->
    <label>Full Name</label>
    <input
      type="text"
      id="name"
      placeholder="Enter Name"
    >


    <!-- EMAIL -->
    <label>Email</label>
    <input
      type="email"
      id="email"
      placeholder="Enter Email"
    >


    <!-- PASSWORD -->
    <label>Password</label>
    <input
      type="password"
      id="password"
      placeholder="Enter Password"
    >


    <!-- BUTTON -->
    <button id="signupBtn" class="signup-btn">
      Signup 🚀
    </button>


    <!-- LOGIN -->
    <p class="bottom-text">
      Already have an account?
      <a href="recruiter-login.html">
        Login
      </a>
    </p>

  </div>

</section>



<!-- FOOTER -->
<footer class="footer">
  <p>© 2026 SkillBridge AI</p>
</footer>



<!-- SCRIPT -->
<script type="module">

import {
  signupUser,
  checkSessionUI
} from "./firebase.js";


checkSessionUI();


document.getElementById("signupBtn")
.addEventListener("click", () => {

  signupUser(
    "recruiter",
    document.getElementById("signupBtn")
  );

});

</script>

</body>
</html>
