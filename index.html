<!DOCTYPE html>
<html>
<head>
  <title>SkillBridge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🚀 SkillBridge</h1>

<div id="loginPage">
  <h2>Login</h2>
  <select id="role">
    <option value="student">Student</option>
    <option value="recruiter">Recruiter</option>
  </select>
  <input type="text" id="username" placeholder="Enter Name">
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">

  <!-- STUDENT PANEL -->
  <div id="studentPanel">
    <h2>Welcome Student 👨‍🎓</h2>
    <h3>Jobs</h3>
    <ul id="jobList"></ul>

    <h3>Applied Jobs</h3>
    <ul id="appliedJobs"></ul>
  </div>

  <!-- RECRUITER PANEL -->
  <div id="recruiterPanel">
    <h2>Recruiter Dashboard 🏢</h2>
    <input type="text" id="jobTitle" placeholder="Job Title">
    <input type="text" id="jobDesc" placeholder="Job Description">
    <button onclick="postJob()">Post Job</button>

    <h3>Applicants</h3>
    <ul id="applicants"></ul>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
<input type="text" id="search" placeholder="Search jobs..." onkeyup="searchJobs()">
<button onclick="showStats()">View Stats</button>
<button onclick="logout()">Logout</button>
