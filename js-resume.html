<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Resume Builder | SkillBridge AI</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<link rel="stylesheet" href="style.css?v=61">

</head>

<body class="resume-page">

<div class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <h2>👨‍🎓 Job Seeker Panel</h2>

    <nav>
      <a href="js-dashboard.html">Dashboard</a>
      <a href="js-jobs.html">Jobs</a>
      <a href="js-applications.html">Applications</a>
      <a href="js-resume.html" class="active">Resume Builder</a>
      <a href="js-analytics.html">Analytics</a>
      <a href="js-profile.html">Profile</a>
    </nav>

    <button id="logoutBtn">Logout 👋</button>

  </aside>



  <!-- MAIN -->
  <main class="main">

    <!-- TOP -->
    <div class="resume-top">

      <div>
        <h1>📄 Resume Builder</h1>
        <p>Create recruiter-ready resumes in one clean blast 🚀</p>
      </div>

      <div class="resume-chip">
        ATS + PDF + AI Writing
      </div>

    </div>



    <!-- FORM -->
    <section class="resume-form">

      <form id="resumeForm">

        <div class="two-col">

          <div>
            <label>Full Name</label>
            <input type="text" id="name">
          </div>

          <div>
            <label>Email</label>
            <input type="email" id="email">
          </div>

        </div>


        <div class="two-col">

          <div>
            <label>Phone</label>
            <input type="text" id="phone">
          </div>

          <div>
            <label>Skills (comma separated)</label>
            <input type="text" id="skills">
          </div>

        </div>


        <label>Education</label>
        <textarea id="education"></textarea>

        <label>Projects</label>
        <textarea id="projects"></textarea>

        <label>Experience</label>
        <textarea id="experience"></textarea>

        <label>Achievements</label>
        <textarea id="achievements"></textarea>

        <label>Career Objective</label>
        <textarea id="objective"></textarea>

        <button type="submit" id="generateBtn">
          Generate Resume 🚀
        </button>

      </form>

    </section>



    <!-- PREVIEW -->
    <section
      id="resumePreview"
      class="resume-preview"
      style="display:none;"
    ></section>

    <button
      id="printBtn"
      class="print-btn"
      style="display:none;"
    >
      Download PDF 🖨️
    </button>

  </main>

</div>



<script type="module">

import {
  logoutUser,
  saveResume,
  getSession
} from "./firebase.js";


/* =========================
   PAGE PROTECT
========================= */

const user = getSession();

if(!user){
  window.location.href =
    "js-resume.html";
}

if(user && user.role !== "seeker"){
  window.location.href =
    "index.html";
}


/* LOGOUT */
document.getElementById("logoutBtn")
.addEventListener("click", logoutUser);


/* PREFILL USER */
document.getElementById("name").value =
  user?.name || "";

document.getElementById("email").value =
  user?.email || "";


/* =========================
   AI TEXT IMPROVER
========================= */

function enhanceText(text){

  if(!text) return "";

  return text
  .replace(/made/gi,"Developed")
  .replace(/created/gi,"Designed")
  .replace(/built/gi,"Engineered")
  .replace(/worked on/gi,"Worked professionally on")
  .replace(/using/gi,"utilizing")
  .replace(/simple/gi,"efficient")
  .replace(/project/gi,"project solution");

}


/* =========================
   BULLET MAKER
========================= */

function convertToPoints(text){

  if(!text){
    return "<li>Not specified</li>";
  }

  return text
  .split(".")
  .filter(line => line.trim() !== "")
  .map(line =>
    `<li>${enhanceText(line.trim())}</li>`
  )
  .join("");

}


/* =========================
   ATS SCORE
========================= */

function calculateATS(data){

  let score = 0;

  const fullText = (
    data.education +
    data.projects +
    data.experience +
    data.achievements +
    data.objective
  ).toLowerCase();

  if(data.skills.length >= 3) score += 30;
  if(data.skills.length >= 6) score += 10;

  if(data.projects.length > 20) score += 15;
  if(data.experience.length > 20) score += 15;
  if(data.education.length > 20) score += 10;
  if(fullText.length > 200) score += 10;

  const words = [
    "developed",
    "designed",
    "engineered",
    "managed",
    "built"
  ];

  const found =
    words.filter(w =>
      fullText.includes(w)
    ).length;

  score += found * 2;

  return Math.min(
    100,
    Math.round(score)
  );

}


/* =========================
   RECRUITER VIEW
========================= */

function recruiterRating(score){

  if(score >= 90) return "🌟 Elite";
  if(score >= 75) return "🔥 Strong";
  if(score >= 60) return "👍 Good";
  if(score >= 45) return "🙂 Average";

  return "⚠️ Improve More";

}


/* =========================
   GENERATE RESUME
========================= */

document.getElementById("resumeForm")
.addEventListener("submit", async (e)=>{

  e.preventDefault();

  const btn =
    document.getElementById("generateBtn");

  btn.disabled = true;
  btn.innerText = "Generating...";


  const name =
    document.getElementById("name")
    .value.trim();

  const email =
    document.getElementById("email")
    .value.trim();

  const phone =
    document.getElementById("phone")
    .value.trim();

  const skills =
    document.getElementById("skills")
    .value
    .split(",")
    .map(s => s.trim())
    .filter(Boolean);

  const education =
    enhanceText(
      document.getElementById("education").value.trim()
    );

  const projects =
    enhanceText(
      document.getElementById("projects").value.trim()
    );

  const experience =
    enhanceText(
      document.getElementById("experience").value.trim()
    );

  const achievements =
    enhanceText(
      document.getElementById("achievements").value.trim()
    );

  const objective =
    enhanceText(
      document.getElementById("objective").value.trim()
    );


  if(!name || !email){

    alert("Fill name and email ⚠️");

    btn.disabled = false;
    btn.innerText =
      "Generate Resume 🚀";

    return;

  }


  const atsScore =
    calculateATS({
      skills,
      education,
      projects,
      experience,
      achievements,
      objective
    });

  const rating =
    recruiterRating(atsScore);


  try{

    await saveResume({
      name,
      email,
      phone,
      skills,
      education,
      projects,
      experience,
      achievements,
      objective,
      atsScore
    });


    const preview =
      document.getElementById("resumePreview");


    preview.innerHTML = `

    <div class="resume-pro">

      <div class="left">

        <h1>${name}</h1>
        <p>${email}</p>
        <p>${phone}</p>

        <h3>📊 ATS Score</h3>
        <p class="green-big">
          ${atsScore}/100
        </p>

        <h3>👔 Recruiter Rating</h3>
        <p>${rating}</p>

        <h3>🛠 Skills</h3>

        ${
          skills.length
          ? skills.map(skill => `
            <div class="skill">

              <span>${skill}</span>

              <div class="bar">
                <div style="width:${Math.floor(Math.random()*30+70)}%"></div>
              </div>

            </div>
          `).join("")
          : "<p>No skills added</p>"
        }

      </div>



      <div class="right">

        <h3>🎯 Career Objective</h3>
        <p>
          ${objective || "Seeking growth opportunities."}
        </p>

        <h3>🎓 Education</h3>
        <p>
          ${education || "Not added"}
        </p>

        <h3>💼 Experience</h3>
        <ul>
          ${convertToPoints(experience)}
        </ul>

        <h3>🚀 Projects</h3>
        <ul>
          ${convertToPoints(projects)}
        </ul>

        <h3>🏆 Achievements</h3>
        <ul>
          ${convertToPoints(achievements)}
        </ul>

      </div>

    </div>

    `;


    preview.style.display =
      "block";

    document.getElementById("printBtn")
    .style.display = "inline-block";

    alert("Resume Generated ✅");

  }catch(err){

    console.error(err);
    alert("Failed ❌");

  }

  btn.disabled = false;
  btn.innerText =
    "Generate Resume 🚀";

});


/* =========================
   DOWNLOAD PDF
========================= */

document.getElementById("printBtn")
.addEventListener("click", ()=>{

  const element =
    document.getElementById("resumePreview");

  html2pdf()
  .set({

    margin:0.4,

    filename:
      "My_Resume.pdf",

    image:{
      type:"jpeg",
      quality:1
    },

    html2canvas:{
      scale:2
    },

    jsPDF:{
      unit:"in",
      format:"a4",
      orientation:"portrait"
    }

  })
  .from(element)
  .save();

});

</script>

</body>
</html>
