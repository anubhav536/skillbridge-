<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Builder | SkillBridge AI</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <link rel="stylesheet" href="style.css?v=20">
</head>

<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <h2>👨‍🎓 Job Seeker Panel</h2>

    <nav>
      <a href="js-dashboard.html">Dashboard</a>
      <a href="js-jobs.html">Jobs</a>
      <a href="js-applications.html">Applications</a>
      <a href="js-resume.html">Resume Builder</a>
      <a href="js-analytics.html">Analytics</a>
      <a href="js-profile.html">Profile</a>
    </nav>

    <button id="logoutBtn">Logout 👋</button>

  </div>

  <!-- MAIN -->
  <div class="main">

    <h2>📄 Resume Builder</h2>

    <!-- FORM -->
    <div class="resume-form">

      <form id="resumeForm">

        <label>Full Name</label>
<input type="text" id="name">

<label>Email</label>
<input type="email" id="email">

<label>Phone</label>
<input type="text" id="phone">

<label>Skills (comma separated)</label>
<input type="text" id="skills">

<label>Education</label>
<textarea id="education"></textarea>

<label>Projects</label>
<textarea id="projects"></textarea>

<label>Experience</label>
<textarea id="experience"></textarea>

<label>Achievements</label>
<textarea id="achievements"></textarea>

<label>Career Objective</label>
<textarea id="objective"></textarea>
        <button type="submit">Generate Resume 🚀</button>

      </form>

    </div>

    <!-- PREVIEW -->
    <div id="resumePreview" class="resume-preview"></div>

    <button id="printBtn" class="print-btn">Download / Print 🖨️</button>

  </div>

</div>

<!-- SCRIPT -->
<script type="module">

import { logoutUser, saveResume, getSession } from "./firebase.js";

document.getElementById("logoutBtn")
  .addEventListener("click", logoutUser);
function calculateATSScore(resume, jobSkills = []) {

  let score = 0;

  // 🔹 Skills Match (40 marks)
  const matchedSkills = resume.skills.filter(s =>
    jobSkills.includes(s.toLowerCase())
  );

  score += (matchedSkills.length / (jobSkills.length || 1)) * 40;

  // 🔹 Keywords (20 marks)
  const text = (
    resume.projects +
    resume.experience +
    resume.education
  ).toLowerCase();

  const keywords = ["developed", "engineered", "managed", "designed"];

  let keywordCount = keywords.filter(k => text.includes(k)).length;

  score += (keywordCount / keywords.length) * 20;

  // 🔹 Experience (20 marks)
  if (resume.experience && resume.experience.length > 20) {
    score += 20;
  }

  // 🔹 Resume Length Quality (20 marks)
  if (text.length > 200) {
    score += 20;
  }

  return Math.min(100, Math.round(score));
}

// 🔥 AI TEXT IMPROVE
function enhanceText(text) {
  if (!text) return "";
  
  return text
    .replace(/i /gi, "I ")
    .replace(/made/gi, "Developed")
    .replace(/worked on/gi, "Worked professionally on")
    .replace(/project/gi, "Project demonstrating practical skills in")
    .replace(/using/gi, "utilizing")
    .replace(/built/gi, "Engineered")
    .replace(/created/gi, "Designed and developed")
    .replace(/simple/gi, "efficient")
    .replace(/website/gi, "responsive web application");
}
// Auto Bullet Generator 
function convertToPoints(text) {
  if (!text) return "<li>Not specified</li>";
  
  return text
    .split(".")
    .filter(line => line.trim() !== "")
    .map(line => `<li>${enhanceText(line.trim())}</li>`)
    .join("");
}

// 🚀 GENERATE + SAVE
document.getElementById("resumeForm")
  .addEventListener("submit", async (e) => {

    e.preventDefault();

    const btn = e.target.querySelector("button");
    btn.disabled = true;
    btn.innerText = "✨ Generating...";

    const user = getSession();

    if (!user) {
      alert("Login required ❌");
      btn.disabled = false;
      btn.innerText = "Generate Resume 🚀";
      return;
    }

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const phone = document.getElementById("phone").value;

    const skills = document.getElementById("skills").value
      .split(",")
      .map(s => s.trim())
      .filter(s => s);

    const education = enhanceText(document.getElementById("education").value);
    const projects = enhanceText(document.getElementById("projects").value);
    const experience = enhanceText(document.getElementById("experience").value);
    const achievements = enhanceText(document.getElementById("achievements").value);
    const objective = enhanceText(document.getElementById("objective").value);
const atsScore = calculateATSScore({
  skills,
  education,
  projects,
  experience
}, ["javascript","html","css"]);
    const preview = document.getElementById("resumePreview");

    try {

      await saveResume({
        name,
        email,
        phone,
        skills,
        education,
        projects,
        experience,
        achievements,
        objective
      });

      preview.style.display = "block";

      preview.innerHTML = `
<div class="resume-pro">

  <div class="left">

    <h1>${name || "Your Name"}</h1>
    <p>${email || ""}</p>
    <p>${phone || ""}</p>
    <h3>📊 ATS Score</h3>
<p style="font-size:22px;color:#22C55E;">
  ${atsScore}/100
</p>

    <h3>🛠 Skills</h3>
    ${skills.length ? skills.map(s => `
      <div class="skill">
        <span>${s}</span>
        <div class="bar"><div style="width:${Math.floor(Math.random()*40+60)}%"></div></div>
      </div>
    `).join("") : "<p>Not specified</p>"}

  </div>

  <div class="right">

    <h3>🎯 Career Objective</h3>
    <p>${objective || "Looking for opportunities to grow and contribute."}</p>

    <h3>🎓 Education</h3>
    <p>${education || "Not specified"}</p>

   <h3>💼 Experience</h3>
<ul>
  ${convertToPoints(experience)}
</ul>
    <h3>🚀 Projects</h3>
<ul>
  ${convertToPoints(projects)}
</ul>
   <h3>🏆 Achievements</h3>
<ul>
  ${convertToPoints(achievements)}
</ul>
  </div>

</div>
`;
      document.getElementById("printBtn").style.display = "block";

      alert("🔥 Resume Generated & Saved!");

    } catch (err) {
      console.error(err);
      alert("Error saving resume ❌");
    }

    btn.disabled = false;
    btn.innerText = "Generate Resume 🚀";
});


// 🖨️ PRINT
document.getElementById("printBtn")
  .addEventListener("click", () => {
    
    const element = document.getElementById("resumePreview");
    
    const opt = {
      margin: 0.5,
      filename: "My_Resume.pdf",
      image: { type: "jpeg", quality: 1 },
      html2canvas: { scale: 2 },
      jsPDF: { unit: "in", format: "a4", orientation: "portrait" }
    };
    
    html2pdf().set(opt).from(element).save();
    
  });

    
  

</script>
</body>
</html>
