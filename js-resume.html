</html>
<link rel="stylesheet" href="style.css"><!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Resume Builder | SkillBridge AI</title>

  <!-- ✅ CSS -->
  <link rel="stylesheet" href="style.css">

  <style>
    .resume-box {
      border: 1px solid #ccc;
      padding: 20px;
      margin-top: 20px;
      background: #fff;
    }

    .resume-box h2 {
      margin-bottom: 5px;
    }

    .resume-section {
      margin-top: 15px;
    }

    .resume-section h3 {
      margin-bottom: 5px;
      border-bottom: 1px solid #ddd;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div>

  <h2>👨‍🎓 Job Seeker Panel</h2>

  <nav>
    <a href="js-dashboard.html">Dashboard</a><br>
    <a href="js-jobs.html">Jobs</a><br>
    <a href="js-applications.html">Applications</a><br>
    <a href="js-resume.html">Resume Builder</a><br>
    <a href="js-analytics.html">Analytics</a><br>
    <a href="js-profile.html">Profile</a><br>
  </nav>

  <!-- ✅ FIXED LOGOUT -->
  <button id="logoutBtn">Logout 👋</button>

</div>

<hr>

<!-- MAIN -->
<div>

  <h2>📄 Resume Builder</h2>

  <!-- FORM -->
  <form id="resumeForm">

    <label>Full Name:</label><br>
    <input type="text" id="rname"><br><br>

    <label>Skills:</label><br>
    <input type="text" id="rskills" placeholder="HTML, CSS, JS"><br><br>

    <label>Education:</label><br>
    <input type="text" id="reducation"><br><br>

    <label>Projects:</label><br>
    <textarea id="rprojects" rows="4"></textarea><br><br>

    <button type="submit">Generate Resume 🚀</button>

  </form>

  <!-- PREVIEW -->
  <div id="resumePreview" class="resume-box" style="display:none;"></div>

  <br>

  <button id="printBtn" style="display:none;">Print / Download 🖨️</button>

</div>

<!-- ✅ MODULE SCRIPT -->
<script type="module">

import { logoutUser } from "./firebase.js";

// 🔥 LOGOUT FIX
document.getElementById("logoutBtn")
  .addEventListener("click", logoutUser);


// ================= GENERATE RESUME =================
document.getElementById("resumeForm")
  .addEventListener("submit", (e) => {

    e.preventDefault();

    const name = document.getElementById("rname").value;
    const skills = document.getElementById("rskills").value;
    const edu = document.getElementById("reducation").value;
    const proj = document.getElementById("rprojects").value;

    const preview = document.getElementById("resumePreview");

    preview.style.display = "block";

    preview.innerHTML = `
      <h2>${name}</h2>
      
      <div class="resume-section">
        <h3>Skills</h3>
        <p>${skills}</p>
      </div>

      <div class="resume-section">
        <h3>Education</h3>
        <p>${edu}</p>
      </div>

      <div class="resume-section">
        <h3>Projects</h3>
        <p>${proj}</p>
      </div>
    `;

    document.getElementById("printBtn").style.display = "inline-block";

  });


// ================= PRINT =================
document.getElementById("printBtn")
  .addEventListener("click", () => {

    const content = document.getElementById("resumePreview").innerHTML;

    const win = window.open("", "", "width=800,height=600");

    win.document.write(`
      <html>
      <head>
        <title>Resume</title>
        <style>
          body { font-family: Arial; padding: 20px; }
          h2 { margin-bottom: 5px; }
          h3 { border-bottom: 1px solid #ccc; }
        </style>
      </head>
      <body>${content}</body>
      </html>
    `);

    win.document.close();
    win.print();

  });

</script>

</body>
</html>
