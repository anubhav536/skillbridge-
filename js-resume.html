<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Builder | SkillBridge AI</title>

  <link rel="stylesheet" href="style.css?v=20">
</head>

<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <h2>👨‍🎓 Job Seeker Panel</h2>

    <nav>
      <a href="js-dashboard.html">Dashboard</a>
      <a href="js-jobs.html">Jobs</a>
      <a href="js-applications.html">Applications</a>
      <a href="js-resume.html">Resume Builder</a>
      <a href="js-analytics.html">Analytics</a>
      <a href="js-profile.html">Profile</a>
    </nav>

    <button id="logoutBtn">Logout 👋</button>

  </div>

  <!-- MAIN -->
  <div class="main">

    <h2>📄 Resume Builder</h2>

    <!-- FORM -->
    <div class="resume-form">

      <form id="resumeForm">

        <label>Full Name</label>
        <input type="text" id="rname" placeholder="Enter your name">

        <label>Skills</label>
        <input type="text" id="rskills" placeholder="HTML, CSS, JS">

        <label>Education</label>
        <input type="text" id="reducation">

        <label>Projects</label>
        <textarea id="rprojects"></textarea>

        <button type="submit">Generate Resume 🚀</button>

      </form>

    </div>

    <!-- PREVIEW -->
    <div id="resumePreview" class="resume-preview"></div>

    <button id="printBtn" class="print-btn">Download / Print 🖨️</button>

  </div>

</div>

<!-- SCRIPT -->
<script type="module">

import { logoutUser } from "./firebase.js";

document.getElementById("logoutBtn")
  .addEventListener("click", logoutUser);


// GENERATE
document.getElementById("resumeForm")
  .addEventListener("submit", (e) => {

    e.preventDefault();

    const name = document.getElementById("rname").value;
    const skills = document.getElementById("rskills").value;
    const edu = document.getElementById("reducation").value;
    const proj = document.getElementById("rprojects").value;

    const preview = document.getElementById("resumePreview");

    preview.style.display = "block";

    preview.innerHTML = `
      <h2>${name}</h2>

      <div class="resume-section">
        <h3>Skills</h3>
        <p>${skills}</p>
      </div>

      <div class="resume-section">
        <h3>Education</h3>
        <p>${edu}</p>
      </div>

      <div class="resume-section">
        <h3>Projects</h3>
        <p>${proj}</p>
      </div>
    `;

    document.getElementById("printBtn").style.display = "block";
  });


// PRINT
document.getElementById("printBtn")
  .addEventListener("click", () => {

    const content = document.getElementById("resumePreview").innerHTML;

    const win = window.open("", "", "width=800,height=600");

    win.document.write(`
      <html>
      <head>
        <title>Resume</title>
        <style>
          body { font-family: Arial; padding: 20px; }
          h2 { margin-bottom: 5px; }
          h3 { border-bottom: 1px solid #ccc; }
        </style>
      </head>
      <body>${content}</body>
      </html>
    `);

    win.document.close();
    win.print();
  });

</script>

</body>
</html>
