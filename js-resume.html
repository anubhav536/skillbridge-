<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ULTRA PRO Resume Builder | SkillBridge AI</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<link rel="stylesheet" href="style.css?v=200">

<style>

/* =======================
ULTRA PRO INLINE CSS
======================= */

.resume-page{
  background:#0f172a;
  color:#fff;
}

.resume-wrap{
  max-width:1200px;
  margin:auto;
  padding:30px;
}

.pro-top{
  display:flex;
  justify-content:space-between;
  gap:20px;
  flex-wrap:wrap;
  margin-bottom:24px;
}

.pro-box{
  background:#1e293b;
  padding:22px;
  border-radius:18px;
}

.pro-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:22px;
}

.pro-form{
  background:#1e293b;
  padding:24px;
  border-radius:18px;
}

.pro-form label{
  display:block;
  margin:14px 0 8px;
}

.pro-form input,
.pro-form textarea,
.pro-form select{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#0f172a;
  color:#fff;
}

.pro-form textarea{
  min-height:90px;
  resize:vertical;
}

.pro-btn{
  margin-top:18px;
  width:100%;
  padding:15px;
  border:none;
  border-radius:14px;
  background:#2563eb;
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

.download-btn{
  background:#16a34a;
}

.preview-shell{
  background:#e5e7eb;
  padding:18px;
  border-radius:18px;
}

/* ========= Resume Design ========= */

#resumePreview{
  background:#fff;
  min-height:1123px;
}

.cv{
  display:grid;
  grid-template-columns:280px 1fr;
  min-height:1123px;
}

.cv-left{
  background:linear-gradient(180deg,#1d4ed8,#1e40af,#172554);
  color:#fff;
  padding:28px;
}

.cv-right{
  padding:28px;
  color:#111827;
}

.photo{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid rgba(255,255,255,.3);
  margin-bottom:18px;
}

.avatar{
  width:120px;
  height:120px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,.18);
  font-size:42px;
  margin-bottom:18px;
}

.cv h1{
  margin:0 0 10px;
  font-size:30px;
}

.cv h3{
  margin:20px 0 10px;
  font-size:16px;
}

.cv p,
.cv li{
  font-size:14px;
  line-height:1.6;
}

.cv ul{
  margin:0;
  padding-left:18px;
}

.skill-line{
  margin-bottom:12px;
}

.skill-line span{
  display:block;
  margin-bottom:5px;
}

.track{
  height:8px;
  background:rgba(255,255,255,.22);
  border-radius:20px;
  overflow:hidden;
}

.fill{
  height:100%;
  background:linear-gradient(90deg,#22c55e,#facc15,#fff);
}

.section{
  padding-bottom:14px;
  margin-bottom:14px;
  border-bottom:1px solid #e5e7eb;
}

.topbar{
  display:flex;
  justify-content:space-between;
  gap:15px;
  align-items:center;
}

.badge{
  background:#eff6ff;
  color:#1d4ed8;
  padding:8px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
}

.qr{
  width:90px;
  height:90px;
  border:1px solid #ddd;
}

@media(max-width:900px){

  .pro-grid{
    grid-template-columns:1fr;
  }

  .cv{
    grid-template-columns:1fr;
  }

}

</style>
</head>

<body class="resume-page">

<div class="resume-wrap">

<div class="pro-top">

<div class="pro-box">
<h1>📄 ULTRA PRO Resume Builder</h1>
<p>Recruiter magnet mode activated 🚀</p>
</div>

<div class="pro-box">
<p>Templates: Corporate • Modern • Classic</p>
<p>ATS • PDF • QR • Photo • Auto Skills</p>
</div>

</div>


<div class="pro-grid">

<!-- ================= FORM ================= -->

<div class="pro-form">

<form id="resumeForm">

<label>Full Name</label>
<input type="text" id="name">

<label>Email</label>
<input type="email" id="email">

<label>Phone</label>
<input type="text" id="phone">

<label>LinkedIn URL</label>
<input type="text" id="linkedin">

<label>Skills</label>
<input type="text" id="skills" placeholder="HTML, CSS, JavaScript">

<label>Education</label>
<textarea id="education"></textarea>

<label>Experience</label>
<textarea id="experience"></textarea>

<label>Projects</label>
<textarea id="projects"></textarea>

<label>Achievements</label>
<textarea id="achievements"></textarea>

<label>Career Objective</label>
<textarea id="objective"></textarea>

<label>Theme</label>
<select id="theme">
<option value="blue">Corporate Blue</option>
<option value="green">Growth Green</option>
<option value="dark">Executive Dark</option>
</select>

<label>Photo</label>
<input type="file" id="photo" accept="image/*">

<button type="submit" class="pro-btn">
Generate Resume 🚀
</button>

<button type="button" id="pdfBtn" class="pro-btn download-btn">
Download PDF 🖨️
</button>

</form>

</div>


<!-- ================= PREVIEW ================= -->

<div class="preview-shell">
<div id="resumePreview"></div>
</div>

</div>

</div>


<script>

const form = document.getElementById("resumeForm");
const preview = document.getElementById("resumePreview");
let photoURL = "";

document.getElementById("photo").addEventListener("change", e => {

  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(ev){
    photoURL = ev.target.result;
  };

  reader.readAsDataURL(file);

});


function bullets(text){

  if(!text.trim()) return "<li>Not specified</li>";

  return text.split(".")
  .filter(x => x.trim())
  .map(x => `<li>${x.trim()}</li>`)
  .join("");

}

function themeColor(theme){

  if(theme === "green"){
    return "linear-gradient(180deg,#16a34a,#15803d,#14532d)";
  }

  if(theme === "dark"){
    return "linear-gradient(180deg,#111827,#1f2937,#000)";
  }

  return "linear-gradient(180deg,#1d4ed8,#1e40af,#172554)";

}


form.addEventListener("submit", e => {

e.preventDefault();

const name = name.value || "Your Name";
const email = document.getElementById("email").value;
const phone = document.getElementById("phone").value;
const linkedin = document.getElementById("linkedin").value;
const skills = document.getElementById("skills").value.split(",").map(s=>s.trim()).filter(Boolean);
const education = document.getElementById("education").value;
const experience = document.getElementById("experience").value;
const projects = document.getElementById("projects").value;
const achievements = document.getElementById("achievements").value;
const objective = document.getElementById("objective").value;
const theme = document.getElementById("theme").value;

const ats = Math.min(100, 40 + skills.length*7 + (experience.length>20?20:0) + (projects.length>20?20:0));

preview.innerHTML = `

<div class="cv">

<div class="cv-left" style="background:${themeColor(theme)}">

${photoURL ? `<img src="${photoURL}" class="photo">` : `<div class="avatar">👤</div>`}

<h1>${name}</h1>
<p>${email}</p>
<p>${phone}</p>

<h3>📊 ATS Score</h3>
<p style="font-size:30px;font-weight:700">${ats}/100</p>

<h3>🛠 Skills</h3>

${
skills.length
? skills.map(s=>`
<div class="skill-line">
<span>${s}</span>
<div class="track">
<div class="fill" style="width:${70+Math.random()*25}%"></div>
</div>
</div>
`).join("")
: "<p>No skills</p>"
}

<h3>🔗 LinkedIn</h3>
<p>${linkedin || "--"}</p>

</div>


<div class="cv-right">

<div class="topbar">
<h2>Professional Resume</h2>
<div class="badge">SkillBridge AI</div>
</div>

<div class="section">
<h3>🎯 Career Objective</h3>
<p>${objective || "Seeking opportunities to contribute and grow."}</p>
</div>

<div class="section">
<h3>🎓 Education</h3>
<p>${education || "--"}</p>
</div>

<div class="section">
<h3>💼 Experience</h3>
<ul>${bullets(experience)}</ul>
</div>

<div class="section">
<h3>🚀 Projects</h3>
<ul>${bullets(projects)}</ul>
</div>

<div class="section">
<h3>🏆 Achievements</h3>
<ul>${bullets(achievements)}</ul>
</div>

</div>

</div>

`;

});


document.getElementById("pdfBtn")
.addEventListener("click", async ()=>{

if(!preview.innerHTML.trim()){
alert("Generate resume first ❌");
return;
}

await new Promise(r=>setTimeout(r,700));

html2pdf()
.set({
margin:0,
filename:"Ultra_Pro_Resume.pdf",
image:{type:"jpeg",quality:1},
html2canvas:{scale:3,useCORS:true},
jsPDF:{
unit:"px",
format:[794,1123],
orientation:"portrait"
}
})
.from(preview)
.save();

});

</script>

</body>
</html>
