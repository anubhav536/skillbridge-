<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Post Job | SkillBridge AI</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- NO CACHE -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <h2>🏢 Recruiter Panel</h2>

    <nav>
      <a href="rec-dashboard.html">Dashboard</a>
      <a href="rec-post-job.html">Post Job</a>
      <a href="rec-manage-jobs.html">Manage Jobs</a>
      <a href="rec-applicants.html">Applicants</a>
      <a href="rec-analytics.html">Analytics</a>
      <a href="rec-profile.html">Profile</a>
    </nav>

    <button id="logoutBtn">Logout 👋</button>

  </div>


  <!-- MAIN -->
  <div class="main">

    <h2>📢 Post a New Job</h2>

    <div class="card">

      <form id="jobForm">

        <label>Job Title</label>
        <input type="text" id="title" placeholder="Frontend Developer">

        <label>Skills Required</label>
        <input type="text" id="skills" placeholder="HTML, CSS, JS">

        <label>Salary</label>
        <input type="text" id="salary" placeholder="₹3-5 LPA">

        <label>Location</label>
        <input type="text" id="location" placeholder="Remote / Delhi">

        <button type="submit" id="postBtn">Post Job 🚀</button>

      </form>

    </div>

  </div>

</div>


<!-- SCRIPT -->
<script type="module">

import { postJob, logoutUser, protectPage } from "./firebase.js";

// protect recruiter page
protectPage("recruiter");

// logout
document.getElementById("logoutBtn")
  .addEventListener("click", logoutUser);

// post job
document.getElementById("jobForm")
  .addEventListener("submit", (e) => {
    e.preventDefault();
    postJob(document.getElementById("postBtn"));
  });

</script>

</body>
</html>
