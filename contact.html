<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | SkillBridge AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">

  <h2>🚀 SkillBridge AI</h2>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html" class="active">Contact</a>
  </div>

</nav>

<!-- CONTACT SECTION -->
<section class="contact-section">

  <div class="contact-left">

    <h1>📩 Contact Us</h1>

    <p>
      Have questions, ideas, feedback, or partnership plans?  
      Send us a message and we’ll get back soon.
    </p>

    <div class="info-box">
      <p>📧 support@skillbridge.ai</p>
      <p>📍 India</p>
      <p>⏰ Mon - Sat | 10 AM to 7 PM</p>
    </div>

  </div>


  <div class="contact-right">

    <form class="contact-form" onsubmit="sendMessage(event)">

      <label>Full Name</label>
      <input type="text" id="cname" placeholder="Enter your name" required>

      <label>Email Address</label>
      <input type="email" id="cemail" placeholder="Enter your email" required>

      <label>Your Message</label>
      <textarea id="cmsg" rows="6" placeholder="Write your message..." required></textarea>

      <button type="submit">Send Message 🚀</button>

    </form>

  </div>

</section>

<!-- FOOTER -->
<footer class="footer">
  <p>© 2026 SkillBridge AI. All rights reserved.</p>
</footer>

<script>
function sendMessage(e){

  e.preventDefault();

  const btn = document.querySelector(".contact-form button");

  btn.innerText = "Sending...";
  btn.disabled = true;

  setTimeout(() => {

    alert("Message sent successfully 🚀");

    document.getElementById("cname").value = "";
    document.getElementById("cemail").value = "";
    document.getElementById("cmsg").value = "";

    btn.innerText = "Send Message 🚀";
    btn.disabled = false;

  }, 1200);
}
</script>

</body>
</html>
