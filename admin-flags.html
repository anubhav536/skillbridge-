<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Admin Flags | SkillBridge AI</title>  

<style>  
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}  

body{
  background: linear-gradient(135deg,#0f172a,#020617);
  color:white;
}

.dashboard{display:flex;}

.sidebar{
  width:240px;
  height:100vh;
  background:#020617;
  padding:20px;
  position:fixed;
  left:0;
  top:0;
  transition:0.3s;
  z-index:1000;
}

.sidebar nav a{
  display:block;
  padding:10px;
  border-radius:8px;
  margin-bottom:8px;
  color:white;
  text-decoration:none;
}

.sidebar nav a.active,
.sidebar nav a:hover{background:#3b82f6;}

.main{
  margin-left:240px;
  padding:20px;
  width:100%;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:20px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  padding:10px;
  border-bottom:1px solid #334155;
}

.btn{
  padding:6px 12px;
  border:none;
  border-radius:6px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

.btn-danger{background:#ef4444;}

.top{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.menu-btn{display:none;}

@media(max-width:768px){
  .sidebar{left:-100%;}
  .sidebar.active{left:0;}
  .main{margin-left:0;}
  .menu-btn{display:block;}
}
</style>
</head>  

<body>  

<div class="dashboard">  

<aside class="sidebar" id="sidebar">
<h2>👑 Admin</h2>

<nav>
<a href="admin-dashboard.html">📊 Dashboard</a>
<a href="admin-users.html">👥 Users</a>
<a href="admin-jobs.html">💼 Jobs</a>
<a href="admin-applications.html">📄 Apps</a>
<a href="admin-flags.html" class="active">🚨 Flags</a>
<a href="admin-analytics.html">📈 Analytics</a>
<a href="admin-ai-control.html">🤖 AI</a>
<a href="admin-leaderboard.html">🏆 Rank</a>
<a href="admin-settings.html">⚙ Settings</a>
<a href="admin-logs.html">📜 Logs</a>
<a href="admin-notifications.html">📩 Notify</a>
<a href="admin-moderation.html">🛠 Mod</a>
</nav>

<a href="index.html" class="btn">Logout 👋</a>
</aside>

<main class="main">

<div class="top">
<span class="menu-btn" onclick="toggleMenu()">☰</span>
<h2>🚨 Fraud Detection Panel</h2>
</div>

<!-- USERS -->
<div class="card">
<h3>⚠️ Suspicious Users</h3>

<table>
<thead>
<tr>
<th>User</th>
<th>Issue</th>
<th>Action</th>
</tr>
</thead>

<tbody id="flagsTable"></tbody>

</table>
</div>

</main>
</div>

<script type="module">

import { db } from "./firebase.js";
import {
  collection,
  getDocs,
  deleteDoc,
  doc,
  updateDoc,
  addDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// 🔥 LOAD FLAGS
async function loadFlags(){
  const container = document.getElementById("flagsTable");
  container.innerHTML = "<tr><td colspan='3'>Loading...</td></tr>";

  const snapshot = await getDocs(collection(db,"flags"));
  container.innerHTML = "";

  snapshot.forEach(docSnap=>{
    const data = docSnap.data();

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${data.userEmail || "-"}</td>
      <td>${data.reason || "-"}</td>
      <td>
        <button class="btn btn-danger" onclick="banUser('${docSnap.id}','${data.userEmail}')">Ban</button>
        <button class="btn" onclick="ignoreFlag('${docSnap.id}')">Ignore</button>
      </td>
    `;

    container.appendChild(row);
  });
}

// 🚫 BAN USER
window.banUser = async function(id,email){

  await deleteDoc(doc(db,"flags",id));

  await addDoc(collection(db,"logs"),{
    action:"User Banned",
    user:email,
    status:"success",
    createdAt:Date.now()
  });

  loadFlags();
}

// ✅ IGNORE
window.ignoreFlag = async function(id){

  await updateDoc(doc(db,"flags",id),{
    status:"ignored"
  });

  loadFlags();
}

loadFlags();

</script>

<script>
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
}

document.querySelectorAll(".sidebar a").forEach(link=>{
  link.addEventListener("click",()=>{
    if(window.innerWidth < 768){
      document.getElementById("sidebar").classList.remove("active");
    }
  });
});
</script>

</body>
</html>
