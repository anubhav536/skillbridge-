<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Manage Jobs | SkillBridge AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div>

  <h2>🏢 Recruiter Panel</h2>

  <nav>
    <a href="rec-dashboard.html">Dashboard</a><br>
    <a href="rec-post-job.html">Post Job</a><br>
    <a href="rec-manage-jobs.html">Manage Jobs</a><br>
    <a href="rec-applicants.html">Applicants</a><br>
    <a href="rec-analytics.html">Analytics</a><br>
    <a href="rec-profile.html">Profile</a><br>
  </nav>

  <!-- ✅ LOGOUT -->
  <button id="logoutBtn">Logout 👋</button>

</div>

<hr>

<!-- MAIN -->
<div>

  <h2>🛠️ Manage Your Jobs</h2>

  <input type="text" id="searchJob" placeholder="Search your jobs...">

  <br><br>

  <div id="myJobs">Loading...</div>

</div>

<!-- ✅ SINGLE CLEAN MODULE SCRIPT -->
<script type="module">

  import { db, logoutUser, protectPage } from "./firebase.js";
  import {
    getDocs,
    collection,
    deleteDoc,
    doc
  } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";


  // 🔐 PAGE PROTECTION
  protectPage("recruiter");


  // 🔥 LOGOUT
  document.getElementById("logoutBtn")
    .addEventListener("click", logoutUser);


  // ================= LOAD JOBS =================
  async function loadMyJobs() {

    try {

      const user = JSON.parse(localStorage.getItem("session"));
      const container = document.getElementById("myJobs");

      container.innerHTML = "Loading...";

      const snapshot = await getDocs(collection(db, "jobs"));

      let html = "";

      snapshot.forEach(d => {

        const j = d.data();

        if (j.recruiter === user.email) {

          html += `
            <div class="card">
              <b>${j.title}</b><br>
              Skills: ${j.skills?.join(", ") || "N/A"}<br>
              Salary: ${j.salary || "N/A"}<br>

              <button class="deleteBtn" data-id="${d.id}">
                Delete ❌
              </button>

              <hr>
            </div>
          `;
        }
      });

      container.innerHTML = html || "No jobs found 😴";


      // ================= DELETE =================
      document.querySelectorAll(".deleteBtn").forEach(btn => {

        btn.addEventListener("click", async () => {

          const id = btn.dataset.id;

          if (!confirm("Delete this job? ❌")) return;

          await deleteDoc(doc(db, "jobs", id));

          alert("Job deleted 🚀");

          loadMyJobs(); // reload
        });

      });

    } catch (err) {
      console.error("Load Jobs Error:", err);
      document.getElementById("myJobs").innerHTML = "Error loading jobs ❌";
    }

  }


  // ================= SEARCH =================
  document.getElementById("searchJob")
    .addEventListener("keyup", function () {

      const q = this.value.toLowerCase();
      const jobs = document.querySelectorAll("#myJobs .card");

      jobs.forEach(j => {
        j.style.display =
          j.innerText.toLowerCase().includes(q)
            ? "block"
            : "none";
      });

    });


  // 🚀 AUTO LOAD
  loadMyJobs();

</script>

</body>
</html>
