<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manage Jobs | SkillBridge AI</title>

<link rel="stylesheet" href="style.css?v=94">

</head>

<body class="rec-manage-page">

<div class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <h2>🏢 Recruiter Panel</h2>

    <nav>
      <a href="rec-dashboard.html">Dashboard</a>
      <a href="rec-post-job.html">Post Job</a>
      <a href="rec-manage-jobs.html" class="active">Manage Jobs</a>
      <a href="rec-applicants.html">Applicants</a>
      <a href="rec-analytics.html">Analytics</a>
      <a href="rec-profile.html">Profile</a>
    </nav>

    <button id="logoutBtn">Logout 👋</button>

  </aside>



  <!-- MAIN -->
  <main class="main">

    <!-- TOP -->
    <div class="top-row">

      <div>
        <h1>🛠 Manage Your Jobs</h1>
        <p class="muted">
          Your hiring inventory, polished and ready ⚙️
        </p>
      </div>

      <input
        type="text"
        id="search"
        class="search-box"
        placeholder="Search your jobs..."
      >

    </div>



    <!-- STATS -->
    <section class="grid mini-grid">

      <div class="card mini-card">
        <h3>Total Jobs</h3>
        <p id="jobCount">0</p>
      </div>

      <div class="card mini-card">
        <h3>Visible</h3>
        <p id="visibleCount">0</p>
      </div>

    </section>



    <!-- JOB LIST -->
    <section
      id="jobsList"
      class="jobs-grid"
    ></section>

  </main>

</div>



<script type="module">

import {
  db,
  logoutUser,
  getSession
} from "./firebase.js";

import {
  getDocs,
  collection,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";


/* =========================
   PAGE PROTECT
========================= */

const user = getSession();

if(!user){
  window.location.href =
    "rec-manage-jobs.html";
}

if(user && user.role !== "recruiter"){
  window.location.href =
    "index.html";
}


/* =========================
   LOGOUT
========================= */

document.getElementById("logoutBtn")
.addEventListener("click", logoutUser);


/* =========================
   DATA
========================= */

let allJobs = [];


/* =========================
   LOAD JOBS
========================= */

async function loadJobs(){

  const list =
    document.getElementById("jobsList");

  list.innerHTML =
    `<p class="loading-text">
      Loading jobs...
    </p>`;

  try{

    const snap =
      await getDocs(collection(db,"jobs"));

    allJobs = [];

    snap.forEach(item => {

      const job = item.data();

      if(job.recruiter === user.email){

        allJobs.push({
          id: item.id,
          ...job
        });

      }

    });

    updateCounts(allJobs);
    renderJobs(allJobs);

  }catch(err){

    console.error(err);

    list.innerHTML =
      `<p class="loading-text">
        Failed to load ❌
      </p>`;

  }

}


/* =========================
   COUNTS
========================= */

function updateCounts(jobs){

  document.getElementById("jobCount")
  .innerText = allJobs.length;

  document.getElementById("visibleCount")
  .innerText = jobs.length;

}


/* =========================
   RENDER
========================= */

function renderJobs(jobs){

  const list =
    document.getElementById("jobsList");

  if(jobs.length === 0){

    list.innerHTML =
      `<p class="loading-text">
        No jobs found 😢
      </p>`;

    return;
  }

  list.innerHTML =
    jobs.map(job => `

      <div class="card job-card">

        <div class="job-head">

          <h3>
            ${job.title || "Untitled Job"}
          </h3>

          <span class="job-chip">
            🔥 Active
          </span>

        </div>

        <p>
          <b>Skills:</b>
          ${
            Array.isArray(job.skills)
            ? job.skills.join(", ")
            : (job.skills || "N/A")
          }
        </p>

        <p>
          <b>Salary:</b>
          ${job.salary || "Not specified"}
        </p>

        <p>
          <b>Location:</b>
          ${job.location || "Remote / N/A"}
        </p>

        <div class="btn-row">

          <button
            class="danger-btn deleteBtn"
            data-id="${job.id}"
          >
            Delete ❌
          </button>

        </div>

      </div>

    `).join("");

  attachDeleteEvents();

}


/* =========================
   DELETE EVENTS
========================= */

function attachDeleteEvents(){

  document
  .querySelectorAll(".deleteBtn")
  .forEach(btn => {

    btn.addEventListener(
      "click",
      async ()=>{

        const id =
          btn.dataset.id;

        const ok =
          confirm(
            "Delete this job?"
          );

        if(!ok) return;

        btn.disabled = true;
        btn.innerText =
          "Deleting...";

        try{

          await deleteDoc(
            doc(db,"jobs",id)
          );

          loadJobs();

        }catch(err){

          console.error(err);

          btn.disabled = false;
          btn.innerText =
            "Delete ❌";

          alert(
            "Delete failed ❌"
          );

        }

      }
    );

  });

}


/* =========================
   SEARCH
========================= */

document.getElementById("search")
.addEventListener("input",(e)=>{

  const val =
    e.target.value
    .toLowerCase()
    .trim();

  let filtered =
    [...allJobs];

  if(val){

    filtered =
      filtered.filter(job => {

        const title =
          (job.title || "")
          .toLowerCase();

        const location =
          (job.location || "")
          .toLowerCase();

        const skills =
          Array.isArray(job.skills)
          ? job.skills.join(" ")
              .toLowerCase()
          : (job.skills || "")
              .toLowerCase();

        return (
          title.includes(val) ||
          location.includes(val) ||
          skills.includes(val)
        );

      });

  }

  updateCounts(filtered);
  renderJobs(filtered);

});


/* =========================
   INIT
========================= */

loadJobs();

</script>

</body>
</html>
