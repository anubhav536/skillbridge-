<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manage Jobs | SkillBridge AI</title>
</head>

<body>

<!-- SIDEBAR -->
<div>

  <h2>🏢 Recruiter Panel</h2>

  <nav>
    <a href="rec-dashboard.html">Dashboard</a><br>
    <a href="rec-post-job.html">Post Job</a><br>
    <a href="rec-manage-jobs.html">Manage Jobs</a><br>
    <a href="rec-applicants.html">Applicants</a><br>
    <a href="rec-analytics.html">Analytics</a><br>
    <a href="rec-profile.html">Profile</a><br>
  </nav>

  <button onclick="logout()">Logout</button>

</div>

<hr>

<!-- MAIN CONTENT -->
<div>

  <h2>🛠️ Manage Your Jobs</h2>

  <!-- SEARCH -->
  <input type="text" id="searchJob" placeholder="Search your jobs...">

  <br><br>

  <!-- JOB LIST -->
  <div id="myJobs">
    <!-- Firebase jobs -->
  </div>

</div>

<!-- JS -->
<script src="script.js"></script>
<script type="module" src="firebase.js"></script>

<!-- JOB LOGIC -->
<script>
async function loadMyJobs(){

  const { getDocs, collection, deleteDoc, doc } = await import("https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js");
  const { db } = await import("./firebase.js");

  let user = JSON.parse(localStorage.getItem("session"));

  let container = document.getElementById("myJobs");
  container.innerHTML = "Loading...";

  let snapshot = await getDocs(collection(db, "jobs"));

  let html = "";

  snapshot.forEach(d => {
    let j = d.data();

    if(j.recruiter === user.email){

      html += `
        <div>
          <b>${j.title}</b><br>
          Skills: ${j.skills?.join(", ") || ""}<br>
          Salary: ${j.salary || "N/A"}<br>

          <button onclick="deleteJob('${d.id}')">Delete ❌</button>

          <hr>
        </div>
      `;
    }
  });

  container.innerHTML = html || "No jobs found";

  // DELETE FUNCTION
  window.deleteJob = async function(id){
    await deleteDoc(doc(db, "jobs", id));
    alert("Job Deleted 🚀");
    loadMyJobs();
  };
}

// SEARCH FILTER
document.getElementById("searchJob").addEventListener("keyup", function(){
  let q = this.value.toLowerCase();
  let jobs = document.querySelectorAll("#myJobs div");

  jobs.forEach(j=>{
    j.style.display = j.innerText.toLowerCase().includes(q) ? "block" : "none";
  });
});

// AUTO LOAD
window.onload = () => {
  loadMyJobs();
};
</script>

</body>
</html>
<link rel="stylesheet" href="style.css">
