<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Manage Jobs | SkillBridge AI</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <h2>🏢 Recruiter Panel</h2>

    <nav>
      <a href="rec-dashboard.html">Dashboard</a>
      <a href="rec-post-job.html">Post Job</a>
      <a href="rec-manage-jobs.html">Manage Jobs</a>
      <a href="rec-applicants.html">Applicants</a>
      <a href="rec-analytics.html">Analytics</a>
      <a href="rec-profile.html">Profile</a>
    </nav>

    <button id="logoutBtn">Logout 👋</button>

  </div>


  <!-- MAIN -->
  <div class="main">

    <h2>🛠 Manage Your Jobs</h2>

    <input 
      type="text" 
      id="search" 
      placeholder="Search your jobs..."
      class="search-box"
    >

    <div id="jobsList"></div>

  </div>

</div>


<!-- SCRIPT -->
<script type="module">

import { db, logoutUser, protectPage } from "./firebase.js";
import { 
  getDocs, 
  collection, 
  deleteDoc, 
  doc 
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// protect
protectPage("recruiter");

// logout
document.getElementById("logoutBtn")
  .addEventListener("click", logoutUser);


// session
function getSession(){
  try {
    return JSON.parse(localStorage.getItem("session"));
  } catch {
    return null;
  }
}


let allJobs = [];


// LOAD JOBS
async function loadJobs() {

  const user = getSession();
  const list = document.getElementById("jobsList");

  list.innerHTML = "Loading...";

  try {

    const snap = await getDocs(collection(db, "jobs"));

    allJobs = [];

    snap.forEach(d => {
      const j = d.data();

      if (j.recruiter === user.email) {
        allJobs.push({
          id: d.id,
          ...j
        });
      }
    });

    renderJobs(allJobs);

  } catch (err) {
    console.log(err);
    list.innerHTML = "Error loading jobs ❌";
  }

}


// RENDER
function renderJobs(jobs) {

  const list = document.getElementById("jobsList");

  if (jobs.length === 0) {
    list.innerHTML = "No jobs found 😢";
    return;
  }

  list.innerHTML = jobs.map(j => `
    <div class="card job-card">

      <h3>${j.title}</h3>

      <p><b>Skills:</b> ${j.skills?.join(", ") || ""}</p>
      <p><b>Salary:</b> ${j.salary || "Not specified"}</p>
      <p><b>Location:</b> ${j.location || "Not specified"}</p>

      <button onclick="deleteJob('${j.id}')">
        Delete ❌
      </button>

    </div>
  `).join("");

}


// DELETE
window.deleteJob = async function(id){

  if (!confirm("Delete this job?")) return;

  try {
    await deleteDoc(doc(db, "jobs", id));

    alert("Deleted ✅");
    loadJobs();

  } catch (err) {
    alert("Delete failed ❌");
  }

}


// SEARCH
document.getElementById("search")
  .addEventListener("input", (e) => {

    const val = e.target.value.toLowerCase();

    const filtered = allJobs.filter(j =>
      j.title.toLowerCase().includes(val)
    );

    renderJobs(filtered);

  });


// INIT
loadJobs();

</script>

</body>
</html>
