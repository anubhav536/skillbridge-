<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Jobs | SkillBridge AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div>

  <h2>👑 Admin Panel</h2>

  <nav>
    <a href="admin-dashboard.html">Dashboard</a><br>
    <a href="admin-users.html">Users</a><br>
    <a href="admin-jobs.html">Jobs</a><br>
    <a href="admin-applications.html">Applications</a><br>
  </nav>

  <button onclick="logout()">Logout</button>

</div>

<hr>

<!-- MAIN CONTENT -->
<div>

  <h2>💼 All Jobs</h2>

  <!-- SEARCH -->
  <input type="text" id="searchJob" placeholder="Search jobs...">

  <br><br>

  <!-- JOB LIST -->
  <div id="jobsList">
    <!-- Firebase jobs will load here -->
  </div>

</div>

<!-- JS -->
<script src="script.js"></script>
<script type="module" src="firebase.js"></script>

<!-- LOAD JOBS -->
<script>
async function loadAllJobs(){

  const { getDocs, collection, deleteDoc, doc } = await import("https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js");
  const { db } = await import("./firebase.js");

  let container = document.getElementById("jobsList");
  container.innerHTML = "Loading...";

  let snapshot = await getDocs(collection(db, "jobs"));

  let html = "";

  snapshot.forEach(d => {
    let j = d.data();

    html += `
      <div>
        <b>${j.title}</b><br>
        Skills: ${j.skills?.join(", ") || ""}<br>
        Salary: ${j.salary || "N/A"}<br>
        <button onclick="deleteJob('${d.id}')">Delete ❌</button>
        <hr>
      </div>
    `;
  });

  container.innerHTML = html || "No jobs found";

  // DELETE FUNCTION
  window.deleteJob = async function(id){
    await deleteDoc(doc(db, "jobs", id));
    alert("Job Deleted ❌");
    loadAllJobs();
  }
}

// SEARCH FILTER
document.getElementById("searchJob").addEventListener("keyup", function(){
  let q = this.value.toLowerCase();
  let jobs = document.querySelectorAll("#jobsList div");

  jobs.forEach(j=>{
    j.style.display = j.innerText.toLowerCase().includes(q) ? "block" : "none";
  });
});

// AUTO LOAD
window.onload = () => {
  loadAllJobs();
};
</script>

</body>
</html>
