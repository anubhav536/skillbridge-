<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Jobs | SkillBridge AI</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

/* BODY */
body{
  background: linear-gradient(135deg,#0f172a,#020617);
  color:white;
}

/* LAYOUT */
.dashboard{
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  height:100vh;
  background:#020617;
  padding:20px;
  position:fixed;
  left:0;
  top:0;
  transition:0.3s;
  z-index:1000;
}

.sidebar h2{margin-bottom:20px;}

.sidebar nav a{
  display:block;
  padding:10px;
  border-radius:8px;
  margin-bottom:8px;
  color:white;
  text-decoration:none;
}

.sidebar nav a:hover,
.sidebar nav a.active{
  background:#3b82f6;
}

/* MAIN */
.main{
  margin-left:240px;
  padding:20px;
  width:100%;
}

/* CARD */
.card{
  background:#1e293b;
  padding:18px;
  border-radius:14px;
  margin-bottom:16px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-4px);
}

/* INPUT */
.input{
  width:100%;
  max-width:350px;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-bottom:20px;
  outline:none;
}

/* BUTTONS */
.btn{
  padding:8px 14px;
  background:#3b82f6;
  border-radius:8px;
  text-decoration:none;
  color:white;
  border:none;
  cursor:pointer;
}

.deleteBtn{
  margin-top:12px;
  background:#dc2626;
}

.deleteBtn:hover{
  background:#b91c1c;
}

/* EMPTY */
.empty-box{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  color:#cbd5e1;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.badge{
  background:#3b82f6;
  padding:5px 10px;
  border-radius:20px;
}

/* MENU */
.menu-btn{
  display:none;
  font-size:22px;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){

  .sidebar{left:-100%;}
  .sidebar.active{left:0;}

  .main{margin-left:0;}

  .menu-btn{display:block;}
}

</style>
</head>

<body>

<div class="dashboard">

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
<h2>👑 Admin</h2>

<nav>
<a href="admin-dashboard.html">📊 Dashboard</a>
<a href="admin-users.html">👥 Users</a>
<a href="admin-jobs.html" class="active">💼 Jobs</a>
<a href="admin-applications.html">📄 Apps</a>
<a href="admin-flags.html">🚨 Flags</a>
<a href="admin-analytics.html">📈 Analytics</a>
<a href="admin-ai-control.html">🤖 AI</a>
<a href="admin-leaderboard.html">🏆 Rank</a>
<a href="admin-settings.html">⚙ Settings</a>
<a href="admin-logs.html">📜 Logs</a>
<a href="admin-notifications.html">📩 Notify</a>
<a href="admin-moderation.html">🛠 Mod</a>
</nav>

<button id="logoutBtn" class="btn">Logout 👋</button>

</aside>

<!-- MAIN -->
<main class="main">

<!-- TOP -->
<div class="top">
  <span class="menu-btn" onclick="toggleMenu()">☰</span>
  <h2>💼 All Jobs</h2>
  <span class="badge">Live</span>
</div>

<input type="text" id="searchJob" class="input" placeholder="Search jobs...">

<div id="jobsList"></div>

</main>

</div>

<script type="module">

import { db, logoutUser } from "./firebase.js";

import {
  getDocs,
  collection,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

document.getElementById("logoutBtn")
  .addEventListener("click", logoutUser);


// MOBILE MENU
window.toggleMenu = function(){
  document.getElementById("sidebar").classList.toggle("active");
}

// AUTO CLOSE MENU
document.querySelectorAll(".sidebar a").forEach(link=>{
  link.addEventListener("click",()=>{
    if(window.innerWidth < 768){
      document.getElementById("sidebar").classList.remove("active");
    }
  });
});


// LOAD JOBS
async function loadAllJobs(){

  const container = document.getElementById("jobsList");
  container.innerHTML = `<div class="empty-box">Loading jobs...</div>`;

  try{

    const snapshot = await getDocs(collection(db,"jobs"));

    container.innerHTML = "";

    if(snapshot.empty){
      container.innerHTML = `<div class="empty-box">No jobs found 🚫</div>`;
      return;
    }

    snapshot.forEach(d=>{

      const j = d.data();

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <b>💼 ${j.title || "No Title"}</b><br><br>
        🛠 ${j.skills?.join(", ") || "N/A"}<br>
        💰 ${j.salary || "N/A"}<br>

        <button class="btn deleteBtn">🗑 Delete</button>
      `;

      card.querySelector(".deleteBtn")
        .addEventListener("click", async()=>{

          const ok = confirm("Delete this job?");
          if(!ok) return;

          await deleteDoc(doc(db,"jobs",d.id));
          loadAllJobs();

        });

      container.appendChild(card);

    });

  }catch(err){
    container.innerHTML = `<div class="empty-box">Error loading jobs ❌</div>`;
  }
}


// SEARCH
document.getElementById("searchJob")
  .addEventListener("keyup",function(){

    const q = this.value.toLowerCase();

    document.querySelectorAll(".card")
      .forEach(c=>{
        c.style.display =
          c.innerText.toLowerCase().includes(q)
          ? "block" : "none";
      });

  });

loadAllJobs();

</script>

</body>
</html>
