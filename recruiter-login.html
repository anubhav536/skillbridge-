<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recruiter Login | SkillBridge AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav>
  <h2>🚀 SkillBridge AI</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
  </div>
</nav>

<!-- LOGIN -->
<section class="auth-container">

  <div class="card" style="width:100%; max-width:350px; text-align:center;">

    <h2>🏢 Recruiter Login</h2>
    <p style="color:#94A3B8; margin-bottom:15px;">
      Manage jobs & hire candidates
    </p>

    <label>Email</label>
    <input type="email" id="email" placeholder="Enter Email">

    <label style="margin-top:10px;">Password</label>
    <input type="password" id="password" placeholder="Enter Password">

    <button id="loginBtn" style="width:100%; margin-top:15px;">
      Login 🚀
    </button>

    <p style="margin-top:15px; font-size:14px;">
      Don’t have an account?
      <a href="recruiter-signup.html">Signup</a>
    </p>

  </div>

</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 SkillBridge AI</p>
</footer>

<!-- SCRIPT -->
<script type="module">
  import { loginUser } from "./firebase.js";

  document.getElementById("loginBtn")
    .addEventListener("click", () => loginUser(document.getElementById("loginBtn")));
</script>

</body>
</html>
