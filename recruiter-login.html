<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recruiter Login | SkillBridge AI</title>

<link rel="stylesheet" href="style.css?v=96">
</head>

<body class="rec-login-page">

<!-- NAVBAR -->
<nav class="navbar">

  <h2>🚀 SkillBridge AI</h2>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
  </div>

</nav>



<!-- LOGIN -->
<section class="auth-container">

  <div class="card login-card recruiter-card">

    <div class="login-badge">
      🏢 Recruiter Access
    </div>

    <h2>Recruiter Login</h2>

    <p class="subtitle">
      Manage jobs, review talent, hire smarter 🎯
    </p>


    <!-- EMAIL -->
    <label>Email</label>
    <input
      type="email"
      id="email"
      placeholder="Enter Email"
    >


    <!-- PASSWORD -->
    <label>Password</label>
    <input
      type="password"
      id="password"
      placeholder="Enter Password"
    >


    <!-- FORGOT -->
    <p class="forgot-wrap">
      <a href="#" id="forgotPassword">
        Forgot Password?
      </a>
    </p>


    <!-- BUTTON -->
    <button id="loginBtn" class="login-btn">
      Login 🚀
    </button>


    <!-- SIGNUP -->
    <p class="bottom-text">
      Don’t have an account?
      <a href="recruiter-signup.html">
        Signup
      </a>
    </p>

  </div>

</section>



<!-- FOOTER -->
<footer class="footer">
  <p>© 2026 SkillBridge AI</p>
</footer>



<script type="module">

import {
  loginUser,
  resetPassword,
  checkSessionUI
} from "./firebase.js";



// 🔥 LOGIN BUTTON
document.getElementById("loginBtn")
.addEventListener("click", async () => {

  const btn = document.getElementById("loginBtn");

  const user = await loginUser(btn);

  if(user){

    // ✅ SET ROLE AFTER SUCCESS
    localStorage.setItem("role", "recruiter");

    // 🚀 Redirect to recruiter dashboard
    window.location.href = "recruiter-dashboard.html";

  } else {
    alert("Login Failed ❌");
  }

});


// 🔁 FORGOT PASSWORD
document.getElementById("forgotPassword")
.addEventListener("click", (e) => {

  e.preventDefault();

  const email =
    document.getElementById("email")
    .value.trim();

  if(!email){
    alert("Input Email First 📩");
    return;
  }

  resetPassword(email);

});


// 🔥 LOGOUT FUNCTION (GLOBAL)
window.logout = function(){
  localStorage.clear();   // 🧹 full clean
  window.location.href = "index.html";
};

</script>
</body>
</html>
