<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Analytics | SkillBridge AI</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <h2>🏢 Recruiter Panel</h2>

    <nav>
      <a href="rec-dashboard.html">Dashboard</a>
      <a href="rec-post-job.html">Post Job</a>
      <a href="rec-manage-jobs.html">Manage Jobs</a>
      <a href="rec-applicants.html">Applicants</a>
      <a href="rec-analytics.html">Analytics</a>
      <a href="rec-profile.html">Profile</a>
    </nav>

    <button id="logoutBtn">Logout 👋</button>

  </div>


  <!-- MAIN -->
  <div class="main">

    <h2>📊 Hiring Analytics</h2>

    <div class="grid">

      <div class="card">
        <h3>📄 Total Applications</h3>
        <p id="totalApps">0</p>
      </div>

      <div class="card">
        <h3>✅ Shortlisted</h3>
        <p id="shortlisted">0</p>
      </div>

      <div class="card">
        <h3>📈 Hiring Rate</h3>
        <p id="rate">0%</p>
      </div>

    </div>

    <!-- TOP SKILLS -->
    <div class="card">
      <h3>🔥 Top Skills in Applicants</h3>
      <ul id="skillsList"></ul>
    </div>

  </div>

</div>


<script type="module">

import { db, logoutUser, protectPage } from "./firebase.js";
import { getDocs, collection } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

protectPage("recruiter");

document.getElementById("logoutBtn")
  .addEventListener("click", logoutUser);


// session
function getSession(){
  try {
    return JSON.parse(localStorage.getItem("session"));
  } catch {
    return null;
  }
}


// LOAD ANALYTICS
async function loadAnalytics(){

  const user = getSession();

  try {

    // 🔹 STEP 1: get recruiter jobs
    const jobsSnap = await getDocs(collection(db, "jobs"));

    let myJobIds = [];

    jobsSnap.forEach(doc => {
      const j = doc.data();
      if(j.recruiter === user.email){
        myJobIds.push(doc.id);
      }
    });


    // 🔹 STEP 2: get applications
    const appsSnap = await getDocs(collection(db, "applications"));

    let apps = [];

    appsSnap.forEach(doc => {
      const a = doc.data();

      if(myJobIds.includes(a.jobId)){
        apps.push(a);
      }
    });


    // ================= STATS =================

    document.getElementById("totalApps").innerText = apps.length;

    const shortlisted = apps.filter(a =>
      a.status === "Shortlisted"
    ).length;

    document.getElementById("shortlisted").innerText = shortlisted;

    const hired = apps.filter(a =>
      a.status === "Hired"
    ).length;

    const rate = apps.length
      ? Math.round((hired / apps.length) * 100)
      : 0;

    document.getElementById("rate").innerText = rate + "%";


    // ================= TOP SKILLS =================

    let skillMap = {};

    apps.forEach(a => {

      if(!a.skills) return;

      const arr = a.skills.split(",");

      arr.forEach(skill => {
        const s = skill.trim().toLowerCase();

        if(!s) return;

        skillMap[s] = (skillMap[s] || 0) + 1;
      });

    });


    // sort
    const sorted = Object.entries(skillMap)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 5);


    const list = document.getElementById("skillsList");

    if(sorted.length === 0){
      list.innerHTML = "<li>No data yet 😢</li>";
    } else {
      list.innerHTML = sorted.map(s =>
        `<li>${s[0]} (${s[1]})</li>`
      ).join("");
    }

  } catch (err){
    console.log(err);
  }

}


loadAnalytics();

</script>

</body>
</html>
