<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Recruiter Analytics | SkillBridge AI</title>
  
  <!-- ✅ CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  
  <!-- SIDEBAR -->
  <div>
    
    <h2>🏢 Recruiter Panel</h2>
    
    <nav>
      <a href="rec-dashboard.html">Dashboard</a><br>
      <a href="rec-post-job.html">Post Job</a><br>
      <a href="rec-manage-jobs.html">Manage Jobs</a><br>
      <a href="rec-applicants.html">Applicants</a><br>
      <a href="rec-analytics.html">Analytics</a><br>
      <a href="rec-profile.html">Profile</a><br>
    </nav>
    
    <!-- ✅ FIXED LOGOUT -->
    <button id="logoutBtn">Logout 👋</button>
    
  </div>
  
  <hr>
  
  <!-- MAIN -->
  <div>
    
    <h2>📊 Hiring Analytics</h2>
    
    <div>
      
      <div>
        <h3>📄 Total Applications</h3>
        <p id="totalApps">Loading...</p>
      </div>
      
      <div>
        <h3>✅ Shortlisted</h3>
        <p id="shortlisted">Loading...</p>
      </div>
      
      <div>
        <h3>📈 Hiring Rate</h3>
        <p id="hiringRate">Loading...</p>
      </div>
      
    </div>
    
    <hr>
    
    <div>
      
      <h3>🔥 Top Skills in Applicants</h3>
      <ul id="topSkills"></ul>
      
    </div>
    
  </div>
  
  <!-- ✅ SINGLE MODULE SCRIPT -->
  <script type="module">
    import { db, logoutUser } from "./firebase.js";
    import { getDocs, collection } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
    
    // 🔥 LOGOUT
    document.getElementById("logoutBtn")
      .addEventListener("click", logoutUser);
    
    
    // ================= SAFE SESSION =================
    function getSession() {
      try {
        return JSON.parse(localStorage.getItem("session"));
      } catch {
        return null;
      }
    }
    
    
    // ================= ANALYTICS =================
    async function loadRecruiterAnalytics() {
      
      const user = getSession();
      
      if (!user || user.role !== "recruiter") {
        alert("⚠️ Unauthorized access");
        window.location.href = "index.html";
        return;
      }
      
      try {
        
        const jobsSnap = await getDocs(collection(db, "jobs"));
        const appsSnap = await getDocs(collection(db, "applications"));
        
        const myJobs = [];
        
        // 🔥 filter only recruiter jobs
        jobsSnap.forEach(doc => {
          const j = doc.data();
          if (j.recruiter === user.email) {
            myJobs.push(doc.id);
          }
        });
        
        const apps = [];
        
        appsSnap.forEach(doc => {
          const a = doc.data();
          if (myJobs.includes(a.jobId)) {
            apps.push(a);
          }
        });
        
        // TOTAL
        document.getElementById("totalApps").innerText = apps.length;
        
        // SHORTLISTED
        const shortlisted = apps.filter(a => a.status === "Shortlisted").length;
        document.getElementById("shortlisted").innerText = shortlisted;
        
        // HIRING RATE
        const hired = apps.filter(a => a.status === "Hired").length;
        const rate = apps.length ? Math.round((hired / apps.length) * 100) : 0;
        
        document.getElementById("hiringRate").innerText = rate + "%";
        
        // ================= SKILLS =================
        const skillMap = {};
        
        apps.forEach(a => {
          if (a.skills) {
            a.skills.split(",").forEach(s => {
              s = s.trim().toLowerCase();
              skillMap[s] = (skillMap[s] || 0) + 1;
            });
          }
        });
        
        const sorted = Object.keys(skillMap)
          .sort((a, b) => skillMap[b] - skillMap[a]);
        
        const list = document.getElementById("topSkills");
        list.innerHTML = "";
        
        if (sorted.length === 0) {
          list.innerHTML = "<li>No data yet</li>";
        } else {
          sorted.slice(0, 5).forEach(s => {
            const li = document.createElement("li");
            li.innerText = `${s} (${skillMap[s]})`;
            list.appendChild(li);
          });
        }
        
      } catch (err) {
        console.error("Analytics Error:", err);
      }
      
    }
    
    
    // AUTO LOAD
    loadRecruiterAnalytics();
  </script>
  
</body>

</html>
