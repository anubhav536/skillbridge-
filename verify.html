<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verify Account | SkillBridge AI</title>

<link rel="stylesheet" href="style.css?v=98">
</head>

<body class="verify-page">

<!-- NAVBAR -->
<nav class="navbar">

  <h2>🚀 SkillBridge AI</h2>

  <div class="nav-links">
    <a href="index.html">Home</a>
  </div>

</nav>



<!-- VERIFY SECTION -->
<section class="verify-wrap">

  <div class="verify-card">

    <div class="verify-badge">
      🔐 Secure Access
    </div>

    <h1>Verify Your Account</h1>

    <p class="subtitle">
      Enter the verification code sent to your email inbox 📩
    </p>


    <!-- FORM -->
    <label>Verification Code</label>

    <input
      type="text"
      id="otp"
      maxlength="6"
      placeholder="Enter OTP"
    >


    <button
      id="verifyBtn"
      class="verify-btn">
      Verify ✅
    </button>


    <p id="error" class="error-text"></p>


    <div class="resend-box">

      <span>Didn’t receive code?</span>

      <button
        id="resendBtn"
        class="link-btn">
        Resend
      </button>

    </div>

  </div>

</section>



<!-- FOOTER -->
<footer class="footer">
  <p>© 2026 SkillBridge AI</p>
</footer>



<script>

/* verify */
document.getElementById("verifyBtn")
.addEventListener("click", verifyOTP);


function verifyOTP(){

  const input =
    document.getElementById("otp")
    .value.trim();

  const saved =
    localStorage.getItem("otp");

  const error =
    document.getElementById("error");

  if(input === saved){

    localStorage.setItem(
      "verified",
      "true"
    );

    alert("Account Verified ✅");

    window.location.href =
      "jobseeker-login.html";

  }else{

    error.innerText =
      "Invalid OTP ❌";

  }

}


/* resend */
document.getElementById("resendBtn")
.addEventListener("click", resendOTP);


function resendOTP(){

  const newOtp =
    Math.floor(
      100000 +
      Math.random() * 900000
    );

  localStorage.setItem(
    "otp",
    newOtp
  );

  alert(
    "New OTP: " +
    newOtp +
    " (simulation)"
  );

}

</script>

</body>
</html>
