<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Applications | SkillBridge AI</title>

  <link rel="stylesheet" href="style.css?v=15">
</head>

<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>👨‍🎓 Job Seeker Panel</h2>

    <nav>
      <a href="js-dashboard.html">Dashboard</a>
      <a href="js-jobs.html">Jobs</a>
      <a href="js-applications.html">Applications</a>
      <a href="js-resume.html">Resume Builder</a>
      <a href="js-analytics.html">Analytics</a>
      <a href="js-profile.html">Profile</a>
    </nav>

    <button id="logoutBtn">Logout 👋</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <h2>📄 My Applications</h2>

    <input type="text" id="search" placeholder="Search applications..." />

    <div id="appsContainer" class="grid"></div>

  </div>

</div>

<script type="module">
import { db, logoutUser } from "./firebase.js";
import {
  getDocs,
  collection
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

document.getElementById("logoutBtn")
  .addEventListener("click", logoutUser);

// SESSION
function getSession() {
  try {
    return JSON.parse(localStorage.getItem("session"));
  } catch {
    return null;
  }
}

// LOAD APPLICATIONS
async function loadApplications() {

  const container = document.getElementById("appsContainer");
  container.innerHTML = "Loading...";

  const user = getSession();

  if (!user) {
    alert("Login required ❌");
    window.location.href = "index.html";
    return;
  }

  try {

    const snap = await getDocs(collection(db, "applications"));

    let found = false;
    container.innerHTML = "";

    snap.forEach(doc => {
      const app = doc.data();

      if (app.user === user.email) {
        found = true;

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <h3>Job ID: ${app.jobId}</h3>
          <p><b>Status:</b> ${app.status}</p>
          <p><b>Applied On:</b> ${new Date(app.createdAt).toLocaleDateString()}</p>
        `;

        container.appendChild(div);
      }
    });

    if (!found) {
      container.innerHTML = "<p>No applications found ❌</p>";
    }

  } catch (err) {
    console.error(err);
    container.innerHTML = "Error loading applications ❌";
  }
}

loadApplications();
</script>

</body>
</html>
