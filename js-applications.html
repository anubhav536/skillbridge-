</html>
<link rel="stylesheet" href="style.css"><!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Applications | SkillBridge AI</title>

  <!-- ✅ CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div>

  <h2>👨‍🎓 Job Seeker Panel</h2>

  <nav>
    <a href="js-dashboard.html">Dashboard</a><br>
    <a href="js-jobs.html">Jobs</a><br>
    <a href="js-applications.html">Applications</a><br>
    <a href="js-resume.html">Resume Builder</a><br>
    <a href="js-analytics.html">Analytics</a><br>
    <a href="js-profile.html">Profile</a><br>
  </nav>

  <!-- ✅ FIXED LOGOUT -->
  <button id="logoutBtn">Logout 👋</button>

</div>

<hr>

<!-- MAIN -->
<div>

  <h2>📄 My Applications</h2>

  <input type="text" id="searchApp" placeholder="Search applications...">

  <br><br>

  <div id="apps"></div>

</div>

<!-- ✅ SINGLE MODULE SCRIPT -->
<script type="module">

import { db, logoutUser } from "./firebase.js";
import { getDocs, collection } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// 🔥 LOGOUT
document.getElementById("logoutBtn")
  .addEventListener("click", logoutUser);


// ================= SAFE SESSION =================
function getSession(){
  try {
    return JSON.parse(localStorage.getItem("session"));
  } catch {
    return null;
  }
}


// ================= LOAD APPLICATIONS =================
async function loadMyApplications(){

  const user = getSession();
  const container = document.getElementById("apps");

  if(!user || !user.email){
    alert("⚠️ Please login first");
    window.location.href = "index.html";
    return;
  }

  container.innerHTML = "Loading...";

  try {

    const snapshot = await getDocs(collection(db, "applications"));

    container.innerHTML = "";

    let found = false;

    snapshot.forEach(doc => {

      const a = doc.data();

      if(a.user === user.email){

        found = true;

        const card = document.createElement("div");

        card.style.border = "1px solid #ccc";
        card.style.padding = "10px";
        card.style.marginBottom = "10px";

        card.innerHTML = `
          <b>💼 Job ID:</b> ${a.jobId || "N/A"}<br>
          <b>📌 Status:</b> ${a.status || "Pending"}<br>
          <b>⏰ Applied:</b> ${
            a.time?.seconds
              ? new Date(a.time.seconds * 1000).toLocaleString()
              : "N/A"
          }
        `;

        container.appendChild(card);
      }

    });

    if(!found){
      container.innerHTML = "No applications found";
    }

  } catch (err) {
    console.error("Load Apps Error:", err);
    container.innerHTML = "Error loading applications ❌";
  }

}


// ================= SEARCH =================
document.getElementById("searchApp")
  .addEventListener("keyup", function(){

    const q = this.value.toLowerCase();
    const apps = document.querySelectorAll("#apps div");

    apps.forEach(a=>{
      a.style.display =
        a.innerText.toLowerCase().includes(q)
          ? "block"
          : "none";
    });

  });


// AUTO LOAD
loadMyApplications();

</script>

</body>
</html>
