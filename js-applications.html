<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Applications | SkillBridge AI</title>

  <link rel="stylesheet" href="style.css?v=15">
</head>

<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>👨‍🎓 Job Seeker Panel</h2>

    <nav>
      <a href="js-dashboard.html">Dashboard</a>
      <a href="js-jobs.html">Jobs</a>
      <a href="js-applications.html">Applications</a>
      <a href="js-resume.html">Resume Builder</a>
      <a href="js-analytics.html">Analytics</a>
      <a href="js-profile.html">Profile</a>
    </nav>

    <button id="logoutBtn">Logout 👋</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <h2>📄 My Applications</h2>
<div class="filters">

  <select id="statusFilter">
    <option value="all">All Status</option>
    <option value="Applied">Applied</option>
    <option value="Shortlisted">Accepted</option>
    <option value="Rejected">Rejected</option>
  </select>

  <select id="sortFilter">
    <option value="new">Most Recent</option>
    <option value="old">Oldest First</option>
  </select>

</div>
    <input type="text" id="search" placeholder="Search applications..." />

    <div id="appsContainer" class="grid"></div>

  </div>

</div>

<script type="module">
import { db, logoutUser } from "./firebase.js";
import {
  getDocs,
  collection
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

document.getElementById("logoutBtn")
  .addEventListener("click", logoutUser);

// SESSION
function getSession() {
  try {
    return JSON.parse(localStorage.getItem("session"));
  } catch {
    return null;
  }
}

let allApps = []; // 🔥 important

// LOAD APPLICATIONS
async function loadApplications() {

  const container = document.getElementById("appsContainer");
  container.innerHTML = "Loading...";

  const user = getSession();

  if (!user) {
    alert("Login required ❌");
    window.location.href = "index.html";
    return;
  }

  try {

    const snap = await getDocs(collection(db, "applications"));

    allApps = [];

    snap.forEach(doc => {
      const app = doc.data();

      if (app.seeker === user.email) {
        allApps.push(app); // 🔥 store all
      }
    });

    applyFilters(); // 🔥 first render

  } catch (err) {
    console.error(err);
    container.innerHTML = "Error loading applications ❌";
  }
}

// 🎯 FILTER FUNCTION
function applyFilters(){

  const searchVal = document.getElementById("search").value.toLowerCase();
  const statusVal = document.getElementById("statusFilter")?.value || "all";
  const sortVal = document.getElementById("sortFilter")?.value || "new";

  let filtered = [...allApps];

  // 🔍 SEARCH
  if(searchVal){
    filtered = filtered.filter(a =>
      (a.jobTitle || "").toLowerCase().includes(searchVal)
    );
  }

  // 📌 STATUS
  if(statusVal !== "all"){
    filtered = filtered.filter(a => a.status === statusVal);
  }

  // ⏳ SORT
  filtered.sort((a,b)=>{
    return sortVal === "new"
      ? b.createdAt - a.createdAt
      : a.createdAt - b.createdAt;
  });

  renderApps(filtered);
}

// 🧱 RENDER
function renderApps(apps){

  const container = document.getElementById("appsContainer");

  if(apps.length === 0){
    container.innerHTML = "<p>No applications found 😢</p>";
    return;
  }

  container.innerHTML = apps.map(app => `
    <div class="card">
      <h3>${app.jobTitle || "Unknown Job"}</h3>
      <p><b>Status:</b>
  <span class="status-${app.status?.toLowerCase()}">
    ${app.status}
  </span>
</p>
      <p><b>Applied On:</b> ${new Date(app.createdAt).toLocaleDateString()}</p>
      <p><b>Skills:</b> ${app.skills ? app.skills.join(", ") : "N/A"}</p>
    </div>
  `).join("");
}

// 🎧 LISTENERS
document.getElementById("search").addEventListener("input", applyFilters);

// optional (agar filters add kare)
document.addEventListener("change", (e)=>{
  if(e.target.id === "statusFilter" || e.target.id === "sortFilter"){
    applyFilters();
  }
});

// INIT
loadApplications();

</script>
</body>
</html>
