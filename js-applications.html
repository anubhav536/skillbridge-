<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Applications | SkillBridge AI</title>
</head>

<body>

<!-- SIDEBAR -->
<div>

  <h2>👨‍🎓 Job Seeker Panel</h2>

  <nav>
    <a href="js-dashboard.html">Dashboard</a><br>
    <a href="js-jobs.html">Jobs</a><br>
    <a href="js-applications.html">Applications</a><br>
    <a href="js-resume.html">Resume Builder</a><br>
    <a href="js-analytics.html">Analytics</a><br>
    <a href="js-profile.html">Profile</a><br>
  </nav>

  <button onclick="logout()">Logout</button>

</div>

<hr>

<!-- MAIN CONTENT -->
<div>

  <h2>📄 My Applications</h2>

  <!-- SEARCH -->
  <input type="text" id="searchApp" placeholder="Search applications...">

  <br><br>

  <!-- APPLICATION LIST -->
  <div id="apps">
    <!-- Firebase data will load here -->
  </div>

</div>

<!-- JS -->
<script src="script.js"></script>
<script type="module" src="firebase.js"></script>

<!-- LOAD APPLICATIONS -->
<script>
async function loadMyApplications(){

  const { getDocs, collection } = await import("https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js");
  const { db } = await import("./firebase.js");

  let user = JSON.parse(localStorage.getItem("session"));
  let container = document.getElementById("apps");

  container.innerHTML = "Loading...";

  let snapshot = await getDocs(collection(db, "applications"));

  let html = "";

  snapshot.forEach(doc=>{
    let a = doc.data();

    if(a.user === user.email){
      html += `
        <div>
          <b>Job ID:</b> ${a.jobId}<br>
          <b>Status:</b> ${a.status}<br>
          <b>Applied On:</b> ${a.time ? new Date(a.time.seconds * 1000).toLocaleString() : "N/A"}
          <hr>
        </div>
      `;
    }
  });

  container.innerHTML = html || "No applications found";
}

// SEARCH FILTER
document.getElementById("searchApp").addEventListener("keyup", function(){
  let q = this.value.toLowerCase();
  let apps = document.querySelectorAll("#apps div");

  apps.forEach(a=>{
    a.style.display = a.innerText.toLowerCase().includes(q) ? "block" : "none";
  });
});

// AUTO LOAD
window.onload = () => {
  loadMyApplications();
};
</script>

</body>
</html>
<link rel="stylesheet" href="style.css">
