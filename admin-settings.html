<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Settings | Skillbridge</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <h1>⚙️ Platform Settings</h1>

  <div class="card">
    <h2>👤 User Settings</h2>
    <label>
      <input type="checkbox" checked>
      Allow New User Signup
    </label><br><br>

    <label>
      <input type="checkbox">
      Require Admin Approval for Signup
    </label>
  </div>

  <div class="card">
    <h2>💼 Job Settings</h2>
    <label>
      <input type="checkbox" checked>
      Allow Job Posting
    </label><br><br>

    <label>
      <input type="checkbox">
      Manual Approval for Job Posts
    </label>
  </div>

  <div class="card">
    <h2>🔒 Security Settings</h2>
    <label>
      <input type="checkbox" checked>
      Enable Fraud Detection System
    </label><br><br>

    <label>
      <input type="checkbox">
      Enable Email Verification
    </label>
  </div>

  <div class="card">
    <h2>🛠 Platform Mode</h2>
    <select>
      <option>Live Mode</option>
      <option>Maintenance Mode</option>
    </select>
  </div>

  <button>💾 Save Settings</button>

</div>

</body>
</html>
