<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Settings | SkillBridge AI</title>

<style>

/* (same CSS — unchanged) */
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background: linear-gradient(135deg,#0f172a,#020617);color:white;}
.dashboard{display:flex;}
.sidebar{width:240px;height:100vh;background:#020617;padding:20px;position:fixed;left:0;top:0;transition:0.3s;z-index:1000;}
.sidebar h2{margin-bottom:20px;}
.sidebar nav a{display:block;padding:10px;border-radius:8px;margin-bottom:8px;color:white;text-decoration:none;}
.sidebar nav a:hover,.sidebar nav a.active{background:#3b82f6;}
.main{margin-left:240px;padding:20px;width:100%;}
.card{background:#1e293b;padding:20px;border-radius:12px;margin-bottom:15px;transition:0.3s;}
.card:hover{transform:translateY(-3px);}
.btn{display:inline-block;padding:10px 16px;background:#3b82f6;border-radius:8px;text-decoration:none;color:white;margin-top:15px;border:none;cursor:pointer;}
label{display:block;margin:10px 0;}
select{padding:8px;border-radius:6px;border:none;}
.menu-btn{display:none;font-size:22px;cursor:pointer;}

@media(max-width:768px){
.sidebar{left:-100%;}
.sidebar.active{left:0;}
.main{margin-left:0;}
.menu-btn{display:block;}
}

</style>
</head>

<body>

<div class="dashboard">

<aside class="sidebar" id="sidebar">
<h2>👑 Admin</h2>

<nav>
<a href="admin-dashboard.html">📊 Dashboard</a>
<a href="admin-users.html">👥 Users</a>
<a href="admin-jobs.html">💼 Jobs</a>
<a href="admin-applications.html">📄 Apps</a>
<a href="admin-flags.html">🚨 Flags</a>
<a href="admin-analytics.html">📈 Analytics</a>
<a href="admin-ai-control.html">🤖 AI</a>
<a href="admin-leaderboard.html">🏆 Rank</a>
<a href="admin-settings.html" class="active">⚙ Settings</a>
<a href="admin-logs.html">📜 Logs</a>
<a href="admin-notifications.html">📩 Notify</a>
<a href="admin-moderation.html">🛠 Mod</a>
</nav>

<a href="index.html" class="btn">Logout 👋</a>
</aside>

<main class="main">

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
  <span class="menu-btn" onclick="toggleMenu()">☰</span>
  <h2>⚙ Platform Settings</h2>
</div>

<!-- SETTINGS -->

<div class="card">
<h3>👤 User Settings</h3>
<label><input type="checkbox" id="allowSignup"> Allow New User Signup</label>
<label><input type="checkbox" id="adminApproval"> Require Admin Approval</label>
</div>

<div class="card">
<h3>💼 Job Settings</h3>
<label><input type="checkbox" id="jobPosting"> Allow Job Posting</label>
<label><input type="checkbox" id="manualJob"> Manual Job Approval</label>
</div>

<div class="card">
<h3>🔒 Security Settings</h3>
<label><input type="checkbox" id="fraudDetection"> Enable Fraud Detection</label>
<label><input type="checkbox" id="emailVerify"> Email Verification</label>
</div>

<div class="card">
<h3>🛠 Platform Mode</h3>
<select id="platformMode">
<option value="live">Live Mode</option>
<option value="maintenance">Maintenance Mode</option>
</select>
</div>

<button class="btn" id="saveBtn">💾 Save Settings</button>

</main>
</div>

<!-- 🔥 FIREBASE CONNECT -->
<script type="module">

import { db } from "./firebase.js";
import {
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// 🔹 LOAD SETTINGS
async function loadSettings(){

  const ref = doc(db, "settings", "main");
  const snap = await getDoc(ref);

  if(snap.exists()){
    const s = snap.data();

    document.getElementById("allowSignup").checked = s.allowSignup ?? true;
    document.getElementById("adminApproval").checked = s.adminApproval ?? false;
    document.getElementById("jobPosting").checked = s.jobPosting ?? true;
    document.getElementById("manualJob").checked = s.manualJob ?? false;
    document.getElementById("fraudDetection").checked = s.fraudDetection ?? true;
    document.getElementById("emailVerify").checked = s.emailVerify ?? false;
    document.getElementById("platformMode").value = s.maintenanceMode ? "maintenance" : "live";
  }
}

// 🔹 SAVE SETTINGS
document.getElementById("saveBtn").addEventListener("click", async ()=>{

  const data = {
    allowSignup: document.getElementById("allowSignup").checked,
    adminApproval: document.getElementById("adminApproval").checked,
    jobPosting: document.getElementById("jobPosting").checked,
    manualJob: document.getElementById("manualJob").checked,
    fraudDetection: document.getElementById("fraudDetection").checked,
    emailVerify: document.getElementById("emailVerify").checked,
    maintenanceMode: document.getElementById("platformMode").value === "maintenance"
  };

  await setDoc(doc(db, "settings", "main"), data);

  alert("✅ Settings Saved!");
});

// LOAD ON START
loadSettings();

</script>

<script>
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
}

document.querySelectorAll(".sidebar a").forEach(link=>{
  link.addEventListener("click",()=>{
    if(window.innerWidth < 768){
      document.getElementById("sidebar").classList.remove("active");
    }
  });
});
</script>

</body>
</html>
