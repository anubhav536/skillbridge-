<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply Job | SkillBridge AI</title>
  <link rel="stylesheet" href="style.css?v=50">
</head>

<body class="apply-page">

<div class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <h2>👨‍🎓 Job Seeker Panel</h2>

    <nav>
      <a href="js-dashboard.html">Dashboard</a>
      <a href="js-jobs.html">Jobs</a>
      <a href="js-applications.html">Applications</a>
      <a href="js-resume.html">Resume Builder</a>
      <a href="js-analytics.html">Analytics</a>
      <a href="js-profile.html">Profile</a>
    </nav>

    <button id="logoutBtn">Logout 👋</button>

  </aside>


  <!-- MAIN -->
  <main class="main">

    <!-- HEADER -->
    <div class="apply-header">

      <div>
        <h1>📥 Apply for Job</h1>
        <p class="subtext">
          One clean shot. One strong application 🎯
        </p>
      </div>

      <div class="job-pill">
        Job ID:
        <span id="jobId">Loading...</span>
      </div>

    </div>


    <!-- FORM CARD -->
    <section class="apply-card">

      <form id="applyForm" class="apply-form">

        <!-- Skills -->
        <label>Your Skills</label>
        <input
          type="text"
          id="skills"
          placeholder="HTML, CSS, JavaScript"
        >

        <!-- Experience -->
        <label>Experience (Years)</label>
        <input
          type="number"
          id="experience"
          min="0"
          placeholder="0"
        >

        <!-- Resume -->
        <label>Resume Summary</label>
        <textarea
          id="resumeText"
          rows="7"
          placeholder="Write about your skills, projects, achievements..."
        ></textarea>

        <!-- ATS -->
        <div class="score-box">
          <span>📊 ATS Readiness Score</span>
          <strong id="atsScore">0%</strong>
        </div>

        <!-- BUTTON -->
        <button type="submit" id="applyBtn">
          Submit Application 🚀
        </button>

      </form>

    </section>

  </main>

</div>


<script type="module">

import {
  logoutUser,
  applyJob,
  getSession
} from "./firebase.js";


/* =========================
   PAGE PROTECTION
========================= */

const user = getSession();

if(!user){
  window.location.href =
    "jobseeker-login.html";
}

if(user && user.role !== "seeker"){
  window.location.href =
    "index.html";
}


/* =========================
   LOGOUT
========================= */

document.getElementById("logoutBtn")
.addEventListener("click", logoutUser);


/* =========================
   GET JOB ID
========================= */

let currentJobId = "";

function loadJobId(){

  const params =
    new URLSearchParams(window.location.search);

  currentJobId =
    params.get("id");

  if(!currentJobId){
    alert("Invalid Job Link ❌");
    window.location.href =
      "js-jobs.html";
    return;
  }

  document.getElementById("jobId")
  .innerText = currentJobId;

}

loadJobId();


/* =========================
   ATS SCORE
========================= */

function calculateATS(){

  const skills =
    document.getElementById("skills")
    .value.trim();

  const exp =
    Number(
      document.getElementById("experience")
      .value || 0
    );

  const resume =
    document.getElementById("resumeText")
    .value.trim();

  let score = 0;

  if(skills.length >= 5) score += 35;
  if(exp >= 1) score += 25;
  if(resume.length >= 80) score += 40;

  score = Math.min(score,100);

  document.getElementById("atsScore")
  .innerText = score + "%";

}

document.getElementById("skills")
.addEventListener("input", calculateATS);

document.getElementById("experience")
.addEventListener("input", calculateATS);

document.getElementById("resumeText")
.addEventListener("input", calculateATS);


/* =========================
   APPLY JOB
========================= */

document.getElementById("applyForm")
.addEventListener("submit", async (e)=>{

  e.preventDefault();

  const btn =
    document.getElementById("applyBtn");

  btn.disabled = true;
  btn.innerText = "Submitting...";

  const user = getSession();

  if(!user){
    window.location.href =
      "jobseeker-login.html";
    return;
  }

  const skillsInput =
    document.getElementById("skills")
    .value.trim();

  const experience =
    document.getElementById("experience")
    .value.trim();

  const resume =
    document.getElementById("resumeText")
    .value.trim();

  if(!skillsInput || !resume){

    alert("Fill required fields ⚠️");

    btn.disabled = false;
    btn.innerText =
      "Submit Application 🚀";

    return;
  }

  const skills =
    skillsInput
    .split(",")
    .map(s => s.trim())
    .filter(Boolean);


  /* duplicate local check */
  let appliedJobs =
    JSON.parse(
      localStorage.getItem("appliedJobs")
    ) || [];

  if(appliedJobs.includes(currentJobId)){

    alert("Already applied ⚠️");

    btn.disabled = false;
    btn.innerText =
      "Submit Application 🚀";

    return;
  }


  try{

    await applyJob({

      user: user.email,
      seeker: user.email,
      email: user.email,
      name: user.name || "",

      jobId: currentJobId,
      jobTitle: "Applied Job",

      skills: skills,
      experience:
        experience || "0",

      resume: resume,
      status: "Applied"

    });


    /* save local */
    appliedJobs.push(currentJobId);

    localStorage.setItem(
      "appliedJobs",
      JSON.stringify(appliedJobs)
    );

    alert("Application Submitted ✅");

    window.location.href =
      "js-applications.html";

  }catch(err){

    console.error(err);

    alert("Submission Failed ❌");

    btn.disabled = false;
    btn.innerText =
      "Submit Application 🚀";

  }

});

</script>

</body>
</html>
