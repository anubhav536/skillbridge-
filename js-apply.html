<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Apply Job | SkillBridge AI</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css?v=31">
</head>

<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <h2>👨‍🎓 Job Seeker Panel</h2>

    <nav>
      <a href="js-dashboard.html">Dashboard</a>
      <a href="js-jobs.html">Jobs</a>
      <a href="js-applications.html">Applications</a>
      <a href="js-resume.html">Resume Builder</a>
      <a href="js-analytics.html">Analytics</a>
      <a href="js-profile.html">Profile</a>
    </nav>

    <button id="logoutBtn">Logout 👋</button>

  </div>


  <!-- MAIN -->
  <div class="main">

    <h2>📥 Apply for Job</h2>

    <p><b>Job ID:</b> <span id="jobId">Loading...</span></p>

    <div class="card">

      <form id="applyForm">

        <label>Your Skills:</label>
        <input type="text" id="skills" placeholder="HTML, CSS, JS">

        <label>Experience (years):</label>
        <input type="number" id="experience" placeholder="0">

        <label>Resume:</label>
        <textarea id="resumeText" rows="5" placeholder="Write your resume..."></textarea>

        <button type="submit">Submit Application 🚀</button>

      </form>

    </div>

  </div>

</div>


<script type="module">

import { logoutUser, applyJob } from "./firebase.js";

window.addEventListener("DOMContentLoaded", () => {

  // logout fix
  document.getElementById("logoutBtn")
    ?.addEventListener("click", logoutUser);

});


// session
function getSession(){
  try {
    return JSON.parse(localStorage.getItem("session"));
  } catch {
    return null;
  }
}


// job id
let currentJobId = "";

function getJobId(){
  const params = new URLSearchParams(window.location.search);
  currentJobId = params.get("id");

  document.getElementById("jobId").innerText = currentJobId || "N/A";
}


// apply
document.getElementById("applyForm")
  .addEventListener("submit", async (e) => {

    e.preventDefault();

    const user = getSession();

    if (!user) {
      alert("Login required ❌");
      window.location.href = "index.html";
      return;
    }

    const skillsInput = document.getElementById("skills").value;

    const skills = skillsInput
      .split(",")
      .map(s => s.trim());

    const exp = document.getElementById("experience").value.trim();
    const resume = document.getElementById("resumeText").value.trim();

    if (!skillsInput || !resume) {
      alert("Fill required fields ⚠️");
      return;
    }

    try {

      await applyJob({
        user: user.email,
        jobId: currentJobId,
        skills: skills.length ? skills : [],
        experience: exp || "0",
        resume
      });

      alert("Application Submitted ✅");

      window.location.href = "js-applications.html";

    } catch (err) {
      console.error(err);
      alert("Failed ❌");
    }

  });


// init
getJobId();

</script>

</body>
</html>
