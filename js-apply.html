</html>
<link rel="stylesheet" href="style.css"><!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Apply Job | SkillBridge AI</title>

  <!-- ✅ CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div>

  <h2>👨‍🎓 Job Seeker Panel</h2>

  <nav>
    <a href="js-dashboard.html">Dashboard</a><br>
    <a href="js-jobs.html">Jobs</a><br>
    <a href="js-applications.html">Applications</a><br>
    <a href="js-resume.html">Resume Builder</a><br>
    <a href="js-analytics.html">Analytics</a><br>
    <a href="js-profile.html">Profile</a><br>
  </nav>

  <!-- ✅ FIXED LOGOUT -->
  <button id="logoutBtn">Logout 👋</button>

</div>

<hr>

<!-- MAIN -->
<div>

  <h2>📥 Apply for Job</h2>

  <p><b>Job ID:</b> <span id="jobId">Loading...</span></p>

  <hr>

  <form id="applyForm">

    <label>Your Skills:</label><br>
    <input type="text" id="skills" placeholder="e.g. HTML, CSS, JS"><br><br>

    <label>Experience (years):</label><br>
    <input type="number" id="experience" placeholder="0"><br><br>

    <label>Resume:</label><br>
    <textarea id="resumeText" rows="5" placeholder="Write your resume..."></textarea><br><br>

    <button type="submit">Submit Application 🚀</button>

  </form>

</div>

<!-- ✅ SINGLE MODULE SCRIPT -->
<script type="module">

import { db, logoutUser } from "./firebase.js";
import { addDoc, collection } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// 🔥 LOGOUT FIX
document.getElementById("logoutBtn")
  .addEventListener("click", logoutUser);


// ================= SAFE SESSION =================
function getSession(){
  try {
    return JSON.parse(localStorage.getItem("session"));
  } catch {
    return null;
  }
}


// ================= GET JOB ID =================
let currentJobId = "";

function getJobId(){
  const params = new URLSearchParams(window.location.search);
  currentJobId = params.get("id");

  document.getElementById("jobId").innerText = currentJobId || "N/A";
}


// ================= APPLY =================
document.getElementById("applyForm")
  .addEventListener("submit", async (e) => {

    e.preventDefault();

    const user = getSession();

    if(!user || !user.email){
      alert("⚠️ Login required");
      window.location.href = "index.html";
      return;
    }

    const skills = document.getElementById("skills").value.trim();
    const exp = document.getElementById("experience").value.trim();
    const resume = document.getElementById("resumeText").value.trim();

    if(!skills || !resume){
      alert("⚠️ Fill required fields");
      return;
    }

    try {

      await addDoc(collection(db, "applications"), {
        user: user.email,
        jobId: currentJobId,
        skills,
        experience: exp || "0",
        resume,
        status: "Applied",
        time: new Date().toISOString()
      });

      alert("Application Submitted ✅");

      window.location.href = "js-applications.html";

    } catch (err) {
      console.error("Apply Error:", err);
      alert("Application failed ❌");
    }

  });


// AUTO LOAD
getJobId();

</script>

</body>
</html>
