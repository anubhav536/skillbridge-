<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Apply Job | SkillBridge AI</title>

  <link rel="stylesheet" href="style.css?v=30">
</head>

<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <h2>👨‍🎓 Job Seeker Panel</h2>

    <nav>
      <a href="js-dashboard.html">Dashboard</a>
      <a href="js-jobs.html">Jobs</a>
      <a href="js-applications.html">Applications</a>
      <a href="js-resume.html">Resume Builder</a>
      <a href="js-analytics.html">Analytics</a>
      <a href="js-profile.html">Profile</a>
    </nav>

    <button id="logoutBtn">Logout 👋</button>

  </div>


  <!-- MAIN -->
  <div class="main">

    <h2>📥 Apply for Job</h2>

    <p><b>Job ID:</b> <span id="jobId">Loading...</span></p>

    <div class="card">

      <form id="applyForm">

        <label>Your Skills:</label>
        <input type="text" id="skills" placeholder="HTML, CSS, JS">

        <label>Experience (years):</label>
        <input type="number" id="experience" placeholder="0">

        <label>Resume:</label>
        <textarea id="resumeText" rows="5" placeholder="Write your resume..."></textarea>

        <button type="submit">Submit Application 🚀</button>

      </form>

    </div>

  </div>

</div>


<!-- SCRIPT -->
<script type="module">

import { db, logoutUser } from "./firebase.js";
import { addDoc, collection } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// LOGOUT
document.getElementById("logoutBtn")
  .addEventListener("click", logoutUser);

// SESSION
function getSession(){
  try {
    return JSON.parse(localStorage.getItem("session"));
  } catch {
    return null;
  }
}

// JOB ID
let currentJobId = "";

function getJobId(){
  const params = new URLSearchParams(window.location.search);
  currentJobId = params.get("id");

  document.getElementById("jobId").innerText = currentJobId || "N/A";
}

// APPLY
document.getElementById("applyForm")
  .addEventListener("submit", async (e) => {

    e.preventDefault();

    const user = getSession();

    if(!user){
      alert("Login required ❌");
      window.location.href = "index.html";
      return;
    }

    const skills = document.getElementById("skills").value.trim();
    const exp = document.getElementById("experience").value.trim();
    const resume = document.getElementById("resumeText").value.trim();

    if(!skills || !resume){
      alert("Fill required fields ⚠️");
      return;
    }

    try {

      await addDoc(collection(db, "applications"), {
        user: user.email,
        jobId: currentJobId,
        skills,
        experience: exp || "0",
        resume,
        status: "Applied",
        time: new Date().toISOString()
      });

      alert("Application Submitted ✅");

      window.location.href = "js-applications.html";

    } catch (err) {
      console.error(err);
      alert("Failed ❌");
    }

  });

// LOAD
getJobId();

</script>

</body>
</html>
