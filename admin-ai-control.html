<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Control Panel | SkillBridge AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
  background: linear-gradient(135deg,#0f172a,#020617);
  color:white;
}

.dashboard{display:flex;}

.sidebar{
  width:240px;
  height:100vh;
  background:#020617;
  padding:20px;
  position:fixed;
  left:0;
  top:0;
  transition:0.3s;
  z-index:1000;
}

.sidebar nav a{
  display:block;
  padding:10px;
  border-radius:8px;
  margin-bottom:8px;
  color:white;
  text-decoration:none;
}

.sidebar nav a:hover,
.sidebar nav a.active{
  background:#3b82f6;
}

.main{
  margin-left:240px;
  padding:20px;
  width:100%;
}

.card{
  background:#1e293b;
  padding:18px;
  border-radius:12px;
  margin-bottom:20px;
}

input, select{
  width:100%;
  padding:10px;
  margin-top:8px;
  margin-bottom:15px;
  border-radius:8px;
  border:none;
}

.btn{
  padding:10px 16px;
  background:#3b82f6;
  border-radius:8px;
  color:white;
  border:none;
  cursor:pointer;
}

.menu-btn{
  display:none;
  font-size:22px;
  cursor:pointer;
}

#statusMsg{
  margin-top:10px;
  font-size:14px;
  opacity:0.8;
}

@media(max-width:768px){
  .sidebar{left:-100%;}
  .sidebar.active{left:0;}
  .main{margin-left:0;}
  .menu-btn{display:block;}
}
</style>
</head>

<body>

<div class="dashboard">

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
<h2>👑 Admin</h2>

<nav>
<a href="admin-dashboard.html">📊 Dashboard</a>
<a href="admin-users.html">👥 Users</a>
<a href="admin-jobs.html">💼 Jobs</a>
<a href="admin-applications.html">📄 Apps</a>
<a href="admin-flags.html">🚨 Flags</a>
<a href="admin-analytics.html">📈 Analytics</a>
<a href="admin-ai-control.html" class="active">🤖 AI</a>
<a href="admin-leaderboard.html">🏆 Rank</a>
<a href="admin-settings.html">⚙ Settings</a>
<a href="admin-logs.html">📜 Logs</a>
<a href="admin-notifications.html">📩 Notify</a>
<a href="admin-moderation.html">🛠 Mod</a>
</nav>

<a href="index.html" class="btn">Logout 👋</a>
</aside>

<!-- MAIN -->
<main class="main">

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
  <span class="menu-btn" onclick="toggleMenu()">☰</span>
  <h2>🤖 AI Control Panel</h2>
</div>

<!-- CARD 1 -->
<div class="card">
  <h3>📄 Resume Ranking</h3>

  <label>Experience Weight (%)</label>
  <input id="exp" type="range" min="0" max="100">

  <label>Skills Weight (%)</label>
  <input id="skills" type="range" min="0" max="100">

  <label>Education Weight (%)</label>
  <input id="edu" type="range" min="0" max="100">
</div>

<!-- CARD 2 -->
<div class="card">
  <h3>🎯 Job Recommendation</h3>

  <select id="recommend">
    <option>Skill Based</option>
    <option>Location Based</option>
    <option>Hybrid AI</option>
  </select>
</div>

<!-- CARD 3 -->
<div class="card">
  <h3>🚨 Fraud Sensitivity</h3>

  <input id="fraud" type="range" min="0" max="100">
</div>

<!-- CARD 4 -->
<div class="card">
  <h3>⚡ Auto Shortlist</h3>

  <label>Minimum Match %</label>
  <input id="match" type="number">
</div>

<button class="btn" id="saveBtn">💾 Save Settings</button>
<p id="statusMsg"></p>

</main>
</div>

<script type="module">

import { db } from "./firebase.js";
import {
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// 🔹 LOAD DATA
async function loadConfig(){
  const ref = doc(db, "aiConfig", "config");
  const snap = await getDoc(ref);

  if(snap.exists()){
    const d = snap.data();

    document.getElementById("exp").value = d.experienceWeight || 50;
    document.getElementById("skills").value = d.skillsWeight || 70;
    document.getElementById("edu").value = d.educationWeight || 40;
    document.getElementById("fraud").value = d.fraudSensitivity || 60;
    document.getElementById("match").value = d.minMatch || 70;
    document.getElementById("recommend").value = d.recommendationType || "Hybrid AI";
  }
}

// 🔹 SAVE DATA
document.getElementById("saveBtn").addEventListener("click", async ()=>{

  const data = {
    experienceWeight: +document.getElementById("exp").value,
    skillsWeight: +document.getElementById("skills").value,
    educationWeight: +document.getElementById("edu").value,
    fraudSensitivity: +document.getElementById("fraud").value,
    minMatch: +document.getElementById("match").value,
    recommendationType: document.getElementById("recommend").value
  };

  await setDoc(doc(db, "aiConfig", "config"), data);

  document.getElementById("statusMsg").innerText = "✅ Settings saved successfully!";
});

// 🔹 MOBILE MENU
window.toggleMenu = function(){
  document.getElementById("sidebar").classList.toggle("active");
};

document.querySelectorAll(".sidebar a").forEach(link=>{
  link.addEventListener("click",()=>{
    if(window.innerWidth < 768){
      document.getElementById("sidebar").classList.remove("active");
    }
  });
});

// INIT
loadConfig();

</script>

</body>
</html>
